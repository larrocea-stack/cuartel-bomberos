<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cuartel Online</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body{font-family:Arial,sans-serif;background:#020617;color:#e2e8f0;margin:0}
    .card{background:#0f172a;border:1px solid #334155;border-radius:16px;padding:16px}
    input,select,textarea{width:100%;box-sizing:border-box;background:#1e293b;border:1px solid #334155;color:#fff;border-radius:12px;padding:12px}
    textarea{min-height:100px;resize:vertical}
    button{cursor:pointer;border:none}
    .primary{background:#b91c1c;color:#fff;padding:12px;border-radius:12px;font-weight:700}
    .secondary{background:#1e293b;color:#fff;padding:10px 12px;border-radius:10px}
    .danger{background:#7f1d1d;color:#fff;padding:10px 12px;border-radius:10px}
    .nav{background:#111827;color:#e2e8f0;padding:10px 12px;border-radius:10px;text-align:left}
    .nav.active{background:#991b1b;color:#fff}
    .hidden{display:none!important}
    .grid{display:grid;gap:12px}
    .small{font-size:12px;color:#94a3b8}
    .list-row{padding:10px 0;border-bottom:1px solid #334155}
    .err{background:#450a0a;border:1px solid #7f1d1d;color:#fecaca;border-radius:12px;padding:12px;white-space:pre-wrap}
    .ok{background:#052e16;border:1px solid #166534;color:#bbf7d0;border-radius:12px;padding:12px}
    .pill{display:inline-block;font-size:11px;padding:2px 8px;border-radius:999px}
    .pill-ok{background:#052e16;color:#bbf7d0}
    .pill-warn{background:#78350f;color:#fde68a}
    .pill-bad{background:#450a0a;color:#fecaca}
    .pill-info{background:#172554;color:#bfdbfe}
    table{width:100%;border-collapse:collapse}
    th,td{padding:10px;border-bottom:1px solid #334155;text-align:left;vertical-align:top}
    th{color:#94a3b8;font-size:12px;text-transform:uppercase}
    .toolbar{display:flex;gap:8px;flex-wrap:wrap}
    .mobile-map{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px}
    .comp-box{background:#111827;border:1px solid #334155;border-radius:14px;padding:12px}
    .stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px}
    .hero-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px}
    .hero-number{font-size:34px;font-weight:800;line-height:1;margin-top:8px}
    .hero-label{font-size:12px;color:#94a3b8;text-transform:uppercase;letter-spacing:.06em}
    .status-big,.guardia-card{border-radius:18px;padding:18px;border:1px solid #334155}
    .status-service{background:#052e16;border-color:#166534}
    .status-maint{background:#3b2a05;border-color:#92400e}
    .status-out{background:#450a0a;border-color:#7f1d1d}
    .guardia-wrap{min-height:100vh;background:#020617;color:#e2e8f0;padding:20px}
    .guardia-header{display:flex;justify-content:space-between;align-items:center;gap:16px;margin-bottom:18px}
    .guardia-title{font-size:34px;font-weight:800;letter-spacing:.04em}
    .guardia-sub{color:#94a3b8;font-size:14px}
    .guardia-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:16px}
    .guardia-number{font-size:56px;font-weight:900;line-height:1;margin-top:10px}
    .guardia-label{font-size:13px;color:#94a3b8;text-transform:uppercase;letter-spacing:.08em}
    .guardia-list{margin-top:18px;display:grid;grid-template-columns:1.1fr .9fr;gap:16px}
    .guardia-item{padding:12px 0;border-bottom:1px solid #334155;font-size:18px}
    .guardia-item:last-child{border-bottom:none}
    .guardia-badge{display:inline-block;padding:4px 10px;border-radius:999px;font-size:12px;font-weight:700}
    .guardia-danger{background:#7f1d1d;color:#fecaca}
    .guardia-warn{background:#92400e;color:#fde68a}
    .guardia-ok{background:#166534;color:#bbf7d0}
    .guardia-footer{margin-top:16px;color:#94a3b8;font-size:13px}
    @media (max-width:900px){.layout{display:block!important}aside{width:auto!important;border-right:none!important;border-bottom:1px solid #334155!important}.guardia-list{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div id="login" style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;">
    <div class="card" style="width:100%;max-width:420px;">
      <h1 style="font-size:32px;font-weight:800;margin:0 0 8px 0;">CUARTEL<span style="color:#ef4444;">ONLINE</span></h1>
      <p class="small" style="margin:0 0 16px 0;">Sistema con perfiles y control operativo</p>
      <div id="bootMsg" class="small" style="margin-bottom:12px;">Cargando sistema…</div>
      <div id="bootErr" class="err hidden" style="margin-bottom:12px;"></div>
      <form id="loginForm" class="grid">
        <select id="perfil">
          <option value="administrador">Administrador</option>
          <option value="materiales">Encargado de materiales</option>
          <option value="automotores">Encargado de automotores</option>
          <option value="jefatura">Jefatura</option>
          <option value="bomberos">Bomberos</option>
        </select>
        <input id="email" type="email" placeholder="Email" />
        <input id="password" type="password" placeholder="Contraseña" />
        <button type="submit" class="primary">Ingresar</button>
      </form>
    </div>
  </div>

  <div id="app" class="hidden">
    <div class="layout" style="display:flex;min-height:100vh;">
      <aside style="width:300px;background:#020617;border-right:1px solid #334155;padding:16px;box-sizing:border-box;">
        <div id="brandEscudoWrap" class="hidden" style="text-align:center;margin-bottom:10px;">
          <img id="brandEscudo" style="max-height:80px;max-width:100%;object-fit:contain;">
        </div>
        <div style="font-weight:800;font-size:22px;margin-bottom:8px;">CUARTEL<span style="color:#ef4444;">ONLINE</span></div>
        <div id="userInfo" class="small" style="margin-bottom:16px;"></div>
        <div class="grid">
          <button class="nav active" data-sec="dashboard" type="button">Dashboard</button>
          <button class="nav" data-sec="identidad" type="button">Identidad institucional</button>
          <button class="nav" data-sec="moviles" type="button">Móviles</button>
          <button class="nav" data-sec="bomberos" type="button">Bomberos</button>
          <button class="nav" data-sec="inventario_general" type="button">Inventario general</button>
          <button class="nav" data-sec="asignaciones" type="button">Asignaciones</button>
          <button class="nav" data-sec="inventario" type="button">Inventario por móvil</button>
          <button class="nav" data-sec="plano" type="button">Plano del móvil</button>
          <button class="nav" data-sec="fallas" type="button">Reporte de fallas</button>
          <button class="nav" data-sec="checklist_diario" type="button">Checklist diario</button>
          <button class="nav" data-sec="checklist_materiales" type="button">Control diario materiales</button>
          <button class="nav" data-sec="mantenimiento_stock" type="button">Control de mantenimiento</button>
          <button class="nav" data-sec="archivo_bajas" type="button">Archivo / bajas</button>
          <button class="nav" data-sec="repuestos" type="button">Repuestos</button>
          <button class="nav" data-sec="proveedores" type="button">Proveedores</button>
          <button class="nav" data-sec="mantenimiento" type="button">Bitácora</button>
          <button class="nav" data-sec="respaldo" type="button">Importar / exportar</button>
          <button class="nav" data-sec="estadisticas" type="button">Estadísticas</button>
          <button class="nav" data-sec="novedades" type="button">Novedades de materiales</button>
          <button class="nav" data-sec="reportes_stock" type="button">Reportes de stock</button>
          <button class="nav" data-sec="diagnostico" type="button">Diagnóstico</button>
          <button class="nav" data-sec="guardia" type="button">Modo guardia</button>
        </div>
        <button id="logout" class="secondary" style="margin-top:20px;width:100%;" type="button">Cerrar sesión</button>
      </aside>

      <main style="flex:1;padding:20px;box-sizing:border-box;">
        <div style="display:flex;justify-content:space-between;align-items:center;gap:12px;">
          <h2 id="title" style="margin:0;">Dashboard</h2>
          <button id="logoutTop" class="secondary" type="button">Salir</button>
        </div>
        <div id="flash" class="hidden" style="margin-top:12px;"></div>
        <div id="content" style="margin-top:16px;"></div>
      </main>
    </div>
  </div>

<script>
const SUPABASE_URL='https://nksnxiqteqqlngmpzeew.supabase.co';
const SUPABASE_KEY='sb_publishable_f-MtPNfegeikWpLn-Jsz_A_4fj7_Pm5';
const PROFILE_EMAILS={administrador:'admin@cuartel.com',materiales:'materiales@cuartel.com',automotores:'automotores@cuartel.com',jefatura:'jefatura@cuartel.com'};
const VIEW_RULES={
  administrador:['dashboard','identidad','moviles','bomberos','inventario_general','asignaciones','inventario','plano','fallas','checklist_diario','checklist_materiales','mantenimiento_stock','archivo_bajas','repuestos','proveedores','mantenimiento','respaldo','estadisticas','novedades','reportes_stock','diagnostico','guardia'],
  materiales:['dashboard','inventario_general','asignaciones','inventario','plano','checklist_materiales','mantenimiento_stock','archivo_bajas','novedades','reportes_stock','estadisticas','diagnostico','guardia'],
  automotores:['dashboard','moviles','plano','fallas','checklist_diario','repuestos','proveedores','estadisticas','diagnostico','guardia'],
  jefatura:['dashboard','moviles','bomberos','inventario_general','asignaciones','inventario','plano','fallas','checklist_diario','checklist_materiales','mantenimiento_stock','archivo_bajas','repuestos','proveedores','mantenimiento','estadisticas','novedades','reportes_stock','diagnostico','guardia'],
  bomberos:['dashboard','inventario','plano','checklist_materiales','diagnostico','guardia']
};
const els={login:document.getElementById('login'),app:document.getElementById('app'),loginForm:document.getElementById('loginForm'),perfil:document.getElementById('perfil'),email:document.getElementById('email'),password:document.getElementById('password'),bootMsg:document.getElementById('bootMsg'),bootErr:document.getElementById('bootErr'),userInfo:document.getElementById('userInfo'),title:document.getElementById('title'),content:document.getElementById('content'),flash:document.getElementById('flash'),logout:document.getElementById('logout'),logoutTop:document.getElementById('logoutTop')};
let sb=null,perfilActual=null,userActual=null;
function canView(s){return (VIEW_RULES[perfilActual]||[]).includes(s)}
function canAdmin(){return perfilActual==='administrador'}
function canBombero(){return perfilActual==='bomberos'}
function canEditMoviles(){return perfilActual==='administrador'}
function canEditBomberos(){return perfilActual==='administrador'}
function canEditFallas(){return perfilActual==='administrador'||perfilActual==='automotores'}
function canEditChecklistDiario(){return perfilActual==='administrador'||perfilActual==='automotores'||perfilActual==='jefatura'}
function canEditChecklistMateriales(){return perfilActual==='administrador'||perfilActual==='materiales'||perfilActual==='bomberos'||perfilActual==='jefatura'}
function canEditRepuestos(){return perfilActual==='administrador'||perfilActual==='automotores'}
function canEditProveedores(){return perfilActual==='administrador'||perfilActual==='automotores'}
function canEditMantenimiento(){return perfilActual==='administrador'}
function canBackup(){return perfilActual==='administrador'}
function canManageNovedades(){return perfilActual==='administrador'||perfilActual==='materiales'}
function canEditStockGeneral(){return perfilActual==='administrador'||perfilActual==='materiales'}
function escapeHtml(v){return String(v??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;')}
function showBootError(msg){els.bootErr.textContent=msg;els.bootErr.classList.remove('hidden')}
function showFlash(msg,type){els.flash.className=type==='ok'?'ok':'err';els.flash.textContent=msg;els.flash.classList.remove('hidden');setTimeout(()=>els.flash.classList.add('hidden'),3200)}
function authInputs(){const b=els.perfil.value==='bomberos';els.email.classList.toggle('hidden',b);els.password.classList.toggle('hidden',b)}
function activateNav(sec){document.querySelectorAll('.nav').forEach(btn=>btn.classList.remove('active'));const btn=document.querySelector('.nav[data-sec="'+sec+'"]');if(btn)btn.classList.add('active')}
function updateNavVisibility(){document.querySelectorAll('.nav').forEach(btn=>btn.classList.toggle('hidden',!canView(btn.dataset.sec)))}
function card(label,value){return '<div class="card"><div class="small">'+escapeHtml(label)+'</div><div style="font-size:28px;font-weight:800;">'+escapeHtml(value)+'</div></div>'}
function statusPill(status){const s=String(status||'').trim().toLowerCase();if(s==='en servicio')return '<span class="pill pill-ok">En servicio</span>';if(s==='en mantenimiento')return '<span class="pill pill-warn">En mantenimiento</span>';if(s==='fuera de servicio')return '<span class="pill pill-bad">Fuera de servicio</span>';return '<span class="pill pill-bad">'+escapeHtml(status||'Sin estado')+'</span>'}
function severityPill(sev){const s=String(sev||'').trim().toLowerCase();if(s==='leve')return '<span class="pill pill-ok">Leve</span>';if(s==='moderada')return '<span class="pill pill-warn">Moderada</span>';return '<span class="pill pill-bad">'+escapeHtml(sev||'Crítica')+'</span>'}
function csv(rows){if(!rows||!rows.length)return '';const headers=Object.keys(rows[0]);const esc=(v)=>'"'+String(v??'').replace(/"/g,'""')+'"';return [headers.join(',')].concat(rows.map(r=>headers.map(k=>esc(r[k])).join(','))).join('\n')}
function downloadText(filename,content,type){const blob=new Blob([content],{type:type||'text/plain;charset=utf-8'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=filename;a.click();URL.revokeObjectURL(url)}
async function safeSelect(table,orderBy,ascending,limit){let q=sb.from(table).select('*');if(orderBy)q=q.order(orderBy,{ascending:!!ascending});if(limit)q=q.limit(limit);const res=await q;if(res.error)throw res.error;return res.data||[]}
async function upsertRow(table,row){const res=await sb.from(table).upsert(row);if(res.error)throw res.error}
async function insertRow(table,row){const res=await sb.from(table).insert(row);if(res.error)throw res.error}
async function deleteRow(table,id){const res=await sb.from(table).delete().eq('id',id);if(res.error)throw res.error}
async function updateRows(table,values,id){const res=await sb.from(table).update(values).eq('id',id);if(res.error)throw res.error}
async function loginAdmin(email,password,profile){const expected=PROFILE_EMAILS[profile];if(!expected)throw new Error('Perfil inválido.');if(String(email||'').trim().toLowerCase()!==expected.toLowerCase())throw new Error('Para el perfil '+profile+' debés usar el email '+expected);const authRes=await sb.auth.signInWithPassword({email,password});if(authRes.error)throw authRes.error;userActual=authRes.data.user;const roleRes=await sb.from('user_profiles').select('*').eq('user_id',userActual.id).eq('profile_name',profile).limit(1);if(roleRes.error)throw roleRes.error;if(!roleRes.data||!roleRes.data.length)throw new Error('Ese usuario no tiene asignado el perfil seleccionado.')}
async function loginBomberos(){userActual=null}
async function logout(){try{if(userActual)await sb.auth.signOut()}catch(e){}location.reload()}
async function cargarEscudo(){const wrap=document.getElementById('brandEscudoWrap');const img=document.getElementById('brandEscudo');if(!wrap||!img)return;const res=await sb.from('configuracion_cuartel').select('*').eq('clave','escudo_url').limit(1);if(res.error)return;const url=res.data?.[0]?.valor||'';if(url){img.src=url;wrap.classList.remove('hidden')}else{img.src='';wrap.classList.add('hidden')}}
async function identidad(){els.title.textContent='Identidad institucional';const res=await sb.from('configuracion_cuartel').select('*').eq('clave','escudo_url').limit(1);if(res.error){els.content.innerHTML='<div class="err">'+escapeHtml(res.error.message)+'</div>';return;}const actual=res.data?.[0]?.valor||'';els.content.innerHTML=`<div class="card" style="max-width:800px"><strong>Escudo institucional</strong><div style="margin-top:10px">${actual?`<img src="${actual}" style="max-height:160px;max-width:100%;object-fit:contain;">`:''}</div><form id="fEscudo" class="grid" style="margin-top:12px"><input name="escudo_url" placeholder="URL del escudo" value="${escapeHtml(actual)}"><button class="primary" type="submit">Guardar escudo</button></form></div>`;document.getElementById('fEscudo').addEventListener('submit',async e=>{e.preventDefault();const fd=new FormData(e.target);const save=await sb.from('configuracion_cuartel').upsert({clave:'escudo_url',valor:fd.get('escudo_url'),updated_at:new Date().toISOString()},{onConflict:'clave'});if(save.error){alert(save.error.message);return;}await cargarEscudo();showFlash('Escudo guardado','ok');identidad()})}
async function dashboard(){els.title.textContent='Dashboard';const all=await Promise.all([safeSelect('moviles'),safeSelect('v_stock_assignments_detail'),safeSelect('fallas'),safeSelect('repuestos'),safeSelect('novedades_materiales'),safeSelect('revisiones'),safeSelect('controles_materiales'),safeSelect('v_stock_general')]);const mov=all[0],inv=all[1],fallas=all[2],repuestos=all[3],novedades=all[4],revisiones=all[5],controles=all[6],stockGeneral=all[7];const hoy=(new Date()).toDateString();const enServicio=mov.filter(x=>x.estado==='En servicio').length;const enMantenimiento=mov.filter(x=>x.estado==='En mantenimiento').length;const fueraServicio=mov.filter(x=>x.estado==='Fuera de servicio').length;const fallasCriticas=fallas.filter(f=>String(f.tipo_falla||'').toLowerCase().includes('crit'));const repuestosCriticos=repuestos.filter(r=>Number(r.stock_actual||0)<=Number(r.stock_minimo||0));const alertasMateriales=novedades.filter(n=>String(n.estado||'').toLowerCase()==='pendiente');const alertasStock=stockGeneral.filter(s=>s.alerta_minimo===true);const checklistHoy=revisiones.filter(r=>r.fecha_hora&&new Date(r.fecha_hora).toDateString()===hoy).length;const controlesHoy=controles.filter(r=>r.fecha_hora&&new Date(r.fecha_hora).toDateString()===hoy).length;let alertHtml='';alertHtml+=alertasMateriales.slice(0,6).map(n=>'<div class="list-row"><strong>Móvil '+escapeHtml(n.movil||'')+'</strong> · '+escapeHtml(n.material||'')+' · <span class="pill pill-bad">'+escapeHtml(n.tipo_novedad||'Novedad')+'</span></div>').join('');alertHtml+=fallasCriticas.slice(0,4).map(f=>'<div class="list-row"><strong>Móvil '+escapeHtml(f.movil||'')+'</strong> · '+escapeHtml(f.componente||'')+' · <span class="pill pill-bad">Crítica</span></div>').join('');alertHtml+=alertasStock.slice(0,4).map(s=>'<div class="list-row"><strong>'+escapeHtml(s.nombre||'')+'</strong> · disponible '+escapeHtml(s.disponible_real)+' / mínimo '+escapeHtml(s.stock_minimo)+' <span class="pill pill-bad">Stock bajo</span></div>').join('');if(!alertHtml)alertHtml='<div class="list-row">Sin alertas activas.</div>';els.content.innerHTML='<div class="hero-grid">'+'<div class="status-big status-service"><div class="hero-label">Móviles en servicio</div><div class="hero-number">'+enServicio+'</div><div class="small">Operativos para salida</div></div>'+'<div class="status-big status-maint"><div class="hero-label">En mantenimiento</div><div class="hero-number">'+enMantenimiento+'</div><div class="small">Requieren intervención</div></div>'+'<div class="status-big status-out"><div class="hero-label">Fuera de servicio</div><div class="hero-number">'+fueraServicio+'</div><div class="small">No disponibles</div></div>'+'</div>'+'<div class="stat-grid" style="margin-top:14px;">'+card('Inventario por móvil',inv.length)+card('Fallas críticas',fallasCriticas.length)+card('Repuestos críticos',repuestosCriticos.length)+card('Alertas materiales',alertasMateriales.length)+card('Alertas stock general',alertasStock.length)+card('Checklist hoy',checklistHoy)+card('Controles materiales hoy',controlesHoy)+'</div>'+'<div class="grid" style="grid-template-columns:1.1fr .9fr; margin-top:14px; align-items:start;">'+'<div class="card"><strong>Centro de alertas</strong><div style="margin-top:10px;">'+alertHtml+'</div></div>'+'<div class="card"><strong>Resumen operativo</strong><div style="margin-top:10px;">'+'<div class="list-row">Total de móviles: <strong>'+mov.length+'</strong></div>'+'<div class="list-row">Móviles operativos: <strong>'+enServicio+'</strong></div>'+'<div class="list-row">Materiales observados: <strong>'+alertasMateriales.length+'</strong></div>'+'<div class="list-row">Fallas registradas: <strong>'+fallas.length+'</strong></div>'+'<div class="list-row">Repuestos bajo mínimo: <strong>'+repuestosCriticos.length+'</strong></div>'+'<div class="list-row">Último checklist diario: <strong>'+(revisiones[0]?escapeHtml(new Date(revisiones[0].fecha_hora||Date.now()).toLocaleString('es-AR')):'Sin datos')+'</strong></div>'+'</div></div>'+'</div>'}
async function inventario(){els.title.textContent='Inventario por móvil';const items=await safeSelect('v_stock_assignments_detail','movil',true);els.content.innerHTML='<div class="card"><table><thead><tr><th>Móvil</th><th>Compartimiento</th><th>Ítem</th><th>Cantidad</th><th>Estado</th></tr></thead><tbody>'+(items.map(x=>'<tr><td>Móvil '+escapeHtml(x.movil)+'</td><td>'+escapeHtml(x.compartimiento||'')+'</td><td><strong>'+escapeHtml(x.nombre)+'</strong><div class="small">'+escapeHtml(x.codigo_interno||'')+'</div></td><td>'+escapeHtml(x.cantidad)+'</td><td>'+escapeHtml(x.estado_asignacion)+'</td></tr>').join('')||'<tr><td colspan="5">Sin inventario asignado.</td></tr>')+'</tbody></table></div>'}
async function diagnostico(){els.title.textContent='Diagnóstico';const lines=[];async function run(label,fn){try{const result=await fn();lines.push('OK - '+label+(result?': '+result:''))}catch(err){lines.push('ERROR - '+label+': '+(err&&err.message?err.message:String(err)))}}await run('Auth',async()=>{const res=await sb.auth.getSession();if(res.error)throw res.error;return res.data.session?'sesión activa':'sin sesión'});await run('Moviles',async()=>String((await safeSelect('moviles','id',false,1)).length));await run('Bomberos',async()=>String((await safeSelect('bomberos','id',false,1)).length));await run('Revisiones',async()=>String((await safeSelect('revisiones','id',false,1)).length));await run('Controles materiales',async()=>String((await safeSelect('controles_materiales','id',false,1)).length));await run('Fallas',async()=>String((await safeSelect('fallas','id',false,1)).length));await run('Repuestos',async()=>String((await safeSelect('repuestos','id',false,1)).length));await run('Proveedores',async()=>String((await safeSelect('proveedores','id',false,1)).length));await run('Novedades materiales',async()=>String((await safeSelect('novedades_materiales','id',false,1)).length));await run('v_stock_general',async()=>String((await safeSelect('v_stock_general','id',false,1)).length));await run('v_stock_assignments_detail',async()=>String((await safeSelect('v_stock_assignments_detail','id',false,1)).length));await run('v_maintenance_control_detail',async()=>String((await safeSelect('v_maintenance_control_detail','id',false,1)).length));await run('v_stock_decommissions_detail',async()=>String((await safeSelect('v_stock_decommissions_detail','id',false,1)).length));els.content.innerHTML='<div class="err" style="background:#0f172a;border-color:#334155;color:#e2e8f0;">'+escapeHtml(lines.join('\n'))+'</div>'}
async function guardia(){els.title.textContent='Modo guardia';els.content.innerHTML='<div class="card">Modo guardia listo.</div>'}
async function nav(sec){if(!canView(sec)){showFlash('Ese perfil no tiene acceso a esta sección','err');return}activateNav(sec);if(sec==='dashboard')return dashboard();if(sec==='identidad')return identidad();if(sec==='moviles')return moviles();if(sec==='bomberos')return bomberos();if(sec==='inventario')return inventario();if(sec==='diagnostico')return diagnostico();if(sec==='guardia')return guardia();if(sec==='inventario_general')return inventario_general();if(sec==='asignaciones')return asignaciones();if(sec==='plano')return plano();if(sec==='fallas')return fallas();if(sec==='checklist_diario')return checklist_diario();if(sec==='checklist_materiales')return checklist_materiales();if(sec==='mantenimiento_stock')return mantenimiento_stock();if(sec==='archivo_bajas')return archivo_bajas();if(sec==='repuestos')return repuestos();if(sec==='proveedores')return proveedores();if(sec==='mantenimiento')return mantenimiento();if(sec==='respaldo')return respaldo();if(sec==='estadisticas')return estadisticas();if(sec==='novedades')return novedades();if(sec==='reportes_stock')return reportes_stock();}
function init(){try{if(!window.supabase||typeof window.supabase.createClient!=='function')throw new Error('No cargó la librería de Supabase.');sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);els.bootMsg.textContent='Sistema listo.';authInputs();els.perfil.addEventListener('change',authInputs);els.logout.addEventListener('click',logout);els.logoutTop.addEventListener('click',logout);document.querySelectorAll('.nav').forEach(btn=>btn.addEventListener('click',()=>nav(btn.dataset.sec)));els.loginForm.addEventListener('submit',async e=>{e.preventDefault();perfilActual=els.perfil.value;try{if(perfilActual==='bomberos'){await loginBomberos()}else{await loginAdmin(els.email.value,els.password.value,perfilActual)}els.login.classList.add('hidden');els.app.classList.remove('hidden');els.userInfo.textContent=canBombero()?'Bomberos · plano del móvil y control diario de materiales':perfilActual+' · permisos según rol';updateNavVisibility();await cargarEscudo();nav(canBombero()?'checklist_materiales':'dashboard')}catch(err){alert(err&&err.message?err.message:'No se pudo iniciar sesión.')}})}catch(err){els.bootMsg.textContent='Error de inicialización.';showBootError(err&&err.message?err.message:String(err))}}
window.addEventListener('error',event=>showBootError(event&&event.message?event.message:'Script error'));
window.addEventListener('unhandledrejection',event=>showBootError(event&&event.reason&&event.reason.message?event.reason.message:String((event&&event.reason)||'Promise error')));
init();
</script>
