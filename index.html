<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cuartel Online · Nivel Avanzado</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root{--bg:#020617;--panel:#0f172a;--soft:#1e293b;--line:#334155;--text:#e2e8f0;--muted:#94a3b8;--danger:#b91c1c;--danger2:#7f1d1d;--ok:#166534;--warn:#92400e;--info:#1d4ed8}
    *{box-sizing:border-box}body{margin:0;font-family:Arial,sans-serif;background:var(--bg);color:var(--text)}
    .hidden{display:none!important}.layout{display:flex;min-height:100vh}.sidebar{width:310px;background:var(--bg);border-right:1px solid var(--line);padding:16px}.main{flex:1;padding:20px}.grid{display:grid;gap:12px}
    .card{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:16px}.small{font-size:12px;color:var(--muted)}
    input,select,textarea{width:100%;background:var(--soft);border:1px solid var(--line);color:#fff;border-radius:12px;padding:12px}textarea{min-height:96px;resize:vertical}
    button{border:none;cursor:pointer}.primary,.secondary,.danger{padding:11px 14px;border-radius:12px;color:#fff}.primary{background:var(--danger)}.secondary{background:var(--soft)}.danger{background:var(--danger2)}
    .nav{background:#111827;color:var(--text);padding:10px 12px;border-radius:10px;text-align:left}.nav.active{background:#991b1b}.nav.disabled{opacity:.45;pointer-events:none}
    table{width:100%;border-collapse:collapse}th,td{padding:10px;border-bottom:1px solid var(--line);text-align:left;vertical-align:top}th{font-size:12px;color:var(--muted);text-transform:uppercase}
    .pill{display:inline-block;padding:3px 8px;border-radius:999px;font-size:11px}.pill-ok{background:#052e16;color:#bbf7d0}.pill-bad{background:#450a0a;color:#fecaca}.pill-warn{background:#78350f;color:#fde68a}.pill-info{background:#172554;color:#bfdbfe}
    .ok,.err{padding:12px;border-radius:12px;white-space:pre-wrap}.ok{background:#052e16;border:1px solid var(--ok);color:#bbf7d0}.err{background:#450a0a;border:1px solid var(--danger2);color:#fecaca}
    .hero-grid,.stat-grid{display:grid;gap:12px}.hero-grid{grid-template-columns:repeat(auto-fit,minmax(220px,1fr))}.stat-grid{grid-template-columns:repeat(auto-fit,minmax(180px,1fr))}
    .hero{border-radius:18px;padding:18px;border:1px solid var(--line)}.hero.service{background:#052e16;border-color:var(--ok)}.hero.maint{background:#3b2a05;border-color:var(--warn)}.hero.out{background:#450a0a;border-color:var(--danger2)}
    .hero-number{font-size:34px;font-weight:800}.hero-label{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
    .toolbar{display:flex;gap:8px;flex-wrap:wrap}.list-row{padding:10px 0;border-bottom:1px solid var(--line)}
    .guardia-wrap{min-height:100vh;padding:20px;background:var(--bg)}.guardia-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:16px}.guardia-list{display:grid;grid-template-columns:1.1fr .9fr;gap:16px;margin-top:16px}
    .guardia-card{border-radius:18px;padding:18px;border:1px solid var(--line);background:var(--panel)} .guardia-number{font-size:52px;font-weight:900}.guardia-label{font-size:13px;color:var(--muted);text-transform:uppercase}
    @media (max-width:900px){.layout{display:block}.sidebar{width:auto;border-right:none;border-bottom:1px solid var(--line)}.guardia-list{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div id="login" style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;">
    <div class="card" style="width:100%;max-width:440px;">

          <button class="nav" data-sec="asignaciones" type="button">Asignaciones</button>
          <button class="nav" data-sec="inventario" type="button">Inventario por móvil</button>
          <button class="nav" data-sec="plano" type="button">Plano del móvil</button>
          <button class="nav" data-sec="fallas" type="button">Reporte de fallas</button>
          <button class="nav" data-sec="checklist_diario" type="button">Checklist diario</button>
          <button class="nav" data-sec="checklist_materiales" type="button">Control diario materiales</button>
          <button class="nav" data-sec="mantenimiento_stock" type="button">Control de mantenimiento</button>
          <button class="nav" data-sec="archivo_bajas" type="button">Archivo / bajas</button>
          <button class="nav" data-sec="repuestos" type="button">Repuestos</button>
          <button class="nav" data-sec="proveedores" type="button">Proveedores</button>
          <button class="nav" data-sec="mantenimiento" type="button">Bitácora</button>
          <button class="nav" data-sec="roperia" type="button">Ropería</button>
          <button class="nav" data-sec="roperia_inventario_general" type="button">Inventario general ropería</button>
          <button class="nav" data-sec="roperia_informe_bombero" type="button">Informe por bombero</button>
          <button class="nav" data-sec="respaldo" type="button">Importar / exportar</button>
          <button class="nav" data-sec="estadisticas" type="button">Estadísticas</button>
          <button class="nav" data-sec="novedades" type="button">Novedades</button>
          <button class="nav" data-sec="auditoria" type="button">Auditoría</button>
          <button class="nav" data-sec="reportes_stock" type="button">Reportes de stock</button>
          <button class="nav" data-sec="diagnostico" type="button">Diagnóstico</button>
          <button class="nav" data-sec="guardia" type="button">Modo guardia</button>
        </div>
        <button id="logout" class="secondary" style="margin-top:20px;width:100%;" type="button">Cerrar sesión</button>
      </aside>
      <main class="main">
        <div style="display:flex;justify-content:space-between;align-items:center;gap:12px;">
          <h2 id="title" style="margin:0;">Dashboard</h2>
          <button id="logoutTop" class="secondary" type="button">Salir</button>
        </div>
        <div id="flash" class="hidden" style="margin-top:12px;"></div>
        <div id="content" style="margin-top:16px;"></div>
      </main>
    </div>
  </div>

<script>
const SUPABASE_URL='https://nksnxiqteqqlngmpzeew.supabase.co';
const SUPABASE_KEY='sb_publishable_f-MtPNfegeikWpLn-Jsz_A_4fj7_Pm5';
const PROFILE_EMAILS={administrador:'admin@cuartel.com',materiales:'materiales@cuartel.com',automotores:'automotores@cuartel.com',jefatura:'jefatura@cuartel.com',roperia:'roperia@cuartel.com'};
const ROLE_LEVEL={bomberos:1,roperia:2,automotores:2,materiales:2,jefatura:3,administrador:4};
const VIEW_RULES={
  administrador:['dashboard','guardia_activa','moviles','bomberos','inventario_general','asignaciones','inventario','plano','fallas','checklist_diario','checklist_materiales','mantenimiento_stock','archivo_bajas','repuestos','proveedores','mantenimiento','roperia','respaldo','estadisticas','novedades','auditoria','reportes_stock','diagnostico','guardia'],
  jefatura:['dashboard','guardia_activa','moviles','bomberos','inventario_general','asignaciones','inventario','plano','fallas','checklist_diario','checklist_materiales','mantenimiento_stock','archivo_bajas','repuestos','proveedores','mantenimiento','roperia','estadisticas','novedades','auditoria','reportes_stock','diagnostico','guardia'],
  automotores:['dashboard','guardia_activa','moviles','fallas','checklist_diario','repuestos','proveedores','mantenimiento','estadisticas','diagnostico','guardia'],
  materiales:['dashboard','guardia_activa','inventario_general','asignaciones','inventario','checklist_materiales','mantenimiento_stock','archivo_bajas','novedades','reportes_stock','estadisticas','diagnostico','guardia'],
  roperia:['dashboard','roperia','roperia_inventario_general','roperia_informe_bombero','diagnostico'],
  bomberos:['dashboard','guardia_activa','inventario','plano','checklist_materiales','diagnostico','guardia']
};
const els={login:document.getElementById('login'),app:document.getElementById('app'),loginForm:document.getElementById('loginForm'),perfil:document.getElementById('perfil'),email:document.getElementById('email'),password:document.getElementById('password'),bootMsg:document.getElementById('bootMsg'),bootErr:document.getElementById('bootErr'),userInfo:document.getElementById('userInfo'),guardiaInfo:document.getElementById('guardiaInfo'),title:document.getElementById('title'),content:document.getElementById('content'),flash:document.getElementById('flash'),logout:document.getElementById('logout'),logoutTop:document.getElementById('logoutTop')};
let sb=null,perfilActual=null,userActual=null,guardiaActual=null;

function h(v){return String(v??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;')}
function canView(s){return (VIEW_RULES[perfilActual]||[]).includes(s)}
function level(role){return ROLE_LEVEL[role]||0}
function canAdmin(){return perfilActual==='administrador'}
function canBombero(){return perfilActual==='bomberos'}
function canEditMoviles(){return perfilActual==='administrador'||perfilActual==='automotores'}
function canEditBomberos(){return perfilActual==='administrador'||perfilActual==='jefatura'}
function canEditInventarioMovil(){return perfilActual==='administrador'||perfilActual==='materiales'}
function canEditFallas(){return perfilActual==='administrador'||perfilActual==='automotores'}
function canEditChecklistDiario(){return ['administrador','automotores','jefatura'].includes(perfilActual)}
function canEditChecklistMateriales(){return ['administrador','materiales','bomberos','jefatura'].includes(perfilActual)}
function canEditRepuestos(){return ['administrador','automotores'].includes(perfilActual)}
function canEditProveedores(){return ['administrador','automotores'].includes(perfilActual)}
function canEditMantenimiento(){return ['administrador','automotores'].includes(perfilActual)}
function canBackup(){return perfilActual==='administrador'}
function canManageNovedades(){return ['administrador','materiales','jefatura'].includes(perfilActual)}
function canEditStockGeneral(){return ['administrador','materiales'].includes(perfilActual)}
function canEditRoperia(){return ['administrador','roperia'].includes(perfilActual)}
function canSeeAlerts(){return perfilActual!=='automotores'}
function canUsePlano(){return perfilActual!=='automotores'}
function statusPill(status){const s=String(status||'').toLowerCase();if(s==='en servicio'||s==='activa'||s==='activo')return '<span class="pill pill-ok">'+h(status)+'</span>';if(s.includes('mant'))return '<span class="pill pill-warn">'+h(status)+'</span>';return '<span class="pill pill-bad">'+h(status||'Sin estado')+'</span>'}
function severityPill(sev){const s=String(sev||'').toLowerCase();if(s==='leve')return '<span class="pill pill-ok">Leve</span>';if(s==='moderada')return '<span class="pill pill-warn">Moderada</span>';return '<span class="pill pill-bad">'+h(sev||'Crítica')+'</span>'}
function showBootError(msg){els.bootErr.textContent=msg;els.bootErr.classList.remove('hidden')}
function showFlash(msg,type){els.flash.className=type==='ok'?'ok':'err';els.flash.textContent=msg;els.flash.classList.remove('hidden');setTimeout(()=>els.flash.classList.add('hidden'),3200)}
function authInputs(){const b=els.perfil.value==='bomberos';els.email.classList.toggle('hidden',b);els.password.classList.toggle('hidden',b)}
function activateNav(sec){document.querySelectorAll('.nav').forEach(btn=>btn.classList.remove('active'));const btn=document.querySelector('.nav[data-sec="'+sec+'"]');if(btn)btn.classList.add('active')}
function updateNavVisibility(){document.querySelectorAll('.nav').forEach(btn=>btn.classList.toggle('hidden',!canView(btn.dataset.sec)));if(perfilActual==='automotores'){const btn=document.querySelector('.nav[data-sec="plano"]');if(btn)btn.classList.add('hidden')}}
function card(label,value){return '<div class="card"><div class="small">'+h(label)+'</div><div style="font-size:28px;font-weight:800;">'+h(value)+'</div></div>'}
function csv(rows){if(!rows||!rows.length)return '';const headers=Object.keys(rows[0]);const esc=v=>'"'+String(v??'').replace(/"/g,'""')+'"';return [headers.join(',')].concat(rows.map(r=>headers.map(k=>esc(r[k])).join(','))).join('\n')}
function downloadText(filename,content,type){const blob=new Blob([content],{type:type||'text/plain;charset=utf-8'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=filename;a.click();URL.revokeObjectURL(url)}
async function safeSelect(table,orderBy,ascending,limit){let q=sb.from(table).select('*');if(orderBy)q=q.order(orderBy,{ascending:!!ascending});if(limit)q=q.limit(limit);const r=await q;if(r.error)throw r.error;return r.data||[]}
async function tableExists(table){try{const r=await sb.from(table).select('*').limit(1);return !r.error}catch(e){return false}}
async function upsertRow(table,row){const r=await sb.from(table).upsert(row);if(r.error)throw r.error;return r}
async function insertRow(table,row){const r=await sb.from(table).insert(row);if(r.error)throw r.error;return r}
async function deleteRow(table,id){const r=await sb.from(table).delete().eq('id',id);if(r.error)throw r.error;return r}
async function updateRows(table,values,id){const r=await sb.from(table).update(values).eq('id',id);if(r.error)throw r.error;return r}
async function audit(action,entity,payload){if(!(await tableExists('audit_logs')))return;try{await sb.from('audit_logs').insert({fecha_hora:new Date().toISOString(),usuario:userActual?.email||perfilActual,perfil:perfilActual,accion:action,entidad:entity,detalle:JSON.stringify(payload||{})})}catch(e){}}
async function loginAdmin(email,password,profile){const expected=PROFILE_EMAILS[profile];if(!expected)throw new Error('Perfil inválido.');if(String(email||'').trim().toLowerCase()!==expected.toLowerCase())throw new Error('Para el perfil '+profile+' debés usar el email '+expected);const authRes=await sb.auth.signInWithPassword({email,password});if(authRes.error)throw authRes.error;userActual=authRes.data.user;const roleRes=await sb.from('user_profiles').select('*').eq('user_id',userActual.id).eq('profile_name',profile).limit(1);if(roleRes.error)throw roleRes.error;if(!roleRes.data||!roleRes.data.length)throw new Error('Ese usuario no tiene asignado el perfil seleccionado.')}
async function loginBomberos(){userActual=null}
async function logout(){try{if(userActual)await sb.auth.signOut()}catch(e){}location.reload()}
async function loadGuardiaActiva(){if(!(await tableExists('guardias_activas'))) {guardiaActual=null; els.guardiaInfo.textContent='Sin módulo de guardia activa'; return;} const rows=await safeSelect('guardias_activas','fecha_inicio',false,1); guardiaActual=rows.find(x=>String(x.estado||'').toLowerCase()==='activa')||null; els.guardiaInfo.textContent=guardiaActual ? ('Guardia activa: '+(guardiaActual.nombre||'Sin nombre')) : 'No hay guardia activa';}
function requireGuardia(){if(['administrador','jefatura'].includes(perfilActual))return true; if(!guardiaActual){showFlash('No hay guardia activa. Operación bloqueada.','err'); return false;} return true;}
function enforceHierarchy(targetRole){if(level(perfilActual)<=level(targetRole)){showFlash('Bloqueado por jerarquía de roles.','err'); return false;} return true;}

async function dashboard(){
  els.title.textContent='Dashboard';
  if(perfilActual==='roperia'){
    const rows=(await tableExists('roperia_items'))? await safeSelect('roperia_items','tipo_prenda',true):[];
    const activas=rows.filter(r=>String(r.estado||'').toUpperCase()==='ACTIVO');
    const bajas=rows.filter(r=>String(r.estado||'').toUpperCase()==='BAJA');
    const asignadas=rows.filter(r=>String(r.asignado_a||'').trim()!=='');
    const alertas=rows.filter(r=>!r.sin_stock_minimo && Number(r.cantidad_disponible||0)<=Number(r.stock_minimo||0) && String(r.estado||'').toUpperCase()!=='BAJA');
    els.content.innerHTML='<div class="hero-grid">'+
      '<div class="hero service"><div class="hero-label">Prendas activas</div><div class="hero-number">'+activas.length+'</div></div>'+
      '<div class="hero maint"><div class="hero-label">Prendas asignadas</div><div class="hero-number">'+asignadas.length+'</div></div>'+
      '<div class="hero out"><div class="hero-label">Prendas dadas de baja</div><div class="hero-number">'+bajas.length+'</div></div>'+
    '</div>'+
    '<div class="stat-grid" style="margin-top:14px;">'+
      card('Total prendas',rows.length)+card('Disponibles bajas stock',alertas.length)+card('Asignadas a bomberos',asignadas.length)+card('En estado BAJA',bajas.length)+
    '</div>'+
    '<div class="card" style="margin-top:14px;"><strong>Centro de alertas de ropería</strong><div style="margin-top:8px;">'+
      (alertas.map(r=>'<div class="list-row"><strong>'+h(r.tipo_prenda||'')+'</strong> · talle '+h(r.talle||'')+' · disponible '+h(r.cantidad_disponible||0)+' / mínimo '+h(r.stock_minimo||0)+'</div>').join('')||'Sin alertas de ropería.')+
    '</div></div>';
    return;
  }
  const all=await Promise.all([
    safeSelect('moviles'),
    tableExists('v_stock_assignments_detail').then(x=>x?safeSelect('v_stock_assignments_detail'):[]),
    safeSelect('fallas'),
    safeSelect('repuestos'),
    safeSelect('novedades_materiales'),
    safeSelect('revisiones'),
    tableExists('controles_materiales').then(x=>x?safeSelect('controles_materiales'):[]),
    tableExists('v_stock_general').then(x=>x?safeSelect('v_stock_general'):[])
  ]);
  const mov=all[0],inv=all[1],fallas=all[2],repuestos=all[3],novedades=all[4],revisiones=all[5],controles=all[6],stockGeneral=all[7];
  const hoy=(new Date()).toDateString();
  const enServicio=mov.filter(x=>x.estado==='En servicio').length;
  const enMantenimiento=mov.filter(x=>x.estado==='En mantenimiento').length;
  const fueraServicio=mov.filter(x=>x.estado==='Fuera de servicio').length;
  const fallasCriticas=fallas.filter(f=>String(f.tipo_falla||'').toLowerCase().includes('crit'));
  const repuestosCriticos=repuestos.filter(r=>Number(r.stock_actual||0)<=Number(r.stock_minimo||0));
  const alertasMateriales=novedades.filter(n=>String(n.estado||'').toLowerCase()==='pendiente');
  const alertasStock=stockGeneral.filter(s=>s.alerta_minimo===true);
  const checklistHoy=revisiones.filter(r=>r.fecha_hora&&new Date(r.fecha_hora).toDateString()===hoy).length;
  const controlesHoy=controles.filter(r=>r.fecha_hora&&new Date(r.fecha_hora).toDateString()===hoy).length;
  let alertHtml='';
  if(canSeeAlerts()){
    alertHtml+=alertasMateriales.slice(0,6).map(n=>'<div class="list-row"><strong>Móvil '+h(n.movil||'')+'</strong> · '+h(n.material||'')+' · <span class="pill pill-bad">'+h(n.tipo_novedad||'Novedad')+'</span></div>').join('');
    alertHtml+=fallasCriticas.slice(0,4).map(f=>'<div class="list-row"><strong>Móvil '+h(f.movil||'')+'</strong> · '+h(f.componente||'')+' · <span class="pill pill-bad">Crítica</span></div>').join('');
    alertHtml+=alertasStock.slice(0,4).map(s=>'<div class="list-row"><strong>'+h(s.nombre||'')+'</strong> · disponible '+h(s.disponible_real)+' / mínimo '+h(s.stock_minimo)+' <span class="pill pill-bad">Stock bajo</span></div>').join('');
    if(!alertHtml) alertHtml='<div class="list-row">Sin alertas activas.</div>';
  }
  let extra='';
  if(perfilActual==='automotores'){
    const critic=mov.filter(m=>['En mantenimiento','Fuera de servicio'].includes(m.estado));
    extra='<div class="card" style="margin-top:14px;"><strong>Móviles comprometidos</strong><table style="margin-top:10px;"><thead><tr><th>Móvil</th><th>Patente</th><th>Modelo</th><th>Estado</th></tr></thead><tbody>'+
      (critic.map(m=>'<tr><td>'+h(m.numero)+'</td><td>'+h(m.patente||'')+'</td><td>'+h(m.modelo||'')+'</td><td>'+statusPill(m.estado)+'</td></tr>').join('')||'<tr><td colspan="4">No hay móviles fuera de servicio ni en mantenimiento.</td></tr>')+
      '</tbody></table></div>';
  }
  if(perfilActual==='materiales'){
    extra='<div class="card" style="margin-top:14px;"><strong>Novedades pendientes de revisión</strong><div style="margin-top:8px;">'+
      (alertasMateriales.map(n=>'<div class="list-row"><strong>'+h(n.material||'')+'</strong> · Móvil '+h(n.movil||'')+' · '+h(n.compartimiento||'')+' · '+h(n.tipo_novedad||'')+'</div>').join('')||'Sin novedades pendientes.')+
      '</div></div>';
  }
  els.content.innerHTML='<div class="hero-grid">'+
    '<div class="hero service"><div class="hero-label">Móviles en servicio</div><div class="hero-number">'+enServicio+'</div></div>'+
    '<div class="hero maint"><div class="hero-label">En mantenimiento</div><div class="hero-number">'+enMantenimiento+'</div></div>'+
    '<div class="hero out"><div class="hero-label">Fuera de servicio</div><div class="hero-number">'+fueraServicio+'</div></div>'+
  '</div>'+
  '<div class="stat-grid" style="margin-top:14px;">'+

async function guardia_activa(){
  els.title.textContent='Guardia activa';

  if(!(await tableExists('guardias_activas'))){
    els.content.innerHTML='<div class="card"><strong>Guardia activa</strong><div class="small" style="margin-top:8px;">No existe la tabla guardias_activas en Supabase.</div></div>';
    return;
  }

  if(!(await tableExists('guardia_personal'))){
    els.content.innerHTML='<div class="card"><strong>Guardia activa</strong><div class="err" style="margin-top:8px;">Falta crear la tabla guardia_personal en Supabase.</div></div>';
    return;
  }

  const puedeGestionarGuardia=['administrador','jefatura'].includes(perfilActual);
  const puedeRegistrarPresencia=['administrador','jefatura','bomberos'].includes(perfilActual);

  const all=await Promise.all([
    safeSelect('guardias_activas','fecha_inicio',false,20),
    safeSelect('bomberos'),
    safeSelect('guardia_personal','fecha_ingreso',false,300)
  ]);

  const rows=all[0];
  const bomberosData=all[1];
  const movimientos=all[2];

  const guardiaAbierta=rows.find(r=>String(r.estado||'').toLowerCase()==='activa')||null;

  const bomberosOrdenados=[...bomberosData].sort((a,b)=>{
    const na=(a.numero_j===null || a.numero_j===undefined || a.numero_j==='') ? 999999 : Number(a.numero_j);
    const nb=(b.numero_j===null || b.numero_j===undefined || b.numero_j==='') ? 999999 : Number(b.numero_j);
    if(na!==nb) return na-nb;
    return String(a.apellido||'').localeCompare(String(b.apellido||''),'es');
  });

  const presentes=guardiaAbierta
    ? movimientos.filter(x=>Number(x.guardia_id)===Number(guardiaAbierta.id) && String(x.estado||'').toLowerCase()==='activo')
    : [];

  let html='';

  if(puedeGestionarGuardia){
    html+='<div class="card" style="margin-bottom:12px;">'+
      '<strong>Guardia general</strong>'+
      '<form id="fGuardiaGeneral" class="grid" style="grid-template-columns:repeat(auto-fit,minmax(180px,1fr));margin-top:12px;">'+
        '<input name="nombre" placeholder="Nombre de guardia" '+(guardiaAbierta?'value="'+h(guardiaAbierta.nombre||'')+'"':'')+' required>'+
        '<input name="responsable" placeholder="Responsable" '+(guardiaAbierta?'value="'+h(guardiaAbierta.responsable||'')+'"':'')+' required>'+
        '<button class="primary" type="submit">'+(guardiaAbierta?'Cambiar guardia activa':'Abrir guardia')+'</button>'+
      '</form>'+
      (guardiaAbierta?'<button id="btnCerrarGuardiaGeneral" class="secondary" type="button" style="margin-top:12px;">Cerrar guardia general</button>':'')+
    '</div>';
  }

  if(guardiaAbierta && puedeRegistrarPresencia){
    html+='<div class="card" style="margin-bottom:12px;">'+
      '<strong>Registrar presencia</strong>'+
      '<div class="small" style="margin-top:6px;">Guardia activa: '+h(guardiaAbierta.nombre||'')+'</div>'+
      '<form id="fPresenciaGuardia" class="grid" style="grid-template-columns:repeat(auto-fit,minmax(220px,1fr));margin-top:12px;">'+
        '<select name="bombero_id" required>'+
          '<option value="">Seleccionar bombero</option>'+
          bomberosOrdenados.map(b=>{
            const yaPresente=presentes.some(p=>Number(p.bombero_id)===Number(b.id));
            return '<option value="'+b.id+'" '+(yaPresente?'disabled':'')+'>'+
              h((b.numero_j||'')+' · '+(b.jerarquia||'')+' · '+(b.apellido||'')+', '+(b.nombre||''))+
              (yaPresente?' (ya presente)':'')+
            '</option>';
          }).join('')+
        '</select>'+
        '<button class="primary" type="submit">Marcar ingreso</button>'+
      '</form>'+
    '</div>';
  }

  html+='<div class="grid" style="grid-template-columns:1fr 1fr;gap:12px;">';

  html+='<div class="card"><strong>Personal actualmente en guardia</strong><div style="margin-top:12px;">'+
    (guardiaAbierta
      ? (
          presentes.map(p=>{
            const b=bomberosOrdenados.find(x=>Number(x.id)===Number(p.bombero_id));
            return '<div class="list-row">'+
              '<strong>'+(b?h((b.numero_j||'')+' · '+(b.jerarquia||'')+' · '+(b.apellido||'')+', '+(b.nombre||'')):'Sin identificar')+'</strong>'+
              '<div class="small">Ingreso: '+h(new Date(p.fecha_ingreso||Date.now()).toLocaleString('es-AR'))+'</div>'+
              (puedeRegistrarPresencia?'<button class="secondary cerrar-presencia" data-id="'+p.id+'" style="margin-top:8px;">Cerrar mi presencia</button>':'')+
            '</div>';
          }).join('') || 'Sin personal presente.'
        )
      : 'No hay guardia activa abierta.'
    )+
  '</div></div>';

  html+='<div class="card"><strong>Últimos movimientos</strong><div style="margin-top:12px;">'+
    (movimientos.slice(0,20).map(m=>{
      const b=bomberosOrdenados.find(x=>Number(x.id)===Number(m.bombero_id));
      return '<div class="list-row">'+
        '<strong>'+(b?h((b.numero_j||'')+' · '+(b.apellido||'')+', '+(b.nombre||'')):'Sin identificar')+'</strong>'+
        '<div class="small">Ingreso: '+h(new Date(m.fecha_ingreso||Date.now()).toLocaleString('es-AR'))+'</div>'+
        (m.fecha_salida?'<div class="small">Salida: '+h(new Date(m.fecha_salida).toLocaleString('es-AR'))+'</div>':'<div class="small">Aún en guardia</div>')+
      '</div>';
    }).join('') || 'Sin movimientos registrados.')+
  '</div></div>';

  html+='</div>';

  html+='<div class="card" style="margin-top:12px;"><table><thead><tr><th>Nombre</th><th>Responsable</th><th>Inicio</th><th>Fin</th><th>Estado</th></tr></thead><tbody>'+
    (rows.map(r=>'<tr><td>'+h(r.nombre||'')+'</td><td>'+h(r.responsable||'')+'</td><td>'+h(new Date(r.fecha_inicio||Date.now()).toLocaleString('es-AR'))+'</td><td>'+h(r.fecha_fin?new Date(r.fecha_fin).toLocaleString('es-AR'):'')+'</td><td>'+statusPill(r.estado||'')+'</td></tr>').join('')||'<tr><td colspan="5">Sin guardias.</td></tr>')+
    '</tbody></table></div>';

  els.content.innerHTML=html;

  const formGuardia=document.getElementById('fGuardiaGeneral');
  if(formGuardia){
    formGuardia.addEventListener('submit',async e=>{
      e.preventDefault();

      const fd=new FormData(formGuardia);
      const activas=rows.filter(r=>String(r.estado||'').toLowerCase()==='activa');

      for(const a of activas){
        await updateRows('guardias_activas',{
          estado:'cerrada',
          fecha_fin:new Date().toISOString()
        },a.id);
      }

      await insertRow('guardias_activas',{
        nombre:fd.get('nombre'),
        responsable:fd.get('responsable'),
        fecha_inicio:new Date().toISOString(),
        estado:'activa'
      });

      await audit('crear','guardia_activa',{
        nombre:fd.get('nombre'),
        responsable:fd.get('responsable')
      });

      await loadGuardiaActiva();
      showFlash('Guardia general abierta','ok');
      guardia_activa();
    });
  }

  const btnCerrarGuardiaGeneral=document.getElementById('btnCerrarGuardiaGeneral');
  if(btnCerrarGuardiaGeneral && guardiaAbierta){
    btnCerrarGuardiaGeneral.addEventListener('click',async()=>{
      await updateRows('guardias_activas',{
        estado:'cerrada',
        fecha_fin:new Date().toISOString()
      },guardiaAbierta.id);

      for(const p of presentes){
        await updateRows('guardia_personal',{
          estado:'cerrado',
          fecha_salida:new Date().toISOString()
        },p.id);
      }

      await audit('cerrar','guardia_activa',{id:guardiaAbierta.id});
      await loadGuardiaActiva();
      showFlash('Guardia general cerrada','ok');
      guardia_activa();
    });
  }

  const formPresencia=document.getElementById('fPresenciaGuardia');
  if(formPresencia && guardiaAbierta){
    formPresencia.addEventListener('submit',async e=>{
      e.preventDefault();

      const fd=new FormData(formPresencia);
      const bomberoId=Number(fd.get('bombero_id')||0);

      if(!bomberoId){
        showFlash('Seleccioná un bombero','err');
        return;
      }

      const bombero=bomberosOrdenados.find(x=>Number(x.id)===bomberoId);
      const yaPresente=presentes.find(p=>Number(p.bombero_id)===bomberoId);

      if(yaPresente){
        showFlash('Ese bombero ya está presente en la guardia','err');
        return;
      }

      await insertRow('guardia_personal',{
        guardia_id:guardiaAbierta.id,
        bombero_id:bomberoId,
        numero_j:bombero?.numero_j || null,
        fecha_ingreso:new Date().toISOString(),
        estado:'activo'
      });

      await audit('crear','guardia_personal',{
        guardia_id:guardiaAbierta.id,
        bombero_id:bomberoId
      });

      showFlash('Presencia registrada','ok');
      guardia_activa();
    });
  }

  document.querySelectorAll('.cerrar-presencia').forEach(btn=>{
    btn.addEventListener('click',async()=>{
      await updateRows('guardia_personal',{
        estado:'cerrado',
        fecha_salida:new Date().toISOString()
      },Number(btn.dataset.id));

      await audit('cerrar','guardia_personal',{id:Number(btn.dataset.id)});
      showFlash('Salida registrada','ok');
      guardia_activa();
    });
  });
}

      '<select name="neumaticos"><option value="OK">Neumáticos OK</option><option value="FALLA">Neumáticos FALLA</option></select>'+

  }

  html+='</div><div class="card" style="margin-top:12px;"><strong>Últimos checklist diarios</strong><div style="margin-top:8px;">'+
    (rows.map(r=>'<div class="list-row"><strong>Móvil '+h(r.movil||'')+'</strong> · '+h(new Date(r.fecha_hora||Date.now()).toLocaleString('es-AR'))+' · '+h(r.responsable||r.bombero||'')+'</div>').join('')||'Sin checklist diarios.')+
  '</div></div>';

  els.content.innerHTML=html;

  const form=document.getElementById('fChecklistDiario');

async function checklist_materiales(){
  els.title.textContent='Control diario materiales';

  if(!(await tableExists('v_stock_assignments_detail'))){
    els.content.innerHTML='<div class="err">No existe la vista v_stock_assignments_detail.</div>';
    return;
  }

  const controlesExiste=await tableExists('controles_materiales');
  const novedadesExiste=await tableExists('novedades_materiales');

  const all=await Promise.all([
    safeSelect('moviles','numero',true),
    safeSelect('bomberos'),
    safeSelect('v_stock_assignments_detail','movil',true),
    controlesExiste ? safeSelect('controles_materiales','fecha_hora',false,10) : [],
    novedadesExiste ? safeSelect('novedades_materiales','id',false,10) : []
  ]);

  const movs=all[0]||[];
  const boms=(all[1]||[]).sort((a,b)=>{
    const na=(a.numero_j===null || a.numero_j===undefined || a.numero_j==='') ? 999999 : Number(a.numero_j);
    const nb=(b.numero_j===null || b.numero_j===undefined || b.numero_j==='') ? 999999 : Number(b.numero_j);
    if(na!==nb) return na-nb;
    return String(a.apellido||'').localeCompare(String(b.apellido||''),'es');
  });
  const inventario=all[2]||[];
  const controles=all[3]||[];
  const novedades=all[4]||[];

  if(!movs.length){
    els.content.innerHTML='<div class="card"><strong>Control diario materiales</strong><div class="small" style="margin-top:8px;">No hay móviles cargados todavía.</div></div>';
    return;
  }

  let html='<div class="card">'+
    '<strong>Registrar control de materiales</strong>'+
    '<form id="fcheckMat" class="grid" style="margin-top:12px;">'+
      '<select name="movil" id="checkMovil">'+movs.map(m=>'<option value="'+h(m.numero)+'">Móvil '+h(m.numero)+'</option>').join('')+'</select>'+
      '<select name="bombero" required>'+boms.map(b=>{const nombre=((b.numero_j||'')+' · '+(b.jerarquia||'')+' · '+(b.apellido||'')+' '+(b.nombre||'')).trim();return '<option value="'+h(nombre)+'">'+h(nombre)+'</option>'}).join('')+'</select>'+
      '<div id="checkItems"></div>'+
      '<textarea name="comentarios" placeholder="Observaciones generales del control"></textarea>'+
      '<button class="primary" type="submit">Registrar control de materiales</button>'+
    '</form>'+
  '</div>';

  html+='<div class="card" style="margin-top:12px;">'+
    '<strong>Reportar material faltante o dañado</strong>';

  if(novedadesExiste){
    html+='<form id="fNovedad" class="grid" style="grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); margin-top:12px;">'+
      '<select name="movil" id="novMovil">'+movs.map(m=>'<option value="'+h(m.numero)+'">Móvil '+h(m.numero)+'</option>').join('')+'</select>'+
      '<select name="compartimiento" id="novComp"></select>'+
      '<select name="material" id="novMaterial"></select>'+
      '<input name="cantidad" type="number" min="1" value="1" placeholder="Cantidad">'+
      '<select name="tipo_novedad"><option>Faltante</option><option>Dañado</option></select>'+
      '<textarea name="detalle" placeholder="Detalle de la novedad" required></textarea>'+
      '<button class="primary" type="submit">Registrar novedad</button>'+
    '</form>';
  } else {
    html+='<div class="err" style="margin-top:12px;">No existe la tabla novedades_materiales. Por eso no se puede registrar faltante o dañado.</div>';
  }

  html+='</div>';

  html+='<div class="grid" style="grid-template-columns:1fr 1fr; margin-top:12px;">'+
    '<div class="card"><strong>Últimos controles</strong><div style="margin-top:8px;">'+
      (controles.map(r=>'<div class="list-row"><strong>Móvil '+h(r.movil)+'</strong> · '+h(r.responsable||r.bombero||'Sin responsable')+'</div>').join('')||'Sin controles.')+
    '</div></div>'+
    '<div class="card"><strong>Últimas novedades</strong><div style="margin-top:8px;">'+
      (novedades.map(n=>'<div class="list-row">Móvil '+h(n.movil)+' · '+h(n.compartimiento)+' · '+h(n.material)+' · '+h(n.tipo_novedad)+' · '+h(n.detalle||'')+' <span class="pill '+(String(n.estado||'').toLowerCase()==='cerrada'?'pill-ok':'pill-bad')+'">'+h(n.estado||'pendiente')+'</span>'+(canManageNovedades()?'<button class="secondary cerrar-nov" data-id="'+n.id+'" style="margin-left:8px;">'+(String(n.estado||'').toLowerCase()==='cerrada'?'Reabrir':'Cerrar')+'</button>':'')+'</div>').join('')||'Sin novedades.')+
    '</div></div>'+
  '</div>';

  els.content.innerHTML=html;

  const checkMovil=document.getElementById('checkMovil');
  const novMovil=document.getElementById('novMovil');
  const novComp=document.getElementById('novComp');
  const novMaterial=document.getElementById('novMaterial');
  const checkItems=document.getElementById('checkItems');

  function renderChecklistItems(movil){
    const items=inventario.filter(i=>String(i.movil)===String(movil)&&String(i.estado_asignacion||'').toUpperCase()==='ACTIVA');

    if(!items.length){
      checkItems.innerHTML='<div class="card"><strong>Sin materiales asignados</strong><div class="small" style="margin-top:8px;">Ese móvil no tiene materiales activos cargados en la vista de inventario por móvil.</div></div>';
      return;
    }

    checkItems.innerHTML='<div class="card"><strong>Control por material y cantidad</strong><div style="margin-top:12px;">'+
      items.map((i,idx)=>'<div class="list-row"><div><strong>'+h(i.compartimiento||'Sin compartimiento')+'</strong> · '+h(i.nombre)+' · Cantidad esperada: '+h(i.cantidad)+'</div><div class="grid" style="grid-template-columns:1fr 140px; margin-top:8px; align-items:center;"><label>Cantidad verificada</label><input type="number" name="cantidad_verificada_'+idx+'" min="0" value="'+h(i.cantidad)+'"></div></div>').join('')+
    '</div></div>';
  }

  function fillNovedadSelectors(movil){
    if(!novComp || !novMaterial) return;

    const items=inventario.filter(i=>String(i.movil)===String(movil)&&String(i.estado_asignacion||'').toUpperCase()==='ACTIVA');
    const comps=Array.from(new Set(items.map(i=>i.compartimiento||'Sin compartimiento')));

    novComp.innerHTML=comps.map(c=>'<option value="'+h(c)+'">'+h(c)+'</option>').join('');
    refillMaterials();
  }

  function refillMaterials(){
    if(!novComp || !novMaterial) return;

    const items=inventario.filter(i=>String(i.movil)===String(novMovil.value)&&String(i.compartimiento||'Sin compartimiento')===String(novComp.value)&&String(i.estado_asignacion||'').toUpperCase()==='ACTIVA');

    novMaterial.innerHTML=items.map(i=>'<option value="'+h(i.nombre)+'" data-stock-item-id="'+h(i.stock_item_id)+'">'+h(i.nombre)+'</option>').join('');
  }

  renderChecklistItems(checkMovil.value);

  checkMovil.addEventListener('change',()=>renderChecklistItems(checkMovil.value));

  if(novMovil && novComp && novMaterial){
    fillNovedadSelectors(novMovil.value);
    novMovil.addEventListener('change',()=>fillNovedadSelectors(novMovil.value));
    novComp.addEventListener('change',refillMaterials);
  }

  if(canEditChecklistMateriales()){

        const resumen=items.map((i,idx)=>{

        }).join(' | ');

        if(!controlesExiste){
          showFlash('No existe la tabla controles_materiales en Supabase.','err');
          return;
        }

        await insertRow('controles_materiales',{
          movil:fd.get('movil'),
          responsable:fd.get('bombero'),
          resumen,
          observaciones:fd.get('comentarios'),
          fecha_hora:new Date().toISOString()
        });

        await audit('crear','control_materiales',{movil:fd.get('movil')});
        showFlash('Control de materiales registrado','ok');
        checklist_materiales();
      });
    }

    const formNovedad=document.getElementById('fNovedad');
    if(formNovedad){
      formNovedad.addEventListener('submit',async e=>{
        e.preventDefault();
        if(!requireGuardia()) return;

        const fd=new FormData(e.target);
        const items=inventario.filter(i=>String(i.movil)===String(fd.get('movil'))&&String(i.compartimiento||'Sin compartimiento')===String(fd.get('compartimiento'))&&String(i.nombre)===String(fd.get('material'))&&String(i.estado_asignacion||'').toUpperCase()==='ACTIVA');
        const item=items[0];

        const payload={
          movil:fd.get('movil'),
          compartimiento:fd.get('compartimiento'),
          material:fd.get('material'),
          cantidad:Number(fd.get('cantidad')||1),
          tipo_novedad:fd.get('tipo_novedad'),
          detalle:fd.get('detalle'),
          estado:'pendiente',
          estado_revision:'PENDIENTE',
          fecha_hora:new Date().toISOString(),
          reportado_por:canBombero()?'Bomberos':perfilActual
        };

        const res=await sb.from('novedades_materiales').insert(payload);
        if(res.error) return alert(res.error.message);

        if(item && item.id) await updateRows('stock_assignments',{estado_asignacion:'PENDIENTE'},item.id);

        await audit('crear','novedad_material',payload);
        showFlash('Novedad registrada y descontada del activo','ok');
        checklist_materiales();
      });
    }
  }

  if(canManageNovedades()){
    document.querySelectorAll('.cerrar-nov').forEach(btn=>btn.addEventListener('click',async()=>{
      const item=novedades.find(n=>String(n.id)===btn.dataset.id);
      const nuevoEstado=String(item.estado||'').toLowerCase()==='cerrada'?'pendiente':'cerrada';
      await updateRows('novedades_materiales',{estado:nuevoEstado,estado_revision:nuevoEstado==='cerrada'?'REVISADA':'PENDIENTE'},Number(btn.dataset.id));
      await audit('editar','novedad_material',{id:Number(btn.dataset.id),estado:nuevoEstado});
      showFlash('Novedad actualizada','ok');
      checklist_materiales();
    }));
  }
}

  const bomberos=(await tableExists('bomberos'))? await safeSelect('bomberos','apellido',true):[];
  const rows=await safeSelect('roperia_items','asignado_a',true);
  const nombresBomberos=bomberos.map(b=>((b.jerarquia||'')+' '+(b.apellido||'')+' '+(b.nombre||'')).trim()).filter(Boolean);
  els.content.innerHTML='<div class="card"><div class="grid" style="grid-template-columns:280px 220px; align-items:end;"><div><label class="small">Bombero</label><select id="repBombero" style="margin-top:8px;"><option value="">Todos</option>'+nombresBomberos.map(n=>'<option value="'+h(n)+'">'+h(n)+'</option>').join('')+'</select></div><div><button id="expBomberoCsv" class="primary" type="button">Exportar informe por bombero</button></div></div><div id="repBomberoWrap" style="margin-top:14px;"></div></div>';
  const sel=document.getElementById('repBombero');
  const wrap=document.getElementById('repBomberoWrap');
  function render(){const filtered=rows.filter(r=>!sel.value || String(r.asignado_a||'')===String(sel.value)); wrap.innerHTML='<table><thead><tr><th>Bombero</th><th>Prenda</th><th>Talle</th><th>Estado</th><th>Observaciones</th></tr></thead><tbody>'+(filtered.map(r=>'<tr><td>'+h(r.asignado_a||'Sin asignar')+'</td><td><strong>'+h(r.tipo_prenda||'')+'</strong><div class="small">'+h(r.descripcion||'')+'</div></td><td>'+h(r.talle||'')+'</td><td>'+statusPill(r.estado||'')+'</td><td>'+h(r.observaciones||'')+'</td></tr>').join('')||'<tr><td colspan="5">Sin datos para el filtro seleccionado.</td></tr>')+'</tbody></table>';}
  render(); sel.addEventListener('change',render);
  document.getElementById('expBomberoCsv').addEventListener('click',()=>{const filtered=rows.filter(r=>!sel.value || String(r.asignado_a||'')===String(sel.value)).map(r=>({bombero:r.asignado_a||'',tipo_prenda:r.tipo_prenda||'',descripcion:r.descripcion||'',talle:r.talle||'',estado:r.estado||'',observaciones:r.observaciones||''})); downloadText('informe_roperia_por_bombero.csv',csv(filtered),'text/csv;charset=utf-8');});
}

async function respaldo(){
  els.title.textContent='Importar / exportar';
  els.content.innerHTML='<div class="card"><div class="toolbar"><button id="btnExport" class="secondary" '+(canBackup()?'':'disabled')+'>Exportar respaldo JSON</button><input id="fileImport" type="file" accept="application/json" '+(canBackup()?'':'disabled')+'></div><div class="small" style="margin-top:12px;">Solo el perfil Administrador puede importar o exportar respaldos.</div></div>';
  if(!canBackup()) return;
  document.getElementById('btnExport').addEventListener('click',async()=>{const tables=['moviles','bomberos','revisiones','mantenimientos','fallas','repuestos','proveedores','novedades_materiales','stock_items','stock_assignments','maintenance_control','stock_decommissions','roperia_items','guardias_activas'];const payload={exported_at:new Date().toISOString()};for(const t of tables){if(await tableExists(t))payload[t]=await safeSelect(t);}downloadText('respaldo_cuartel.json',JSON.stringify(payload,null,2),'application/json')});
  document.getElementById('fileImport').addEventListener('change',async e=>{const file=e.target.files[0];if(!file)return;const data=JSON.parse(await file.text());for(const [table,rows] of Object.entries(data)){if(table==='exported_at'||!Array.isArray(rows)||!rows.length)continue;try{await sb.from(table).upsert(rows)}catch(err){console.warn('No se pudo importar',table,err)}}showFlash('Respaldo importado','ok')});
}

async function estadisticas(){
  els.title.textContent='Estadísticas';
  const all=await Promise.all([safeSelect('moviles'),safeSelect('revisiones'),safeSelect('fallas'),safeSelect('repuestos'),safeSelect('novedades_materiales'),tableExists('v_stock_general').then(x=>x?safeSelect('v_stock_general'):[]),tableExists('roperia_items').then(x=>x?safeSelect('roperia_items'):[])]);
  const mov=all[0],rev=all[1],fallas=all[2],repuestos=all[3],novedades=all[4],stockGeneral=all[5],rop=all[6];
  const fallasCriticas=fallas.filter(f=>String(f.tipo_falla||'').toLowerCase().includes('crit')); const fueraServicio=mov.filter(m=>String(m.estado||'').toLowerCase()==='fuera de servicio'); const repuestosCriticos=repuestos.filter(r=>Number(r.stock_actual||0)<=Number(r.stock_minimo||0)); const faltantes=novedades.filter(n=>String(n.tipo_novedad||'').toLowerCase()==='faltante'); const daniados=novedades.filter(n=>String(n.tipo_novedad||'').toLowerCase()==='dañado'); const pendientes=novedades.filter(n=>String(n.estado||'').toLowerCase()==='pendiente'); const cerradas=novedades.filter(n=>String(n.estado||'').toLowerCase()==='cerrada'); const alertasStock=stockGeneral.filter(s=>s.alerta_minimo===true); const alertasRoperia=rop.filter(r=>!r.sin_stock_minimo && Number(r.cantidad_disponible||0)<=Number(r.stock_minimo||0));
  els.content.innerHTML='<div class="stat-grid">'+card('Total de checklist',rev.length)+card('Fallas críticas',fallasCriticas.length)+card('Móviles fuera de servicio',fueraServicio.length)+card('Repuestos con alerta',repuestosCriticos.length)+card('Materiales faltantes',faltantes.length)+card('Materiales dañados',daniados.length)+card('Novedades pendientes',pendientes.length)+card('Novedades cerradas',cerradas.length)+card('Alertas stock general',alertasStock.length)+card('Alertas ropería',alertasRoperia.length)+'</div>';
}

async function novedades(){
  els.title.textContent='Novedades'; const rows=await safeSelect('novedades_materiales'); const abiertas=rows.filter(r=>String(r.estado||'').toLowerCase()==='pendiente'); const cerradas=rows.filter(r=>String(r.estado||'').toLowerCase()==='cerrada');
  els.content.innerHTML='<div class="stat-grid">'+card('Pendientes',abiertas.length)+card('Cerradas',cerradas.length)+card('Faltantes',rows.filter(r=>String(r.tipo_novedad||'').toLowerCase()==='faltante').length)+card('Dañados',rows.filter(r=>String(r.tipo_novedad||'').toLowerCase()==='dañado').length)+'</div><div class="card" style="margin-top:12px;"><strong>Gestión de novedades</strong><table style="margin-top:12px;"><thead><tr><th>Fecha</th><th>Móvil</th><th>Compartimiento</th><th>Material</th><th>Tipo</th><th>Detalle</th><th>Estado</th>'+(canManageNovedades()?'<th>Acciones</th>':'')+'</tr></thead><tbody>'+(rows.map(r=>'<tr><td>'+h(new Date(r.fecha_hora||Date.now()).toLocaleString('es-AR'))+'</td><td>Móvil '+h(r.movil)+'</td><td>'+h(r.compartimiento)+'</td><td>'+h(r.material)+'</td><td>'+h(r.tipo_novedad)+'</td><td>'+h(r.detalle||'')+'</td><td>'+(String(r.estado||'').toLowerCase()==='cerrada'?'<span class="pill pill-ok">Cerrada</span>':'<span class="pill pill-bad">Pendiente</span>')+'</td>'+(canManageNovedades()?'<td>'+(String(r.estado||'').toLowerCase()==='pendiente'?'<button class="secondary cerrar-nov-tabla" data-id="'+r.id+'">Cerrar</button>':'<button class="secondary reabrir-nov-tabla" data-id="'+r.id+'">Reabrir</button>')+(canAdmin()?' <button class="danger del-nov-tabla" data-id="'+r.id+'">Borrar</button>':'')+'</td>':'')+'</tr>').join('')||'<tr><td colspan="8">Sin novedades registradas.</td></tr>')+'</tbody></table></div>';
  if(!canManageNovedades()) return;
  document.querySelectorAll('.cerrar-nov-tabla').forEach(btn=>btn.addEventListener('click',async()=>{await updateRows('novedades_materiales',{estado:'cerrada',estado_revision:'REVISADA'},Number(btn.dataset.id));await audit('cerrar','novedad_material',{id:Number(btn.dataset.id)});showFlash('Novedad cerrada','ok');novedades()}));
  document.querySelectorAll('.reabrir-nov-tabla').forEach(btn=>btn.addEventListener('click',async()=>{await updateRows('novedades_materiales',{estado:'pendiente',estado_revision:'PENDIENTE'},Number(btn.dataset.id));await audit('reabrir','novedad_material',{id:Number(btn.dataset.id)});showFlash('Novedad reabierta','ok');novedades()}));
  if(canAdmin()) document.querySelectorAll('.del-nov-tabla').forEach(btn=>btn.addEventListener('click',async()=>{if(!confirm('¿Eliminar novedad?'))return;await deleteRow('novedades_materiales',Number(btn.dataset.id));await audit('eliminar','novedad_material',{id:Number(btn.dataset.id)});showFlash('Novedad eliminada','ok');novedades()}));
}

async function auditoria(){
  els.title.textContent='Auditoría';
  if(!(await tableExists('audit_logs'))){els.content.innerHTML='<div class="card"><strong>Auditoría</strong><div class="small" style="margin-top:8px;">No existe la tabla audit_logs. El sistema puede seguir usándose, pero no va a registrar historial hasta que la crees en Supabase.</div></div>';return;}

}

async function reportes_stock(){
  els.title.textContent='Reportes de stock';
  const all=await Promise.all([tableExists('v_stock_general').then(x=>x?safeSelect('v_stock_general','nombre',true):[]),tableExists('v_stock_assignments_detail').then(x=>x?safeSelect('v_stock_assignments_detail','movil',true):[]),tableExists('v_maintenance_control_detail').then(x=>x?safeSelect('v_maintenance_control_detail','fecha_ingreso',false):[]),tableExists('v_stock_decommissions_detail').then(x=>x?safeSelect('v_stock_decommissions_detail','fecha_baja',false):[])]);

  els.content.innerHTML='<div class="card"><strong>Exportación de reportes</strong><div class="small" style="margin-top:8px;">Descargá reportes del stock maestro, stock asignado a móviles, mantenimiento y bajas.</div><div class="grid" style="grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); margin-top:16px;"><button id="expStockCsv" class="primary" type="button">Exportar stock general CSV</button><button id="expStockXlsx" class="secondary" type="button">Exportar stock general XLSX</button><button id="expAsignCsv" class="primary" type="button">Exportar stock por móvil CSV</button><button id="expMaintCsv" class="primary" type="button">Exportar mantenimiento CSV</button><button id="expBajasCsv" class="secondary" type="button">Exportar bajas CSV</button></div></div>';
  const stockRows=stock.map(r=>({codigo_interno:r.codigo_interno||'',nombre:r.nombre,categoria:r.categoria||'',marca:r.marca||'',modelo:r.modelo||'',numero_serie:r.numero_serie||'',cantidad_total:r.cantidad_total,asignado_moviles:r.asignado_moviles,en_reparacion:r.en_reparacion,en_baja:r.en_baja,disponible_real:r.disponible_real,stock_minimo:r.stock_minimo,sin_stock_minimo:r.sin_stock_minimo,alerta_minimo:r.alerta_minimo}));

  document.getElementById('expAsignCsv').addEventListener('click',()=>downloadText('stock_por_movil.csv',csv(assignments),'text/csv;charset=utf-8'));
  document.getElementById('expMaintCsv').addEventListener('click',()=>downloadText('control_mantenimiento.csv',csv(maint),'text/csv;charset=utf-8'));
  document.getElementById('expBajasCsv').addEventListener('click',()=>downloadText('archivo_bajas.csv',csv(bajas),'text/csv;charset=utf-8'));

async function diagnostico(){
  els.title.textContent='Diagnóstico'; const lines=[]; async function run(label,fn){try{const result=await fn();lines.push('OK - '+label+(result?': '+result:''))}catch(err){lines.push('ERROR - '+label+': '+(err&&err.message?err.message:String(err)))}};
  await run('Auth',async()=>{const res=await sb.auth.getSession();if(res.error)throw res.error;return res.data.session?'sesión activa':'sin sesión'});
  for(const t of ['moviles','bomberos','revisiones','fallas','repuestos','proveedores','novedades_materiales','mantenimientos','stock_items','stock_assignments','maintenance_control','stock_decommissions','roperia_items','audit_logs','guardias_activas']) await run(t,async()=> String((await tableExists(t))));
  for(const v of ['v_stock_general','v_stock_assignments_detail','v_maintenance_control_detail','v_stock_decommissions_detail']) await run(v,async()=> String((await tableExists(v))));
  els.content.innerHTML='<div class="err" style="background:#0f172a;border-color:#334155;color:#e2e8f0;">'+h(lines.join('\n'))+'</div>';
}

async function guardia(){
  els.title.textContent='Modo guardia';
  const all=await Promise.all([safeSelect('moviles'),safeSelect('fallas'),safeSelect('repuestos'),safeSelect('novedades_materiales'),safeSelect('revisiones'),tableExists('v_stock_general').then(x=>x?safeSelect('v_stock_general'):[])]); const mov=all[0],fallas=all[1],repuestos=all[2],novedades=all[3],revisiones=all[4],stockGeneral=all[5];
  const enServicio=mov.filter(m=>m.estado==='En servicio').length, enMantenimiento=mov.filter(m=>m.estado==='En mantenimiento').length, fueraServicio=mov.filter(m=>m.estado==='Fuera de servicio').length, criticas=fallas.filter(f=>String(f.tipo_falla||'').toLowerCase().includes('crit')), repuestosCriticos=repuestos.filter(r=>Number(r.stock_actual||0)<=Number(r.stock_minimo||0)), pendientes=novedades.filter(n=>String(n.estado||'').toLowerCase()==='pendiente'), stockCritico=stockGeneral.filter(s=>s.alerta_minimo===true), ultimaRevision=revisiones[0]?new Date(revisiones[0].fecha_hora||Date.now()).toLocaleString('es-AR'):'Sin registros';
  const alertasHtml=(criticas.slice(0,6).map(f=>'<div class="list-row"><strong>Móvil '+h(f.movil)+'</strong> · '+h(f.componente)+' <span class="pill pill-bad">Crítica</span></div>').join(''))+(pendientes.slice(0,6).map(n=>'<div class="list-row"><strong>Móvil '+h(n.movil)+'</strong> · '+h(n.material)+' <span class="pill pill-bad">'+h(n.tipo_novedad)+'</span></div>').join(''))+(repuestosCriticos.slice(0,4).map(r=>'<div class="list-row"><strong>'+h(r.nombre)+'</strong> · stock '+h(r.stock_actual)+'/'+h(r.stock_minimo)+' <span class="pill pill-warn">Repuesto</span></div>').join(''))+(stockCritico.slice(0,4).map(s=>'<div class="list-row"><strong>'+h(s.nombre)+'</strong> · stock general bajo mínimo <span class="pill pill-bad">Stock</span></div>').join(''));
  const totalAlertas=criticas.length+pendientes.length+repuestosCriticos.length+stockCritico.length;
  els.content.innerHTML='<div class="guardia-wrap"><div class="toolbar"><button id="refreshGuardia" class="primary" type="button">Actualizar</button><button id="autoGuardia" class="secondary" type="button">Auto 60 s: ON</button></div><div class="guardia-grid" style="margin-top:14px;"><div class="guardia-card"><div class="guardia-label">Móviles en servicio</div><div class="guardia-number">'+enServicio+'</div></div><div class="guardia-card"><div class="guardia-label">En mantenimiento</div><div class="guardia-number">'+enMantenimiento+'</div></div><div class="guardia-card"><div class="guardia-label">Fuera de servicio</div><div class="guardia-number">'+fueraServicio+'</div></div><div class="guardia-card"><div class="guardia-label">Alertas activas</div><div class="guardia-number">'+totalAlertas+'</div></div></div><div class="guardia-list"><div class="guardia-card"><div class="guardia-label">Alertas prioritarias</div><div style="margin-top:8px;">'+(alertasHtml||'<div class="list-row"><span class="pill pill-ok">Sin alertas</span></div>')+'</div></div><div class="guardia-card"><div class="guardia-label">Resumen de guardia</div><div class="list-row">Total de móviles: <strong>'+mov.length+'</strong></div><div class="list-row">Fallas críticas: <strong>'+criticas.length+'</strong></div><div class="list-row">Novedades pendientes: <strong>'+pendientes.length+'</strong></div><div class="list-row">Repuestos bajo mínimo: <strong>'+repuestosCriticos.length+'</strong></div><div class="list-row">Stock general bajo mínimo: <strong>'+stockCritico.length+'</strong></div><div class="list-row">Última revisión: <strong>'+h(ultimaRevision)+'</strong></div></div></div></div>';
  window.__guardiaAuto=window.__guardiaAuto===undefined?true:window.__guardiaAuto; if(window.__guardiaTimer){clearInterval(window.__guardiaTimer);window.__guardiaTimer=null}
  document.getElementById('refreshGuardia').addEventListener('click',()=>guardia()); const autoBtn=document.getElementById('autoGuardia'); autoBtn.textContent=window.__guardiaAuto?'Auto 60 s: ON':'Auto 60 s: OFF'; autoBtn.addEventListener('click',()=>{window.__guardiaAuto=!window.__guardiaAuto;autoBtn.textContent=window.__guardiaAuto?'Auto 60 s: ON':'Auto 60 s: OFF';if(window.__guardiaTimer){clearInterval(window.__guardiaTimer);window.__guardiaTimer=null}if(window.__guardiaAuto){window.__guardiaTimer=setInterval(()=>{if(els.title.textContent==='Modo guardia')guardia()},60000)}}); if(window.__guardiaAuto){window.__guardiaTimer=setInterval(()=>{if(els.title.textContent==='Modo guardia')guardia()},60000)}
}

async function nav(sec){ if(!canView(sec)){showFlash('Ese perfil no tiene acceso a esta sección','err');return} activateNav(sec); if(sec==='dashboard')return dashboard(); if(sec==='guardia_activa')return guardia_activa(); if(sec==='moviles')return moviles(); if(sec==='bomberos')return bomberos(); if(sec==='inventario_general')return inventario_general(); if(sec==='asignaciones')return asignaciones(); if(sec==='inventario')return inventario(); if(sec==='plano')return plano(); if(sec==='fallas')return fallas(); if(sec==='checklist_diario')return checklist_diario(); if(sec==='checklist_materiales')return checklist_materiales(); if(sec==='mantenimiento_stock')return mantenimiento_stock(); if(sec==='archivo_bajas')return archivo_bajas(); if(sec==='repuestos')return repuestos(); if(sec==='proveedores')return proveedores(); if(sec==='mantenimiento')return mantenimiento(); if(sec==='roperia')return roperia(); if(sec==='roperia_inventario_general')return roperia_inventario_general(); if(sec==='roperia_informe_bombero')return roperia_informe_bombero(); if(sec==='respaldo')return respaldo(); if(sec==='estadisticas')return estadisticas(); if(sec==='novedades')return novedades(); if(sec==='auditoria')return auditoria(); if(sec==='reportes_stock')return reportes_stock(); if(sec==='diagnostico')return diagnostico(); if(sec==='guardia')return guardia(); }

async function init(){
  try{ if(!window.supabase||typeof window.supabase.createClient!=='function') throw new Error('No cargó la librería de Supabase.'); sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY); els.bootMsg.textContent='Sistema listo.'; authInputs(); els.perfil.addEventListener('change',authInputs); els.logout.addEventListener('click',logout); els.logoutTop.addEventListener('click',logout); document.querySelectorAll('.nav').forEach(btn=>btn.addEventListener('click',()=>nav(btn.dataset.sec))); els.loginForm.addEventListener('submit',async e=>{e.preventDefault(); perfilActual=els.perfil.value; try{ if(perfilActual==='bomberos') await loginBomberos(); else await loginAdmin(els.email.value,els.password.value,perfilActual); els.login.classList.add('hidden'); els.app.classList.remove('hidden'); els.userInfo.textContent=(userActual?.email||perfilActual)+' · rol '+perfilActual; await loadGuardiaActiva(); updateNavVisibility(); nav(perfilActual==='roperia'?'dashboard':(canBombero()?'checklist_materiales':'dashboard')); }catch(err){alert(err&&err.message?err.message:'No se pudo iniciar sesión.')}}) }catch(err){ els.bootMsg.textContent='Error de inicialización.'; showBootError(err&&err.message?err.message:String(err)); }
}
window.addEventListener('error',event=>showBootError(event&&event.message?event.message:'Script error')); window.addEventListener('unhandledrejection',event=>showBootError(event&&event.reason&&event.reason.message?event.reason.message:String((event&&event.reason)||'Promise error'))); init();
</script>
