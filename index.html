<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cuartel Online - Ezeiza</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    body{font-family:Arial,sans-serif;background:#020617;color:#e2e8f0;margin:0}
    .card{background:#0f172a;border:1px solid #334155;border-radius:16px;padding:16px}
    input,select,textarea{width:100%;box-sizing:border-box;background:#1e293b;border:1px solid #334155;color:#fff;border-radius:12px;padding:12px}
    button{cursor:pointer;border:none}
    .primary{background:#b91c1c;color:#fff;padding:12px;border-radius:12px;font-weight:700}
    .secondary{background:#1e293b;color:#fff;padding:10px 12px;border-radius:10px}
    .danger{background:#7f1d1d;color:#fff;padding:10px 12px;border-radius:10px}
    .nav{background:#111827;color:#e2e8f0;padding:10px 12px;border-radius:10px;text-align:left;margin-bottom:4px;width:100%}
    .nav.active{background:#991b1b;color:#fff}
    .hidden{display:none!important}.grid{display:grid;gap:12px}.small{font-size:12px;color:#94a3b8}
    .list-row{padding:10px 0;border-bottom:1px solid #334155}
    .ok{background:#052e16;border:1px solid #166534;color:#bbf7d0;border-radius:12px;padding:12px}
    .err{background:#450a0a;border:1px solid #7f1d1d;color:#fecaca;border-radius:12px;padding:12px}
    .pill{display:inline-block;font-size:11px;padding:2px 8px;border-radius:999px}
    .pill-ok{background:#052e16;color:#bbf7d0}.pill-warn{background:#78350f;color:#fde68a}.pill-bad{background:#450a0a;color:#fecaca}
    table{width:100%;border-collapse:collapse}th,td{padding:10px;border-bottom:1px solid #334155;text-align:left}th{color:#94a3b8;font-size:12px;text-transform:uppercase}
    .status-big{border-radius:18px;padding:18px;border:1px solid #334155}
    .status-service{background:#052e16;border-color:#166534}.status-maint{background:#3b2a05;border-color:#92400e}.status-out{background:#450a0a;border-color:#7f1d1d}
    @media (max-width:900px){.layout{display:block!important}aside{width:auto!important;border-right:none!important}}
  </style>
</head>
<body>
  <div id="login" style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;">
    <div class="card" style="width:100%;max-width:420px;">
      <h1 style="font-size:32px;font-weight:800;margin:0 0 8px 0;">CUARTEL<span style="color:#ef4444;">ONLINE</span></h1>
      <form id="loginForm" class="grid">
        <select id="perfil">
          <option value="administrador">Administrador</option>
          <option value="materiales">Encargado de materiales</option>
          <option value="automotores">Encargado de automotores</option>
          <option value="roperia">Ropería</option>
          <option value="jefatura">Jefatura</option>
        </select>
        <input id="email" type="email" placeholder="Email" required />
        <input id="password" type="password" placeholder="Contraseña" required />
        <button type="submit" class="primary">Ingresar</button>
      </form>
    </div>
  </div>

  <div id="app" class="hidden">
    <div class="layout" style="display:flex;min-height:100vh;">
      <aside style="width:280px;background:#020617;border-right:1px solid #334155;padding:16px;">
        <div style="font-weight:800;font-size:22px;margin-bottom:20px;">CUARTEL<span style="color:#ef4444;">ONLINE</span></div>
        <div id="userInfo" class="small" style="margin-bottom:16px;"></div>
        <nav class="grid" id="navContainer"></nav>
        <button id="logout" class="secondary" style="margin-top:20px;width:100%;">Cerrar sesión</button>
      </aside>

      <main style="flex:1;padding:20px;">
        <div style="display:flex;justify-content:space-between;align-items:center;">
          <h2 id="title" style="margin:0;">Dashboard</h2>
        </div>
        <div id="flash" class="hidden" style="margin-top:12px;"></div>
        <div id="content" style="margin-top:20px;"></div>
      </main>
    </div>
  </div>

<script>
// CONFIGURACIÓN SUPABASE
const SUPABASE_URL='https://nksnxiqteqqlngmpzeew.supabase.co';
const SUPABASE_KEY='sb_publishable_f-MtPNfegeikWpLn-Jsz_A_4fj7_Pm5';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// REGLAS DE VISTA SEGÚN TU PEDIDO
const VIEW_RULES = {
  administrador: ['dashboard','moviles','bomberos','inventario_general','asignaciones','mantenimiento','reportes_stock'],
  materiales: ['dashboard','inventario_general','asignaciones','reportes_stock'],
  automotores: ['dashboard','moviles','mantenimiento'], // Se agregó Bitácora (mantenimiento)
  roperia: ['dashboard','inventario_roperia'],
  jefatura: ['dashboard','moviles','bomberos','inventario_general','asignaciones','mantenimiento','reportes_stock']
};

let perfilActual = null;
const els = {
  login: document.getElementById('login'),
  app: document.getElementById('app'),
  content: document.getElementById('content'),
  title: document.getElementById('title'),
  flash: document.getElementById('flash'),
  nav: document.getElementById('navContainer')
};

// --- UTILIDADES ---
function showFlash(msg,type){
  els.flash.className = type==='ok'?'ok':'err';
  els.flash.textContent = msg;
  els.flash.classList.remove('hidden');
  setTimeout(()=>els.flash.classList.add('hidden'),3000);
}

function escapeHtml(v){return String(v??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

async function safeSelect(table){
  const {data, error} = await sb.from(table).select('*');
  if(error) { console.error(error); return []; }
  return data;
}

// --- NAVEGACIÓN DINÁMICA ---
function renderNav(){
  const rules = VIEW_RULES[perfilActual] || [];
  const links = [
    {id:'dashboard', label:'Dashboard'},
    {id:'moviles', label:'Móviles'},
    {id:'bomberos', label:'Bomberos'},
    {id:'inventario_general', label:'Inventario Materiales'},
    {id:'asignaciones', label:'Asignaciones'},
    {id:'inventario_roperia', label:'Inventario Ropería'},
    {id:'mantenimiento', label:'Bitácora'},
    {id:'reportes_stock', label:'Reportes Excel'}
  ];
  
  els.nav.innerHTML = links
    .filter(l => rules.includes(l.id))
    .map(l => `<button class="nav" onclick="navigate('${l.id}')" data-sec="${l.id}">${l.label}</button>`)
    .join('');
}

function navigate(sec){
  document.querySelectorAll('.nav').forEach(b => b.classList.toggle('active', b.dataset.sec === sec));
  if(sec === 'dashboard') renderDashboard();
  else if(sec === 'moviles') renderMoviles();
  else if(sec === 'inventario_general') renderInventarioGeneral();
  else if(sec === 'asignaciones') renderAsignaciones();
  else if(sec === 'reportes_stock') renderReportes();
  else if(sec === 'inventario_roperia') els.content.innerHTML = '<div class="card">Módulo de Ropería (En desarrollo)</div>';
  else els.content.innerHTML = '<div class="card">Sección: ' + sec + '</div>';
}

// --- VISTAS ---

async function renderDashboard(){
  els.title.textContent = 'Dashboard';
  const moviles = await safeSelect('moviles');
  const novedades = await safeSelect('novedades_materiales');

  // CASO AUTOMOTORES: Solo móviles fuera de servicio
  if(perfilActual === 'automotores'){
    const rotos = moviles.filter(m => m.estado !== 'En servicio');
    els.content.innerHTML = `
      <div class="card">
        <h3 style="margin-bottom:12px">Móviles Fuera de Servicio / Mantenimiento</h3>
        <table>
          <thead><tr><th>Móvil</th><th>Estado</th></tr></thead>
          <tbody>
            ${rotos.map(m => `<tr><td><strong>${m.numero}</strong></td><td><span class="pill pill-bad">${m.estado}</span></td></tr>`).join('') || '<tr><td>Todos operativos</td></tr>'}
          </tbody>
        </table>
      </div>`;
    return;
  }

  // CASO GENERAL / MATERIALES
  const pendientes = novedades.filter(n => n.estado === 'Pendiente');
  els.content.innerHTML = `
    <div class="grid" style="grid-template-columns: repeat(3, 1fr)">
      <div class="status-big status-service">Servicio: ${moviles.filter(m=>m.estado==='En servicio').length}</div>
      <div class="status-big status-maint">Mantenimiento: ${moviles.filter(m=>m.estado==='En mantenimiento').length}</div>
      <div class="status-big status-out">Fuera de Servicio: ${moviles.filter(m=>m.estado==='Fuera de servicio').length}</div>
    </div>
    <div class="card" style="margin-top:20px">
      <h3 style="margin-bottom:12px">Novedades Críticas (Materiales)</h3>
      ${pendientes.map(n => `
        <div class="list-row">
          <strong>${n.material}</strong> - Móvil: ${n.movil || 'Gral'} - Ubicación: ${n.ubicacion || '-'}
          <span class="pill pill-bad">${n.tipo_novedad}</span>
        </div>
      `).join('') || 'Sin novedades pendientes'}
    </div>`;
}

async function renderMoviles(){
  els.title.textContent = 'Gestión de Móviles';
  const data = await safeSelect('moviles');
  const canEdit = (perfilActual === 'administrador' || perfilActual === 'automotores');

  let html = '';
  if(canEdit){
    html += `
    <div class="card" style="margin-bottom:20px">
      <form id="fMovil" class="grid" style="grid-template-columns: repeat(auto-fit, minmax(140px, 1fr))">
        <input type="hidden" name="id">
        <input name="numero" placeholder="N° Móvil" required>
        <select name="estado">
          <option value="En servicio">En servicio</option>
          <option value="En mantenimiento">En mantenimiento</option>
          <option value="Fuera de servicio">Fuera de servicio</option>
        </select>
        <button class="primary" type="submit">Guardar</button>
      </form>
    </div>`;
  }

  html += `<div class="card"><table><thead><tr><th>Móvil</th><th>Estado</th>${canEdit?'<th>Acción</th>':''}</tr></thead><tbody>`;
  html += data.map(m => `
    <tr>
      <td><strong>${m.numero}</strong></td>
      <td><span class="pill ${m.estado==='En servicio'?'pill-ok':'pill-bad'}">${m.estado}</span></td>
      ${canEdit ? `<td><button class="secondary" onclick="editMovil(${m.id}, '${m.numero}', '${m.estado}')">Editar</button></td>` : ''}
    </tr>`).join('');
  html += `</tbody></table></div>`;
  
  els.content.innerHTML = html;

  if(canEdit){
    document.getElementById('fMovil').onsubmit = async (e) => {
      e.preventDefault();
      const fd = new FormData(e.target);
      const row = { numero: fd.get('numero'), estado: fd.get('estado') };
      if(fd.get('id')) row.id = fd.get('id');
      const {error} = await sb.from('moviles').upsert(row);
      if(error) alert(error.message);
      else { showFlash('Móvil actualizado','ok'); renderMoviles(); }
    };
  }
}

window.editMovil = (id, num, est) => {
  const f = document.getElementById('fMovil');
  f.id.value = id;
  f.numero.value = num;
  f.estado.value = est;
};

async function renderInventarioGeneral(){
  els.title.textContent = 'Inventario General';
  const data = await safeSelect('stock_items');
  
  let html = `<div class="card" style="margin-bottom:20px">
    <h3>Configuración de Ítem</h3>
    <form id="fStock" class="grid" style="grid-template-columns: 1fr 1fr 1fr">
      <input name="nombre" placeholder="Nombre Material" required>
      <input type="number" name="stock_minimo" id="minVal" placeholder="Stock Mínimo">
      <label class="small"><input type="checkbox" onchange="document.getElementById('minVal').disabled = this.checked"> Sin stock mínimo</label>
      <button class="primary" type="submit">Guardar Material</button>
    </form>
  </div>`;
  
  html += `<div class="card"><table><thead><tr><th>Material</th><th>Mínimo</th></tr></thead><tbody>`;
  html += data.map(i => `<tr><td>${i.nombre}</td><td>${i.stock_minimo || 'N/A'}</td></tr>`).join('');
  html += `</tbody></table></div>`;
  els.content.innerHTML = html;
}

async function renderAsignaciones(){
  els.title.textContent = 'Asignaciones de Material';
  const {data} = await sb.from('v_stock_assignments_detail').select('*');
  // FILTRO: No mostrar devueltos o dados de baja
  const activos = (data || []).filter(a => a.estado !== 'Devuelto' && a.estado !== 'Dado de baja');

  els.content.innerHTML = `
    <div class="card">
      <table>
        <thead><tr><th>Material</th><th>Móvil/Destino</th><th>Estado</th></tr></thead>
        <tbody>
          ${activos.map(a => `<tr><td>${a.nombre}</td><td>${a.destino || 'Gral'}</td><td>${a.estado}</td></tr>`).join('') || 'Sin asignaciones activas'}
        </tbody>
      </table>
    </div>`;
}

async function renderReportes(){
  els.title.textContent = 'Reportes';
  els.content.innerHTML = `
    <div class="card" style="text-align:center">
      <p>Generar reporte consolidado de stock actual</p>
      <button class="primary" onclick="exportarExcel()">Descargar Excel (.xlsx)</button>
    </div>`;
}

async function exportarExcel(){
  const data = await safeSelect('stock_items');
  const ws = XLSX.utils.json_to_sheet(data);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Stock");
  XLSX.writeFile(wb, "Reporte_Stock_Ezeiza.xlsx");
}

// --- AUTH SIMULADO ---
document.getElementById('loginForm').onsubmit = (e) => {
  e.preventDefault();
  perfilActual = document.getElementById('perfil').value;
  els.login.classList.add('hidden');
  els.app.classList.remove('hidden');
  document.getElementById('userInfo').textContent = `Usuario: ${perfilActual.toUpperCase()}`;
  renderNav();
  navigate('dashboard');
};

document.getElementById('logout').onclick = () => location.reload();

</script>
</body>
</html>
