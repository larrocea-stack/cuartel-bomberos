<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Cuartel Online</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
font-family:Arial;
background:#020617;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
background:#0f172a;
padding:30px;
border-radius:16px;
width:350px;
border:1px solid #334155;
}

input,select{
width:100%;
padding:12px;
margin-top:10px;
border-radius:10px;
border:1px solid #334155;
background:#1e293b;
color:white;
}

button{
width:100%;
padding:12px;
margin-top:16px;
background:#b91c1c;
border:none;
border-radius:10px;
color:white;
font-weight:bold;
}
</style>

</head>

<body>

<div class="card">

<h2>CUARTEL<span style="color:red">ONLINE</span></h2>

<select id="perfil">
<option>Administrador</option>
<option>Materiales</option>
<option>Automotores</option>
<option>Jefatura</option>
<option>Bomberos</option>
</select>

<input placeholder="Email">
<input type="password" placeholder="Contraseña">

<button onclick="alert('Sistema funcionando')">
Ingresar
</button>

</div>

</body>
</html>
