function canView(s){return (VIEW_RULES[perfilActual]||[]).includes(s)}

function canBombero(){return perfilActual==='bomberos'}

  return perfilActual==='administrador' || perfilActual==='automotores';
}

function escapeHtml(v){return String(v??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;')}
function showBootError(msg){els.bootErr.textContent=msg;els.bootErr.classList.remove('hidden')}
function showFlash(msg,type){els.flash.className=type==='ok'?'ok':'err';els.flash.textContent=msg;els.flash.classList.remove('hidden');setTimeout(()=>els.flash.classList.add('hidden'),3200)}
function authInputs(){const b=els.perfil.value==='bomberos';els.email.classList.toggle('hidden',b);els.password.classList.toggle('hidden',b)}
function activateNav(sec){document.querySelectorAll('.nav').forEach(btn=>btn.classList.remove('active'));const btn=document.querySelector('.nav[data-sec="'+sec+'"]');if(btn)btn.classList.add('active')}
function updateNavVisibility(){document.querySelectorAll('.nav').forEach(btn=>btn.classList.toggle('hidden',!canView(btn.dataset.sec)))}
function card(label,value){return '<div class="card"><div class="small">'+escapeHtml(label)+'</div><div style="font-size:28px;font-weight:800;">'+escapeHtml(value)+'</div></div>'}
function statusPill(status){const s=String(status||'').trim().toLowerCase();if(s==='en servicio')return '<span class="pill pill-ok">En servicio</span>';if(s==='en mantenimiento')return '<span class="pill pill-warn">En mantenimiento</span>';if(s==='fuera de servicio')return '<span class="pill pill-bad">Fuera de servicio</span>';return '<span class="pill pill-bad">'+escapeHtml(status||'Sin estado')+'</span>'}
function severityPill(sev){const s=String(sev||'').trim().toLowerCase();if(s==='leve')return '<span class="pill pill-ok">Leve</span>';if(s==='moderada')return '<span class="pill pill-warn">Moderada</span>';return '<span class="pill pill-bad">'+escapeHtml(sev||'Crítica')+'</span>'}
function csv(rows){if(!rows||!rows.length)return '';const headers=Object.keys(rows[0]);const esc=(v)=>'"'+String(v??'').replace(/"/g,'""')+'"';return [headers.join(',')].concat(rows.map(r=>headers.map(k=>esc(r[k])).join(','))).join('\n')}
function downloadText(filename,content,type){const blob=new Blob([content],{type:type||'text/plain;charset=utf-8'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=filename;a.click();URL.revokeObjectURL(url)}

async function safeSelect(table,orderBy,ascending,limit){let q=sb.from(table).select('*');if(orderBy)q=q.order(orderBy,{ascending:!!ascending});if(limit)q=q.limit(limit);const res=await q;if(res.error)throw res.error;return res.data||[]}
async function upsertRow(table,row){const res=await sb.from(table).upsert(row);if(res.error)throw res.error}
async function insertRow(table,row){const res=await sb.from(table).insert(row);if(res.error)throw res.error}
async function deleteRow(table,id){const res=await sb.from(table).delete().eq('id',id);if(res.error)throw res.error}
async function updateRows(table,values,id){const res=await sb.from(table).update(values).eq('id',id);if(res.error)throw res.error}
async function loginAdmin(email,password,profile){const expected=PROFILE_EMAILS[profile];if(!expected)throw new Error('Perfil inválido.');if(String(email||'').trim().toLowerCase()!==expected.toLowerCase())throw new Error('Para el perfil '+profile+' debés usar el email '+expected);const authRes=await sb.auth.signInWithPassword({email:email,password:password});if(authRes.error)throw authRes.error;userActual=authRes.data.user;const roleRes=await sb.from('user_profiles').select('*').eq('user_id',userActual.id).eq('profile_name',profile).limit(1);if(roleRes.error)throw roleRes.error;if(!roleRes.data||!roleRes.data.length)throw new Error('Ese usuario no tiene asignado el perfil seleccionado.')}
async function loginBomberos(){userActual=null}
async function logout(){try{if(userActual)await sb.auth.signOut()}catch(e){}location.reload()}

async function dashboard(){
  els.title.textContent='Dashboard';
  const all=await Promise.all([safeSelect('moviles'),safeSelect('v_stock_assignments_detail'),safeSelect('fallas'),safeSelect('repuestos'),safeSelect('novedades_materiales'),safeSelect('revisiones'),safeSelect('controles_materiales'),safeSelect('v_stock_general')]);
  const mov=all[0],inv=all[1],fallas=all[2],repuestos=all[3],novedades=all[4],revisiones=all[5],controles=all[6],stockGeneral=all[7];
  const hoy=(new Date()).toDateString();
  const enServicio=mov.filter(x=>x.estado==='En servicio').length;
  const enMantenimiento=mov.filter(x=>x.estado==='En mantenimiento').length;
  const fueraServicio=mov.filter(x=>x.estado==='Fuera de servicio').length;
  const fallasCriticas=fallas.filter(f=>String(f.tipo_falla||'').toLowerCase().indexOf('crit')>=0);
  const repuestosCriticos=repuestos.filter(r=>Number(r.stock_actual||0)<=Number(r.stock_minimo||0));
  const alertasMateriales=novedades.filter(n=>String(n.estado||'').toLowerCase()==='pendiente');
  const alertasStock=stockGeneral.filter(s=>s.alerta_minimo===true && !s.sin_stock_minimo);
  const checklistHoy=revisiones.filter(r=>r.fecha_hora&&new Date(r.fecha_hora).toDateString()===hoy).length;
  const controlesHoy=controles.filter(r=>r.fecha_hora&&new Date(r.fecha_hora).toDateString()===hoy).length;
  const movilesNoOperativos=mov.filter(x=>x.estado==='En mantenimiento'||x.estado==='Fuera de servicio');

  let alertHtml='';
  alertHtml+=alertasMateriales.slice(0,6).map(n=>'<div class="list-row"><strong>Móvil '+escapeHtml(n.movil||'')+'</strong> · '+escapeHtml(n.material||'')+' · <span class="pill pill-bad">'+escapeHtml(n.tipo_novedad||'Novedad')+'</span></div>').join('');
  alertHtml+=fallasCriticas.slice(0,4).map(f=>'<div class="list-row"><strong>Móvil '+escapeHtml(f.movil||'')+'</strong> · '+escapeHtml(f.componente||'')+' · <span class="pill pill-bad">Crítica</span></div>').join('');
  alertHtml+=alertasStock.slice(0,4).map(s=>'<div class="list-row"><strong>'+escapeHtml(s.nombre||'')+'</strong> · disponible '+escapeHtml(s.disponible_real)+' / mínimo '+escapeHtml(s.stock_minimo)+' <span class="pill pill-bad">Stock bajo</span></div>').join('');
  if(!alertHtml)alertHtml='<div class="list-row">Sin alertas activas.</div>';

  let bottomHtml='';
  if(perfilActual==='automotores'){
    bottomHtml='<div class="card"><strong>Móviles fuera de servicio o en mantenimiento</strong><table style="margin-top:12px;"><thead><tr><th>Móvil</th><th>Patente</th><th>Tipo</th><th>Estado</th></tr></thead><tbody>'+(
      movilesNoOperativos.map(m=>'<tr><td><strong>'+escapeHtml(m.numero)+'</strong></td><td>'+escapeHtml(m.patente||'')+'</td><td>'+escapeHtml(m.tipo||'')+'</td><td>'+statusPill(m.estado)+'</td></tr>').join('')||'<tr><td colspan="4">No hay móviles en mantenimiento o fuera de servicio.</td></tr>'
    )+'</tbody></table></div>';
  }else if(perfilActual==='materiales'){
    bottomHtml='<div class="grid" style="grid-template-columns:1fr 1fr; margin-top:14px; align-items:start;">'+
      '<div class="card"><strong>Novedades pendientes de materiales</strong><div style="margin-top:10px;">'+(
        alertasMateriales.map(n=>'<div class="list-row"><strong>'+escapeHtml(n.material||'')+'</strong><div class="small">Móvil: '+escapeHtml(n.movil||'')+' · Ubicación: '+escapeHtml(n.compartimiento||'')+'</div><div class="small">'+escapeHtml(n.detalle||'')+'</div></div>').join('')||'Sin novedades pendientes.'
      )+'</div></div>'+
      '<div class="card"><strong>Resumen operativo</strong><div style="margin-top:10px;">'+
      '<div class="list-row">Inventario asignado: <strong>'+inv.length+'</strong></div>'+
      '<div class="list-row">Novedades pendientes: <strong>'+alertasMateriales.length+'</strong></div>'+
      '<div class="list-row">Alertas stock general: <strong>'+alertasStock.length+'</strong></div>'+
      '<div class="list-row">Controles de materiales hoy: <strong>'+controlesHoy+'</strong></div>'+
      '</div></div></div>';
  }else{
    bottomHtml='<div class="grid" style="grid-template-columns:1.1fr .9fr; margin-top:14px; align-items:start;">'+
      '<div class="card"><strong>Centro de alertas</strong><div style="margin-top:10px;">'+alertHtml+'</div></div>'+
      '<div class="card"><strong>Resumen operativo</strong><div style="margin-top:10px;">'+
        '<div class="list-row">Total de móviles: <strong>'+mov.length+'</strong></div>'+
        '<div class="list-row">Móviles operativos: <strong>'+enServicio+'</strong></div>'+
        '<div class="list-row">Materiales observados: <strong>'+alertasMateriales.length+'</strong></div>'+
        '<div class="list-row">Fallas registradas: <strong>'+fallas.length+'</strong></div>'+
        '<div class="list-row">Repuestos bajo mínimo: <strong>'+repuestosCriticos.length+'</strong></div>'+
        '<div class="list-row">Último checklist diario: <strong>'+(revisiones[0]?escapeHtml(new Date(revisiones[0].fecha_hora||Date.now()).toLocaleString('es-AR')):'Sin datos')+'</strong></div>'+
      '</div></div>'+
    '</div>';
  }

  els.content.innerHTML='<div class="hero-grid">'+
    '<div class="status-big status-service"><div class="hero-label">Móviles en servicio</div><div class="hero-number">'+enServicio+'</div><div class="small">Operativos para salida</div></div>'+
    '<div class="status-big status-maint"><div class="hero-label">En mantenimiento</div><div class="hero-number">'+enMantenimiento+'</div><div class="small">Requieren intervención</div></div>'+
    '<div class="status-big status-out"><div class="hero-label">Fuera de servicio</div><div class="hero-number">'+fueraServicio+'</div><div class="small">No disponibles</div></div>'+
  '</div>'+
  '<div class="stat-grid" style="margin-top:14px;">'+
    card('Inventario por móvil',inv.length)+
    card('Fallas críticas',fallasCriticas.length)+
    card('Repuestos críticos',repuestosCriticos.length)+
    card('Alertas materiales',alertasMateriales.length)+
    card('Alertas stock general',alertasStock.length)+
    card('Checklist hoy',checklistHoy)+
    card('Controles materiales hoy',controlesHoy)+
  '</div>'+bottomHtml;
}

async function moviles(){
  els.title.textContent='Móviles';
  const data=await safeSelect('moviles');
  let html='';
  if(canEditMoviles()){

  els.title.textContent='Control diario materiales';
  const all=await Promise.all([safeSelect('moviles','numero',true),safeSelect('bomberos','apellido',true),safeSelect('v_stock_assignments_detail','movil',true),safeSelect('controles_materiales','fecha_hora',false,10),safeSelect('novedades_materiales','id',false,10)]);
  const movs=all[0],boms=all[1],inventario=all[2],controles=all[3],novedades=all[4];
  let html='<div class="card"><form id="fcheckMat" class="grid"><select name="movil" id="checkMovil">'+movs.map(m=>'<option value="'+escapeHtml(m.numero)+'">Móvil '+escapeHtml(m.numero)+'</option>').join('')+'</select><select name="bombero">'+boms.map(b=>{const nombre=((b.jerarquia||'')+' '+(b.apellido||'')+' '+(b.nombre||'')).trim();return '<option value="'+escapeHtml(nombre)+'">'+escapeHtml(nombre)+'</option>'}).join('')+'</select><div id="checkItems"></div><textarea name="comentarios" placeholder="Observaciones generales del control"></textarea><button class="primary" type="submit">Registrar control de materiales</button></form></div><div class="card" style="margin-top:12px;"><strong>Reportar material faltante o dañado</strong><form id="fNovedad" class="grid" style="grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); margin-top:12px;"><select name="movil" id="novMovil">'+movs.map(m=>'<option value="'+escapeHtml(m.numero)+'">Móvil '+escapeHtml(m.numero)+'</option>').join('')+'</select><select name="compartimiento" id="novComp"></select><select name="material" id="novMaterial"></select><input name="cantidad" type="number" min="1" value="1" placeholder="Cantidad" required><select name="tipo_novedad"><option>Faltante</option><option>Dañado</option></select><textarea name="detalle" placeholder="Detalle de la novedad" required></textarea><button class="primary" type="submit">Registrar novedad</button></form></div><div class="grid" style="grid-template-columns:1fr 1fr; margin-top:12px;"><div class="card"><strong>Últimos controles</strong><div style="margin-top:8px;">'+(controles.map(r=>'<div class="list-row">Móvil '+escapeHtml(r.movil)+' · '+escapeHtml(r.responsable||r.bombero||'')+' · '+escapeHtml(r.resumen||r.equip_resumen||r.comentarios||'Sin novedades')+'</div>').join('')||'Sin controles.')+'</div></div><div class="card"><strong>Últimas novedades</strong><div style="margin-top:8px;">'+(novedades.map(n=>'<div class="list-row">Móvil '+escapeHtml(n.movil)+' · '+escapeHtml(n.compartimiento)+' · '+escapeHtml(n.material)+' · '+escapeHtml(n.tipo_novedad)+' · '+escapeHtml(n.detalle||'')+' <span class="pill '+(String(n.estado||'').toLowerCase()==='cerrada'?'pill-ok':'pill-bad')+'">'+escapeHtml(n.estado||'pendiente')+'</span>'+(canManageNovedades()?'<button class="secondary cerrar-nov" data-id="'+n.id+'" style="margin-left:8px;">'+(String(n.estado||'').toLowerCase()==='cerrada'?'Reabrir':'Cerrar')+'</button>':'')+'</div>').join('')||'Sin novedades.')+'</div></div></div>';
  els.content.innerHTML=html;
  const checkMovil=document.getElementById('checkMovil');
  const novMovil=document.getElementById('novMovil');
  const novComp=document.getElementById('novComp');
  const novMaterial=document.getElementById('novMaterial');
  const checkItems=document.getElementById('checkItems');
  function renderChecklistItems(movil){const items=inventario.filter(i=>String(i.movil)===String(movil)&&i.estado_asignacion==='ACTIVA');if(!items.length){checkItems.innerHTML='<div class="card">Ese móvil no tiene materiales asignados.</div>';return;}checkItems.innerHTML='<div class="card"><strong>Control por material y cantidad</strong><div style="margin-top:12px;">'+items.map((i,idx)=>'<div class="list-row"><div><strong>'+escapeHtml(i.compartimiento||'Sin compartimiento')+'</strong> · '+escapeHtml(i.nombre)+' · Cantidad esperada: '+escapeHtml(i.cantidad)+'</div><div class="grid" style="grid-template-columns:1fr 140px; margin-top:8px; align-items:center;"><label>Cantidad verificada</label><input type="number" name="cantidad_verificada_'+idx+'" min="0" value="'+escapeHtml(i.cantidad)+'"></div></div>').join('')+'</div></div>'}
  function fillNovedadSelectors(movil){const items=inventario.filter(i=>String(i.movil)===String(movil)&&i.estado_asignacion==='ACTIVA');const comps=Array.from(new Set(items.map(i=>i.compartimiento||'Sin compartimiento')));novComp.innerHTML=comps.map(c=>'<option value="'+escapeHtml(c)+'">'+escapeHtml(c)+'</option>').join('');refillMaterials()}
  function refillMaterials(){const items=inventario.filter(i=>String(i.movil)===String(novMovil.value)&&String(i.compartimiento||'Sin compartimiento')===String(novComp.value)&&i.estado_asignacion==='ACTIVA');novMaterial.innerHTML=items.map(i=>'<option value="'+escapeHtml(i.nombre)+'" data-stock="'+escapeHtml(i.stock_item_id||'')+'">'+escapeHtml(i.nombre)+'</option>').join('')}
  renderChecklistItems(checkMovil.value);fillNovedadSelectors(novMovil.value);
  checkMovil.addEventListener('change',()=>renderChecklistItems(checkMovil.value));
  novMovil.addEventListener('change',()=>fillNovedadSelectors(novMovil.value));
  novComp.addEventListener('change',refillMaterials);
  if(canEditChecklistMateriales()){
    document.getElementById('fcheckMat').addEventListener('submit',async e=>{e.preventDefault();const fd=new FormData(e.target);const items=inventario.filter(i=>String(i.movil)===String(fd.get('movil'))&&i.estado_asignacion==='ACTIVA');const resumen=items.map((i,idx)=>{const verificada=Number(fd.get('cantidad_verificada_'+idx)||0);return (i.compartimiento||'Sin compartimiento')+' / '+i.nombre+': esperado '+i.cantidad+', verificado '+verificada}).join(' | ');const res=await sb.from('controles_materiales').insert({movil:fd.get('movil'),responsable:fd.get('bombero'),resumen:resumen,observaciones:fd.get('comentarios'),fecha_hora:new Date().toISOString()});if(res.error)return alert(res.error.message);showFlash('Control de materiales registrado','ok');checklist_materiales()});

    document.getElementById('fNovedad').addEventListener('submit',async e=>{
      e.preventDefault();
      const fd=new FormData(e.target);
      const cantidad=Number(fd.get('cantidad')||0);
      const row=inventario.find(i=>String(i.movil)===String(fd.get('movil'))&&String(i.compartimiento||'Sin compartimiento')===String(fd.get('compartimiento'))&&String(i.nombre)===String(fd.get('material'))&&i.estado_asignacion==='ACTIVA');
      if(!row){alert('No se encontró el material activo en ese móvil/compartimiento.');return;}
      if(cantidad<1||cantidad>Number(row.cantidad||0)){alert('La cantidad reportada no es válida.');return;}

      const detalleBase=fd.get('detalle')+' | Cantidad: '+cantidad;
      const novRes=await sb.from('novedades_materiales').insert({movil:fd.get('movil'),compartimiento:fd.get('compartimiento'),material:fd.get('material'),tipo_novedad:fd.get('tipo_novedad'),detalle:detalleBase,estado:'pendiente',fecha_hora:new Date().toISOString(),reportado_por:canBombero()?'Bomberos':perfilActual,cantidad:cantidad});
      if(novRes.error)return alert(novRes.error.message);

      const restante=Number(row.cantidad||0)-cantidad;
      let upd;
      if(restante>0){
        upd=await sb.from('stock_assignments').update({cantidad:restante}).eq('id',row.id);
      }else{
        upd=await sb.from('stock_assignments').update({cantidad:0,estado_asignacion:'PENDIENTE'}).eq('id',row.id);
      }
      if(upd.error)return alert(upd.error.message);

      const pendRes=await sb.from('stock_assignments').insert({stock_item_id:row.stock_item_id,movil:row.movil,compartimiento:row.compartimiento,cantidad:cantidad,estado_asignacion:'PENDIENTE',fecha_hora:new Date().toISOString()});
      if(pendRes.error)return alert(pendRes.error.message);

      showFlash('Novedad registrada y material movido a estado pendiente','ok');
      checklist_materiales();
    });
  }
  if(canManageNovedades()){
    document.querySelectorAll('.cerrar-nov').forEach(btn=>btn.addEventListener('click',async()=>{
      const item=novedades.find(n=>String(n.id)===btn.dataset.id);
      const nuevoEstado=String(item.estado||'').toLowerCase()==='cerrada'?'pendiente':'cerrada';
      const upd=await sb.from('novedades_materiales').update({estado:nuevoEstado}).eq('id',Number(btn.dataset.id));
      if(upd.error){alert(upd.error.message);return;}
      if(nuevoEstado==='cerrada' && perfilActual==='materiales'){
        const pend=await sb.from('stock_assignments').select('*').eq('movil',item.movil).eq('compartimiento',item.compartimiento).eq('estado_asignacion','PENDIENTE');
        if(!pend.error && pend.data && pend.data.length){
          const candidate=pend.data.find(p=>p.cantidad>0);
          if(candidate){
            const active=await sb.from('stock_assignments').select('*').eq('stock_item_id',candidate.stock_item_id).eq('movil',candidate.movil).eq('compartimiento',candidate.compartimiento).eq('estado_asignacion','ACTIVA').limit(1);
            if(!active.error && active.data && active.data.length){
              const a=active.data[0];
              await sb.from('stock_assignments').update({cantidad:Number(a.cantidad||0)+Number(candidate.cantidad||0)}).eq('id',a.id);
              await sb.from('stock_assignments').delete().eq('id',candidate.id);
            }else{
              await sb.from('stock_assignments').update({estado_asignacion:'ACTIVA'}).eq('id',candidate.id);
            }
          }
        }
      }
      showFlash('Novedad actualizada','ok');
      checklist_materiales();
    }));
  }
}

  }
  html+='<div class="card"><table><thead><tr><th>Fecha</th><th>Móvil</th><th>Responsable</th><th>Tipo</th><th>KM</th><th>Observaciones</th>'+(canEditMantenimiento()?'<th>Acciones</th>':'')+'</tr></thead><tbody>'+(rows.map(r=>'<tr><td>'+escapeHtml(new Date(r.fecha_hora||Date.now()).toLocaleString('es-AR'))+'</td><td>Móvil '+escapeHtml(r.movil)+'</td><td>'+escapeHtml(r.responsable)+'</td><td>'+escapeHtml(r.tipo)+'</td><td>'+escapeHtml(r.km||'')+'</td><td>'+escapeHtml(r.observaciones||'')+'</td>'+(canEditMantenimiento()?'<td><button class="secondary edit-man" data-id="'+r.id+'">Editar</button> <button class="danger del-man" data-id="'+r.id+'">Borrar</button></td>':'')+'</tr>').join('')||'<tr><td colspan="7">Sin mantenimientos.</td></tr>')+'</tbody></table></div>';

  document.querySelectorAll('.edit-man').forEach(btn=>btn.addEventListener('click',()=>{const item=rows.find(x=>String(x.id)===btn.dataset.id);form.elements.id.value=item.id;form.elements.movil.value=item.movil;form.elements.responsable.value=item.responsable;form.elements.tipo.value=item.tipo||'';form.elements.km.value=item.km||0;form.elements.observaciones.value=item.observaciones||''}));
  document.querySelectorAll('.del-man').forEach(btn=>btn.addEventListener('click',async()=>{if(!confirm('¿Eliminar mantenimiento?'))return;await deleteRow('mantenimientos',Number(btn.dataset.id));showFlash('Mantenimiento eliminado','ok');mantenimiento()}));
}

async function respaldo(){
  els.title.textContent='Importar / exportar';

async function estadisticas(){
  els.title.textContent='Estadísticas';

}

async function reportes_stock(){
  els.title.textContent='Reportes de stock';
  const all=await Promise.all([safeSelect('v_stock_general','nombre',true),safeSelect('v_stock_assignments_detail','movil',true),safeSelect('v_maintenance_control_detail','fecha_ingreso',false),safeSelect('v_stock_decommissions_detail','fecha_baja',false)]);
  const stock=all[0],assignments=all[1],maint=all[2],bajas=all[3];
  els.content.innerHTML='<div class="card"><strong>Exportación de reportes</strong><div class="small" style="margin-top:8px;">Descargá reportes del stock maestro, stock asignado a móviles, mantenimiento y bajas en formato Excel.</div><div class="grid" style="grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); margin-top:16px;">'+
    '<button id="expStockXlsx" class="primary" type="button">Exportar stock general XLSX</button>'+
    '<button id="expAsignXlsx" class="secondary" type="button">Exportar stock por móvil XLSX</button>'+
    '<button id="expMaintXlsx" class="primary" type="button">Exportar mantenimiento XLSX</button>'+
    '<button id="expBajasXlsx" class="secondary" type="button">Exportar bajas XLSX</button>'+
    '<button id="expTodoXlsx" class="secondary" type="button">Exportar libro completo XLSX</button>'+
  '</div></div>';

  const stockRows=stock.map(r=>({codigo_interno:r.codigo_interno||'',nombre:r.nombre,categoria:r.categoria||'',marca:r.marca||'',modelo:r.modelo||'',numero_serie:r.numero_serie||'',cantidad_total:r.cantidad_total,asignado_moviles:r.asignado_moviles,en_reparacion:r.en_reparacion,en_baja:r.en_baja,disponible_real:r.disponible_real,stock_minimo:r.sin_stock_minimo?'SIN MINIMO':r.stock_minimo,alerta_minimo:r.sin_stock_minimo?false:r.alerta_minimo}));
  const assignRows=assignments.filter(a=>!['DEVUELTA','DADA_DE_BAJA','BAJA'].includes(String(a.estado_asignacion||'').toUpperCase())).map(a=>({fecha_hora:a.fecha_hora,movil:a.movil,compartimiento:a.compartimiento||'',codigo_interno:a.codigo_interno||'',nombre:a.nombre||'',cantidad:a.cantidad,estado_asignacion:a.estado_asignacion}));
  const maintRows=maint.map(m=>({fecha_ingreso:m.fecha_ingreso,codigo_interno:m.codigo_interno||'',nombre:m.nombre||'',cantidad:m.cantidad,motivo:m.motivo||'',estado:m.estado||'',fecha_retorno:m.fecha_retorno||'',observaciones:m.observaciones||''}));
  const bajaRows=bajas.map(b=>({fecha_baja:b.fecha_baja,codigo_interno:b.codigo_interno||'',nombre:b.nombre||'',cantidad:b.cantidad,motivo:b.motivo||'',usuario:b.usuario||'',observaciones:b.observaciones||'',revertible:b.revertible}));

  function exportOne(name, rows){
    const wb=XLSX.utils.book_new();
    const ws=XLSX.utils.json_to_sheet(rows.length?rows:[{}]);
    XLSX.utils.book_append_sheet(wb, ws, 'Datos');
    XLSX.writeFile(wb, name);
  }
  document.getElementById('expStockXlsx').addEventListener('click',()=>exportOne('stock_general.xlsx',stockRows));
  document.getElementById('expAsignXlsx').addEventListener('click',()=>exportOne('stock_por_movil.xlsx',assignRows));
  document.getElementById('expMaintXlsx').addEventListener('click',()=>exportOne('control_mantenimiento.xlsx',maintRows));
  document.getElementById('expBajasXlsx').addEventListener('click',()=>exportOne('archivo_bajas.xlsx',bajaRows));
  document.getElementById('expTodoXlsx').addEventListener('click',()=>{
    const wb=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(stockRows.length?stockRows:[{}]),'Stock general');
    XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(assignRows.length?assignRows:[{}]),'Stock moviles');
    XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(maintRows.length?maintRows:[{}]),'Mantenimiento');
    XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(bajaRows.length?bajaRows:[{}]),'Bajas');
    XLSX.writeFile(wb,'reportes_stock_completo.xlsx');
  });
}

async function guardia(){
  els.title.textContent='Modo guardia';
  const all=await Promise.all([safeSelect('moviles'),safeSelect('fallas'),safeSelect('repuestos'),safeSelect('novedades_materiales'),safeSelect('revisiones'),safeSelect('v_stock_general')]);
  const mov=all[0],fallas=all[1],repuestos=all[2],novedades=all[3],revisiones=all[4],stockGeneral=all[5];
  const enServicio=mov.filter(m=>m.estado==='En servicio').length;
  const enMantenimiento=mov.filter(m=>m.estado==='En mantenimiento').length;
  const fueraServicio=mov.filter(m=>m.estado==='Fuera de servicio').length;
  const criticas=fallas.filter(f=>String(f.tipo_falla||'').toLowerCase().indexOf('crit')>=0);
  const repuestosCriticos=repuestos.filter(r=>Number(r.stock_actual||0)<=Number(r.stock_minimo||0));
  const pendientes=novedades.filter(n=>String(n.estado||'').toLowerCase()==='pendiente');
  const stockCritico=stockGeneral.filter(s=>s.alerta_minimo===true);
  const ultimaRevision=revisiones[0]?new Date(revisiones[0].fecha_hora||Date.now()).toLocaleString('es-AR'):'Sin registros';
  const alertasHtml=(criticas.slice(0,6).map(f=>'<div class="guardia-item"><strong>Móvil '+escapeHtml(f.movil)+'</strong> · '+escapeHtml(f.componente)+' <span class="guardia-badge guardia-danger">Crítica</span></div>').join(''))+(pendientes.slice(0,6).map(n=>'<div class="guardia-item"><strong>Móvil '+escapeHtml(n.movil)+'</strong> · '+escapeHtml(n.material)+' <span class="guardia-badge guardia-danger">'+escapeHtml(n.tipo_novedad)+'</span></div>').join(''))+(repuestosCriticos.slice(0,4).map(r=>'<div class="guardia-item"><strong>'+escapeHtml(r.nombre)+'</strong> · stock '+escapeHtml(r.stock_actual)+'/'+escapeHtml(r.stock_minimo)+' <span class="guardia-badge guardia-warn">Repuesto</span></div>').join(''))+(stockCritico.slice(0,4).map(s=>'<div class="guardia-item"><strong>'+escapeHtml(s.nombre)+'</strong> · stock general bajo mínimo <span class="guardia-badge guardia-danger">Stock</span></div>').join(''));
  const totalAlertas=criticas.length+pendientes.length+repuestosCriticos.length+stockCritico.length;
  els.content.innerHTML='<div class="guardia-wrap"><div class="guardia-header"><div><div class="guardia-title">PANEL DE GUARDIA</div><div class="guardia-sub">Monitoreo operativo del cuartel · actualización automática opcional</div></div><div class="toolbar"><button id="refreshGuardia" class="primary" type="button">Actualizar</button><button id="autoGuardia" class="secondary" type="button">Auto 60 s: ON</button></div></div><div class="guardia-grid"><div class="guardia-card status-service"><div class="guardia-label">Móviles en servicio</div><div class="guardia-number">'+enServicio+'</div></div><div class="guardia-card status-maint"><div class="guardia-label">En mantenimiento</div><div class="guardia-number">'+enMantenimiento+'</div></div><div class="guardia-card status-out"><div class="guardia-label">Fuera de servicio</div><div class="guardia-number">'+fueraServicio+'</div></div><div class="guardia-card"><div class="guardia-label">Alertas activas</div><div class="guardia-number">'+totalAlertas+'</div></div></div><div class="guardia-list"><div class="guardia-card"><div class="guardia-label">Alertas prioritarias</div>'+(alertasHtml||'<div class="guardia-item"><span class="guardia-badge guardia-ok">Sin alertas</span></div>')+'</div><div class="guardia-card"><div class="guardia-label">Resumen de guardia</div><div class="guardia-item">Total de móviles: <strong>'+mov.length+'</strong></div><div class="guardia-item">Fallas críticas: <strong>'+criticas.length+'</strong></div><div class="guardia-item">Novedades pendientes: <strong>'+pendientes.length+'</strong></div><div class="guardia-item">Repuestos bajo mínimo: <strong>'+repuestosCriticos.length+'</strong></div><div class="guardia-item">Stock general bajo mínimo: <strong>'+stockCritico.length+'</strong></div><div class="guardia-item">Última revisión: <strong>'+escapeHtml(ultimaRevision)+'</strong></div><div class="guardia-footer">Ideal para TV o monitor de guardia. Podés dejar esta vista abierta permanentemente.</div></div></div></div>';
  window.__guardiaAuto=window.__guardiaAuto===undefined?true:window.__guardiaAuto;
  if(window.__guardiaTimer){clearInterval(window.__guardiaTimer);window.__guardiaTimer=null}
  document.getElementById('refreshGuardia').addEventListener('click',()=>guardia());
  const autoBtn=document.getElementById('autoGuardia');
  autoBtn.textContent=window.__guardiaAuto?'Auto 60 s: ON':'Auto 60 s: OFF';
  autoBtn.addEventListener('click',()=>{window.__guardiaAuto=!window.__guardiaAuto;autoBtn.textContent=window.__guardiaAuto?'Auto 60 s: ON':'Auto 60 s: OFF';if(window.__guardiaTimer){clearInterval(window.__guardiaTimer);window.__guardiaTimer=null}if(window.__guardiaAuto){window.__guardiaTimer=setInterval(()=>{if(els.title.textContent==='Modo guardia')guardia()},60000)}});
  if(window.__guardiaAuto){window.__guardiaTimer=setInterval(()=>{if(els.title.textContent==='Modo guardia')guardia()},60000)}
}

  if(sec==='dashboard')return dashboard();
  if(sec==='moviles')return moviles();

  if(sec==='inventario_general')return inventario_general();
  if(sec==='asignaciones')return asignaciones();
  if(sec==='inventario')return inventario();
  if(sec==='plano')return plano();

  if(sec==='checklist_materiales')return checklist_materiales();
  if(sec==='mantenimiento_stock')return mantenimiento_stock();
  if(sec==='archivo_bajas')return archivo_bajas();
  if(sec==='repuestos')return repuestos();
  if(sec==='proveedores')return proveedores();
  if(sec==='roperia')return roperia();
  if(sec==='mantenimiento')return mantenimiento();
  if(sec==='respaldo')return respaldo();

  if(sec==='reportes_stock')return reportes_stock();

  if(sec==='guardia')return guardia();
}

function init(){
  try{
    if(!window.supabase||typeof window.supabase.createClient!=='function')throw new Error('No cargó la librería de Supabase.');
    sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
    els.bootMsg.textContent='Sistema listo.';
    authInputs();
    els.perfil.addEventListener('change',authInputs);
    els.logout.addEventListener('click',logout);
    els.logoutTop.addEventListener('click',logout);
    document.querySelectorAll('.nav').forEach(btn=>btn.addEventListener('click',()=>nav(btn.dataset.sec)));
    els.loginForm.addEventListener('submit',async e=>{
      e.preventDefault();
      perfilActual=els.perfil.value;
      try{
        if(perfilActual==='bomberos'){await loginBomberos()}else{await loginAdmin(els.email.value,els.password.value,perfilActual)}
        els.login.classList.add('hidden');
        els.app.classList.remove('hidden');
        els.userInfo.textContent=canBombero()?'Bomberos · plano del móvil y control diario de materiales':perfilActual+' · permisos según rol';
        updateNavVisibility();
        nav(canBombero()?'checklist_materiales':'dashboard');
      }catch(err){alert(err&&err.message?err.message:'No se pudo iniciar sesión.')}
    })
  }catch(err){
    els.bootMsg.textContent='Error de inicialización.';
    showBootError(err&&err.message?err.message:String(err))
  }
}
window.addEventListener('error',event=>showBootError(event&&event.message?event.message:'Script error'));
window.addEventListener('unhandledrejection',event=>showBootError(event&&event.reason&&event.reason.message?event.reason.message:String((event&&event.reason)||'Promise error')));
init();
</script>
