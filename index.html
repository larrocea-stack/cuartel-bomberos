<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cuartel Online</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root{--bg:#020617;--panel:#0f172a;--soft:#1e293b;--border:#334155;--text:#e2e8f0;--muted:#94a3b8;--red:#b91c1c;--red2:#7f1d1d;--green:#166534;--amber:#92400e}
    *{box-sizing:border-box}body{margin:0;font-family:Arial,sans-serif;background:var(--bg);color:var(--text)}
    .hidden{display:none!important}.layout{display:flex;min-height:100vh}.sidebar{width:300px;background:var(--bg);border-right:1px solid var(--border);padding:16px}.main{flex:1;padding:20px}
    .card{background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:16px}.grid{display:grid;gap:12px}.small{font-size:12px;color:var(--muted)}
    .nav{background:#111827;color:var(--text);padding:10px 12px;border:none;border-radius:10px;text-align:left;cursor:pointer}.nav.active{background:#991b1b}.nav.hidden{display:none}
    .primary,.secondary,.danger{border:none;border-radius:10px;padding:10px 12px;color:#fff;cursor:pointer}.primary{background:var(--red)}.secondary{background:var(--soft)}.danger{background:var(--red2)}
    input,select,textarea{width:100%;padding:12px;border-radius:10px;border:1px solid var(--border);background:var(--soft);color:#fff}textarea{min-height:90px;resize:vertical}
    table{width:100%;border-collapse:collapse}th,td{padding:10px;border-bottom:1px solid var(--border);text-align:left;vertical-align:top}th{font-size:12px;color:var(--muted);text-transform:uppercase}
    .pill{display:inline-block;padding:2px 8px;border-radius:999px;font-size:11px}.pill-ok{background:#052e16;color:#bbf7d0}.pill-bad{background:#450a0a;color:#fecaca}.pill-warn{background:#78350f;color:#fde68a}
    .err,.ok{border-radius:12px;padding:12px;white-space:pre-wrap}.err{background:#450a0a;border:1px solid var(--red2);color:#fecaca}.ok{background:#052e16;border:1px solid var(--green);color:#bbf7d0}
    .hero-grid,.stat-grid{display:grid;gap:12px}.hero-grid{grid-template-columns:repeat(auto-fit,minmax(220px,1fr))}.stat-grid{grid-template-columns:repeat(auto-fit,minmax(180px,1fr))}
    .hero-card{border-radius:18px;padding:18px;border:1px solid var(--border)}.service{background:#052e16;border-color:var(--green)}.maint{background:#3b2a05;border-color:var(--amber)}.out{background:#450a0a;border-color:var(--red2)}
    .hero-number{font-size:34px;font-weight:800}.hero-label{font-size:12px;color:var(--muted);text-transform:uppercase}.list-row{padding:10px 0;border-bottom:1px solid var(--border)}
    @media (max-width:900px){.layout{display:block}.sidebar{width:auto;border-right:none;border-bottom:1px solid var(--border)}}
  </style>
</head>
<body>
  <div id="login" style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;">
    <div class="card" style="width:100%;max-width:430px;">
      <h1 style="font-size:32px;font-weight:800;margin:0 0 8px 0;">CUARTEL<span style="color:#ef4444;">ONLINE</span></h1>
      <p class="small" style="margin:0 0 16px 0;">Sistema con perfiles y control operativo</p>
      <div id="bootMsg" class="small" style="margin-bottom:12px;">Cargando sistema…</div>
      <div id="bootErr" class="err hidden" style="margin-bottom:12px;"></div>
      <form id="loginForm" class="grid">
        <select id="perfil">
          <option value="administrador">Administrador</option>
          <option value="materiales">Encargado de materiales</option>
          <option value="automotores">Encargado de automotores</option>
          <option value="jefatura">Jefatura</option>
          <option value="bomberos">Bomberos</option>
        </select>
        <input id="email" type="email" placeholder="Email">
        <input id="password" type="password" placeholder="Contraseña">
        <button type="submit" class="primary">Ingresar</button>
      </form>
    </div>
  </div>

  <div id="app" class="hidden">
    <div class="layout">
      <aside class="sidebar">
        <div style="font-weight:800;font-size:22px;margin-bottom:8px;">CUARTEL<span style="color:#ef4444;">ONLINE</span></div>
        <div id="userInfo" class="small" style="margin-bottom:16px;"></div>
        <div class="grid">
          <button class="nav active" data-sec="dashboard" type="button">Dashboard</button>
          <button class="nav" data-sec="checklist_diario" type="button">Checklist diario</button>
          <button class="nav" data-sec="control_materiales" type="button">Control diario materiales</button>
          <button class="nav" data-sec="inventario_general" type="button">Inventario general</button>
          <button class="nav" data-sec="asignaciones" type="button">Asignaciones</button>
          <button class="nav" data-sec="mantenimiento_stock" type="button">Control de mantenimiento</button>
          <button class="nav" data-sec="archivo_bajas" type="button">Archivo / bajas</button>
          <button class="nav" data-sec="inventario_movil" type="button">Inventario por móvil</button>
          <button class="nav" data-sec="reportes_stock" type="button">Reportes de stock</button>
          <button class="nav" data-sec="plano" type="button">Plano del móvil</button>
          <button class="nav" data-sec="diagnostico" type="button">Diagnóstico</button>
        </div>
        <button id="logout" class="secondary" style="margin-top:20px;width:100%;" type="button">Cerrar sesión</button>
      </aside>
      <main class="main">
        <div style="display:flex;justify-content:space-between;align-items:center;gap:12px;">
          <h2 id="title" style="margin:0;">Dashboard</h2>
          <button id="logoutTop" class="secondary" type="button">Salir</button>
        </div>
        <div id="flash" class="hidden" style="margin-top:12px;"></div>
        <div id="content" style="margin-top:16px;"></div>
      </main>
    </div>
  </div>

<script>
(function(){
  const SUPABASE_URL='https://nksnxiqteqqlngmpzeew.supabase.co';
  const SUPABASE_KEY='sb_publishable_f-MtPNfegeikWpLn-Jsz_A_4fj7_Pm5';
  const PROFILE_EMAILS={administrador:'admin@cuartel.com',materiales:'materiales@cuartel.com',automotores:'automotores@cuartel.com',jefatura:'jefatura@cuartel.com'};
  const VIEW_RULES={
    administrador:['dashboard','checklist_diario','control_materiales','inventario_general','asignaciones','mantenimiento_stock','archivo_bajas','inventario_movil','reportes_stock','plano','diagnostico'],
    materiales:['dashboard','control_materiales','inventario_general','asignaciones','mantenimiento_stock','archivo_bajas','inventario_movil','reportes_stock','plano','diagnostico'],
    automotores:['dashboard','checklist_diario','inventario_general','inventario_movil','reportes_stock','plano','diagnostico'],
    jefatura:['dashboard','checklist_diario','control_materiales','inventario_general','asignaciones','mantenimiento_stock','archivo_bajas','inventario_movil','reportes_stock','plano','diagnostico'],
    bomberos:['dashboard','control_materiales','inventario_general','inventario_movil','plano','diagnostico']
  };
  const els={
    login:document.getElementById('login'),app:document.getElementById('app'),loginForm:document.getElementById('loginForm'),perfil:document.getElementById('perfil'),email:document.getElementById('email'),password:document.getElementById('password'),bootMsg:document.getElementById('bootMsg'),bootErr:document.getElementById('bootErr'),userInfo:document.getElementById('userInfo'),title:document.getElementById('title'),content:document.getElementById('content'),flash:document.getElementById('flash'),logout:document.getElementById('logout'),logoutTop:document.getElementById('logoutTop')
  };
  let sb=null,perfilActual=null,userActual=null;

  function h(v){return String(v==null?'':v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');}
  function canView(sec){return (VIEW_RULES[perfilActual]||[]).indexOf(sec)>=0;}
  function canEditStockGeneral(){return perfilActual==='administrador'||perfilActual==='materiales';}
  function canManageMaintenanceStock(){return perfilActual==='administrador'||perfilActual==='materiales';}
  function canManageDecommissions(){return perfilActual==='administrador'||perfilActual==='materiales';}
  function canDeleteCompartments(){return perfilActual==='administrador'||perfilActual==='materiales';}
  function canDoChecklist(){return perfilActual==='administrador'||perfilActual==='automotores'||perfilActual==='jefatura';}
  function canDoMaterialControl(){return perfilActual==='administrador'||perfilActual==='materiales'||perfilActual==='bomberos'||perfilActual==='jefatura';}
  function showBootError(msg){els.bootErr.textContent=msg;els.bootErr.classList.remove('hidden');}
  function showFlash(msg,type){els.flash.className=type==='ok'?'ok':'err';els.flash.textContent=msg;els.flash.classList.remove('hidden');setTimeout(function(){els.flash.classList.add('hidden');},3200);}
  function authInputs(){var b=els.perfil.value==='bomberos';els.email.classList.toggle('hidden',b);els.password.classList.toggle('hidden',b);}
  function activateNav(sec){document.querySelectorAll('.nav').forEach(function(btn){btn.classList.remove('active');});var btn=document.querySelector('.nav[data-sec="'+sec+'"]');if(btn)btn.classList.add('active');}
  function updateNavVisibility(){document.querySelectorAll('.nav').forEach(function(btn){btn.classList.toggle('hidden',!canView(btn.dataset.sec));});}
  function card(label,value){return '<div class="card"><div class="small">'+h(label)+'</div><div style="font-size:28px;font-weight:800;">'+h(value)+'</div></div>';}
  function csv(rows){if(!rows||!rows.length)return '';var headers=Object.keys(rows[0]);function esc(v){return '"'+String(v==null?'':v).replace(/"/g,'""')+'"';}return [headers.join(',')].concat(rows.map(function(r){return headers.map(function(k){return esc(r[k]);}).join(',');})).join('
');}
  function downloadText(filename,content,type){var blob=new Blob([content],{type:type||'text/plain;charset=utf-8'});var url=URL.createObjectURL(blob);var a=document.createElement('a');a.href=url;a.download=filename;a.click();URL.revokeObjectURL(url);}

  async function safeSelect(table,orderBy,ascending,limit){var q=sb.from(table).select('*');if(orderBy)q=q.order(orderBy,{ascending:!!ascending});if(limit)q=q.limit(limit);var res=await q;if(res.error)throw res.error;return res.data||[];}
  async function upsertRow(table,row){var res=await sb.from(table).upsert(row);if(res.error)throw res.error;}
  async function updateRows(table,values,id){var res=await sb.from(table).update(values).eq('id',id);if(res.error)throw res.error;}

  async function loginAdmin(email,password,profile){var expected=PROFILE_EMAILS[profile];if(String(email||'').trim().toLowerCase()!==expected.toLowerCase())throw new Error('Para el perfil '+profile+' debés usar el email '+expected);var authRes=await sb.auth.signInWithPassword({email:email,password:password});if(authRes.error)throw authRes.error;userActual=authRes.data.user;var roleRes=await sb.from('user_profiles').select('*').eq('user_id',userActual.id).eq('profile_name',profile).limit(1);if(roleRes.error)throw roleRes.error;if(!roleRes.data||!roleRes.data.length)throw new Error('Ese usuario no tiene asignado el perfil seleccionado.');}
  async function loginBomberos(){userActual=null;}
  async function logout(){try{if(userActual)await sb.auth.signOut();}catch(e){}location.reload();}

  async function dashboard(){
    els.title.textContent='Dashboard';
    var all=await Promise.all([safeSelect('moviles','numero',true),safeSelect('fallas','fecha_hora',false),safeSelect('repuestos','nombre',true),safeSelect('novedades_materiales','fecha_hora',false),safeSelect('v_stock_general','nombre',true),safeSelect('revisiones','fecha_hora',false),safeSelect('controles_materiales','fecha_hora',false)]);
    var mov=all[0],fallas=all[1],repuestos=all[2],novedades=all[3],stock=all[4],revisiones=all[5],controles=all[6];
    var hoy=(new Date()).toDateString();
    var enServicio=mov.filter(function(x){return x.estado==='En servicio';}).length;
    var enMantenimiento=mov.filter(function(x){return x.estado==='En mantenimiento';}).length;
    var fueraServicio=mov.filter(function(x){return x.estado==='Fuera de servicio';}).length;
    var fallasCriticas=fallas.filter(function(f){return String(f.tipo_falla||'').toLowerCase().indexOf('crit')>=0;}).length;
    var repuestosCriticos=repuestos.filter(function(r){return Number(r.stock_actual||0)<=Number(r.stock_minimo||0);}).length;
    var alertasMateriales=novedades.filter(function(n){return String(n.estado||'').toLowerCase()==='pendiente';});
    var alertasStock=stock.filter(function(s){return s.alerta_minimo===true;});
    var checklistHoy=revisiones.filter(function(r){return r.fecha_hora&&new Date(r.fecha_hora).toDateString()===hoy;}).length;
    var controlesHoy=controles.filter(function(r){return r.fecha_hora&&new Date(r.fecha_hora).toDateString()===hoy;}).length;
    var alertHtml='';
    alertHtml+=alertasMateriales.map(function(n){return '<div class="list-row"><strong>Móvil '+h(n.movil||'')+'</strong> · '+h(n.material||'')+' · <span class="pill pill-bad">'+h(n.tipo_novedad||'Novedad')+'</span></div>';}).join('');
    alertHtml+=alertasStock.map(function(s){return '<div class="list-row"><strong>'+h(s.nombre)+'</strong> · disponible '+h(s.disponible_real)+' / mínimo '+h(s.stock_minimo)+' <span class="pill pill-bad">Stock bajo</span></div>';}).join('');
    if(!alertHtml)alertHtml='Sin alertas activas.';
    els.content.innerHTML=''+
      '<div class="hero-grid">'+
        '<div class="hero-card service"><div class="hero-label">Móviles en servicio</div><div class="hero-number">'+enServicio+'</div></div>'+
        '<div class="hero-card maint"><div class="hero-label">En mantenimiento</div><div class="hero-number">'+enMantenimiento+'</div></div>'+
        '<div class="hero-card out"><div class="hero-label">Fuera de servicio</div><div class="hero-number">'+fueraServicio+'</div></div>'+
      '</div>'+
      '<div class="stat-grid" style="margin-top:14px;">'+
        card('Fallas críticas',fallasCriticas)+
        card('Repuestos críticos',repuestosCriticos)+
        card('Alertas materiales',alertasMateriales.length)+
        card('Alertas stock general',alertasStock.length)+
        card('Checklist hoy',checklistHoy)+
        card('Controles materiales hoy',controlesHoy)+
      '</div>'+
      '<div class="card" style="margin-top:14px;"><strong>Centro de alertas</strong><div style="margin-top:10px;">'+alertHtml+'</div></div>';
  }

  async function checklist_diario(){
    els.title.textContent='Checklist diario';
    var moviles=await safeSelect('moviles','numero',true);
    var history=await safeSelect('revisiones','fecha_hora',false,20);
    var html='<div class="card" style="max-width:980px;"><strong>Control diario de móviles</strong><div class="small" style="margin-top:8px;">Registro operativo diario para automotores.</div>';
    if(canDoChecklist()){
      html+='<form id="fChecklist" class="grid" style="grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); margin-top:14px;">'+
      '<select name="movil">'+moviles.map(function(m){return '<option value="'+h(m.numero)+'">Móvil '+h(m.numero)+'</option>';}).join('')+'</select>'+
      '<input name="responsable" placeholder="Responsable / legajo" required>'+
      '<select name="luces"><option value="OK">Luces emergencia OK</option><option value="FALLA">Luces emergencia FALLA</option></select>'+
      '<select name="sirena"><option value="OK">Sirena y bocina OK</option><option value="FALLA">Sirena y bocina FALLA</option></select>'+
      '<select name="aceite"><option value="OK">Nivel de aceite OK</option><option value="FALLA">Nivel de aceite FALLA</option></select>'+
      '<select name="agua"><option value="OK">Nivel de agua OK</option><option value="FALLA">Nivel de agua FALLA</option></select>'+
      '<select name="neumaticos"><option value="OK">Neumáticos OK</option><option value="FALLA">Neumáticos FALLA</option></select>'+
      '<select name="radio"><option value="OK">Equipos de radio OK</option><option value="FALLA">Equipos de radio FALLA</option></select>'+
      '<select name="combustible"><option value="OK">Combustible > 3/4</option><option value="FALLA">Combustible bajo</option></select>'+
      '<textarea name="observaciones" placeholder="Observaciones"></textarea>'+
      '<button class="primary" type="submit">Guardar checklist</button>'+
      '</form>';
    } else {
      html+='<div class="err" style="margin-top:12px;">Este perfil no tiene permiso para registrar checklist diario.</div>';
    }
    html+='</div><div class="card" style="margin-top:12px;"><strong>Últimos checklist</strong><div>'+
      (history.map(function(r){return '<div class="list-row"><strong>Móvil '+h(r.movil||'')+'</strong> · '+h(new Date(r.fecha_hora||Date.now()).toLocaleString('es-AR'))+' · '+h(r.responsable||'')+'<div class="small">Luces: '+h(r.luces||'')+' | Sirena: '+h(r.sirena||'')+' | Aceite: '+h(r.aceite||'')+' | Agua: '+h(r.agua||'')+' | Neumáticos: '+h(r.neumaticos||'')+' | Radio: '+h(r.radio||'')+' | Combustible: '+h(r.combustible||'')+'</div><div class="small">'+h(r.observaciones||'')+'</div></div>';}).join('')||'<div class="small">Sin checklist cargados.</div>')+
      '</div></div>';
    els.content.innerHTML=html;
    var form=document.getElementById('fChecklist');
    if(form){form.addEventListener('submit',async function(e){e.preventDefault();var fd=new FormData(form);var row={movil:fd.get('movil'),responsable:fd.get('responsable'),luces:fd.get('luces'),sirena:fd.get('sirena'),aceite:fd.get('aceite'),agua:fd.get('agua'),neumaticos:fd.get('neumaticos'),radio:fd.get('radio'),combustible:fd.get('combustible'),observaciones:fd.get('observaciones'),fecha_hora:new Date().toISOString()};var res=await sb.from('revisiones').insert(row);if(res.error){alert(res.error.message);return;}showFlash('Checklist diario guardado','ok');checklist_diario();});}
  }

  async function control_materiales(){
    els.title.textContent='Control diario materiales';
    var all=await Promise.all([safeSelect('moviles','numero',true),safeSelect('v_stock_assignments_detail','movil',true),safeSelect('controles_materiales','fecha_hora',false,20)]);
    var moviles=all[0],asignaciones=all[1],historial=all[2];
    var html='<div class="card" style="max-width:1100px;"><strong>Verificación diaria de materiales</strong><div class="small" style="margin-top:8px;">Seleccioná el móvil y verificá cantidades reales por compartimiento.</div>';
    if(canDoMaterialControl()){
      html+='<div class="grid" style="grid-template-columns:240px 1fr; margin-top:14px; align-items:start;">'+
        '<div><select id="ctrlMovil">'+moviles.map(function(m){return '<option value="'+h(m.numero)+'">Móvil '+h(m.numero)+'</option>';}).join('')+'</select><input id="ctrlResponsable" placeholder="Responsable / legajo" style="margin-top:10px;"><textarea id="ctrlObs" placeholder="Observaciones generales" style="margin-top:10px;"></textarea><button id="saveMatCtrl" class="primary" type="button" style="margin-top:10px;">Guardar control</button></div>'+
        '<div id="ctrlMaterialesWrap"></div>'+
      '</div>';
    } else {
      html+='<div class="err" style="margin-top:12px;">Este perfil no tiene permiso para registrar control de materiales.</div>';
    }
    html+='</div><div class="card" style="margin-top:12px;"><strong>Últimos controles de materiales</strong><div>'+
      (historial.map(function(hh){return '<div class="list-row"><strong>Móvil '+h(hh.movil||'')+'</strong> · '+h(new Date(hh.fecha_hora||Date.now()).toLocaleString('es-AR'))+' · '+h(hh.responsable||'')+'<div class="small">'+h(hh.resumen||'')+'</div></div>';}).join('')||'<div class="small">Sin controles cargados.</div>')+
      '</div></div>';
    els.content.innerHTML=html;
    if(!canDoMaterialControl())return;
    var sel=document.getElementById('ctrlMovil');
    var wrap=document.getElementById('ctrlMaterialesWrap');
    function renderMateriales(movil){
      var rows=asignaciones.filter(function(a){return String(a.movil)===String(movil)&&a.estado_asignacion==='ACTIVA';});
      if(!rows.length){wrap.innerHTML='<div class="card">Ese móvil no tiene materiales asignados.</div>';wrap.dataset.rows='[]';return;}
      wrap.innerHTML='<div class="card"><table><thead><tr><th>Compartimiento</th><th>Ítem</th><th>Asignado</th><th>Verificado</th><th>Estado</th><th>Novedad</th></tr></thead><tbody>'+
        rows.map(function(r,idx){return '<tr><td>'+h(r.compartimiento||'Sin compartimiento')+'</td><td><strong>'+h(r.nombre)+'</strong><div class="small">'+h(r.codigo_interno||'')+'</div></td><td>'+h(r.cantidad)+'</td><td><input class="mat-verif" data-idx="'+idx+'" type="number" min="0" value="'+h(r.cantidad)+'"></td><td><select class="mat-estado" data-idx="'+idx+'"><option value="OK">OK</option><option value="FALTANTE">Faltante</option><option value="DANADO">Dañado</option></select></td><td><input class="mat-nov" data-idx="'+idx+'" placeholder="Detalle"></td></tr>';}).join('')+
        '</tbody></table><div class="small" style="margin-top:10px;">Los faltantes y dañados generan novedad automática en dashboard. No se descuenta stock en forma automática; quedan en cola de revisión.</div></div>';
      wrap.dataset.rows=JSON.stringify(rows);
    }
    renderMateriales(sel.value);
    sel.addEventListener('change',function(){renderMateriales(sel.value);});
    document.getElementById('saveMatCtrl').addEventListener('click',async function(){
      var rows=JSON.parse(wrap.dataset.rows||'[]');
      var responsable=document.getElementById('ctrlResponsable').value;
      var obs=document.getElementById('ctrlObs').value;
      if(!responsable){alert('Completá el responsable.');return;}
      var resumen=[];
      for(var i=0;i<rows.length;i++){
        var verif=Number(document.querySelector('.mat-verif[data-idx="'+i+'"]').value||0);
        var estado=document.querySelector('.mat-estado[data-idx="'+i+'"]').value;
        var nov=document.querySelector('.mat-nov[data-idx="'+i+'"]').value;
        var base=rows[i];
        resumen.push(base.nombre+' ['+estado+' '+verif+'/'+base.cantidad+']');
        if(estado!=='OK'||verif!==Number(base.cantidad)){
          var tipo=estado==='DANADO'?'Dañado':'Faltante';
          var detalle=nov||('Verificado '+verif+' de '+base.cantidad);
          var novedad=await sb.from('novedades_materiales').insert({movil:base.movil,compartimiento:base.compartimiento,material:base.nombre,tipo_novedad:tipo,detalle:detalle,estado:'pendiente',fecha_hora:new Date().toISOString()});
          if(novedad.error){alert(novedad.error.message);return;}
        }
      }
      var control=await sb.from('controles_materiales').insert({movil:sel.value,responsable:responsable,resumen:resumen.join(' | '),observaciones:obs,fecha_hora:new Date().toISOString()});
      if(control.error){alert(control.error.message);return;}
      showFlash('Control diario de materiales guardado','ok');
      control_materiales();
    });
  }

  async function inventario_general(){
    els.title.textContent='Inventario general';
    var vista=await safeSelect('v_stock_general','nombre',true);
    var maestro=await safeSelect('stock_items','nombre',true);

          els.login.classList.add('hidden');
          els.app.classList.remove('hidden');
          els.userInfo.textContent=perfilActual+' · permisos según rol';
          updateNavVisibility();
          nav('dashboard');
        }catch(err){alert(err&&err.message?err.message:'No se pudo iniciar sesión.');}
      });
    }catch(err){
      els.bootMsg.textContent='Error de inicialización.';
      showBootError(err&&err.message?err.message:String(err));
    }
  }

  window.addEventListener('error',function(event){showBootError(event&&event.message?event.message:'Script error');});
  window.addEventListener('unhandledrejection',function(event){showBootError(event&&event.reason&&event.reason.message?event.reason.message:String(event&&event.reason?event.reason:'Promise error'));});
  init();
})();
</script>
</body>
</html>
