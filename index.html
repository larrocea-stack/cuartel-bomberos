<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cuartel Online</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: Arial, sans-serif; background: #020617; color: #e2e8f0; margin: 0; }
    .card { background: #0f172a; border: 1px solid #334155; border-radius: 16px; padding: 16px; }
    input, select, textarea { width: 100%; box-sizing: border-box; background: #1e293b; border: 1px solid #334155; color: white; border-radius: 12px; padding: 12px; }
    textarea { min-height: 100px; resize: vertical; }
    button { cursor: pointer; border: none; }
    .primary { background: #b91c1c; color: white; padding: 12px; border-radius: 12px; font-weight: 700; }
    .secondary { background: #1e293b; color: white; padding: 10px 12px; border-radius: 10px; }
    .danger { background: #7f1d1d; color: white; padding: 10px 12px; border-radius: 10px; }
    .nav { background: #111827; color: #e2e8f0; padding: 10px 12px; border-radius: 10px; text-align: left; }
    .nav.active { background: #991b1b; color: white; }
    .hidden { display: none !important; }
    .grid { display: grid; gap: 12px; }
    .small { font-size: 12px; color: #94a3b8; }
    .list-row { padding: 10px 0; border-bottom: 1px solid #334155; }
    .err { background: #450a0a; border: 1px solid #7f1d1d; color: #fecaca; border-radius: 12px; padding: 12px; white-space: pre-wrap; }
    .ok { background: #052e16; border: 1px solid #166534; color: #bbf7d0; border-radius: 12px; padding: 12px; }
    .pill { display:inline-block; font-size:11px; padding:2px 8px; border-radius:999px; }
    .pill-ok { background:#052e16; color:#bbf7d0; }
    .pill-warn { background:#78350f; color:#fde68a; }
    .pill-bad { background:#450a0a; color:#fecaca; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 10px; border-bottom: 1px solid #334155; text-align: left; vertical-align: top; }
    th { color: #94a3b8; font-size: 12px; text-transform: uppercase; }
    .toolbar { display:flex; gap:8px; flex-wrap:wrap; }
    .mobile-map { display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:12px; }
    .comp-box { background:#111827; border:1px solid #334155; border-radius:14px; padding:12px; }
    .stat-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:12px; }
    @media (max-width: 900px) {
      .layout { display: block !important; }
      aside { width: auto !important; border-right: none !important; border-bottom: 1px solid #334155 !important; }
    }
  </style>
</head>
<body>
  <div id="login" style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;">
    <div class="card" style="width:100%;max-width:420px;">
      <h1 style="font-size:32px;font-weight:800;margin:0 0 8px 0;">CUARTEL<span style="color:#ef4444;">ONLINE</span></h1>
      <p class="small" style="margin:0 0 16px 0;">Sistema con perfiles y control operativo</p>
      <div id="bootMsg" class="small" style="margin-bottom:12px;">Cargando sistema…</div>
      <div id="bootErr" class="err hidden" style="margin-bottom:12px;"></div>
      <form id="loginForm" class="grid">
        <select id="perfil">
          <option value="administrador">Administrador</option>
          <option value="materiales">Encargado de materiales</option>
          <option value="automotores">Encargado de automotores</option>
          <option value="jefatura">Jefatura</option>
          <option value="bomberos">Bomberos</option>
        </select>
        <input id="email" type="email" placeholder="Email" />
        <input id="password" type="password" placeholder="Contraseña" />
        <button type="submit" class="primary">Ingresar</button>
      </form>
    </div>
  </div>

  <div id="app" class="hidden">
    <div class="layout" style="display:flex;min-height:100vh;">
      <aside style="width:300px;background:#020617;border-right:1px solid #334155;padding:16px;box-sizing:border-box;">
        <div style="font-weight:800;font-size:22px;margin-bottom:8px;">CUARTEL<span style="color:#ef4444;">ONLINE</span></div>
        <div id="userInfo" class="small" style="margin-bottom:16px;"></div>
        <div class="grid">
          <button class="nav active" data-sec="dashboard" type="button">Dashboard</button>
          <button class="nav" data-sec="moviles" type="button">Móviles</button>
          <button class="nav" data-sec="bomberos" type="button">Bomberos</button>
          <button class="nav" data-sec="inventario" type="button">Inventario por móvil</button>
          <button class="nav" data-sec="plano" type="button">Plano del móvil</button>
          <button class="nav" data-sec="fallas" type="button">Reporte de fallas</button>
          <button class="nav" data-sec="checklist" type="button">Checklist de materiales</button>
          <button class="nav" data-sec="repuestos" type="button">Inventario de repuestos</button>
          <button class="nav" data-sec="proveedores" type="button">Proveedores</button>
          <button class="nav" data-sec="mantenimiento" type="button">Bitácora</button>
          <button class="nav" data-sec="respaldo" type="button">Importar / exportar</button>
          <button class="nav" data-sec="estadisticas" type="button">Estadísticas</button>
          <button class="nav" data-sec="diagnostico" type="button">Diagnóstico</button>
        </div>
        <button id="logout" class="secondary" style="margin-top:20px;width:100%;" type="button">Cerrar sesión</button>
      </aside>
      <main style="flex:1;padding:20px;box-sizing:border-box;">
        <div style="display:flex;justify-content:space-between;align-items:center;gap:12px;">
          <h2 id="title" style="margin:0;">Dashboard</h2>
          <button id="logoutTop" class="secondary" type="button">Salir</button>
        </div>
        <div id="flash" class="hidden" style="margin-top:12px;"></div>
        <div id="content" style="margin-top:16px;"></div>
      </main>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://nksnxiqteqqlngmpzeew.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_f-MtPNfegeikWpLn-Jsz_A_4fj7_Pm5';

    const PROFILE_EMAILS = {
      administrador: 'admin@cuartel.com',
      materiales: 'materiales@cuartel.com',
      automotores: 'automotores@cuartel.com',
      jefatura: 'jefatura@cuartel.com'
    };

    const VIEW_RULES = {
      administrador: ['dashboard','moviles','bomberos','inventario','plano','fallas','checklist','repuestos','proveedores','mantenimiento','respaldo','estadisticas','diagnostico'],
      materiales: ['dashboard','inventario','plano','estadisticas','diagnostico'],
      automotores: ['dashboard','moviles','plano','fallas','checklist','repuestos','proveedores','estadisticas','diagnostico'],
      jefatura: ['dashboard','moviles','bomberos','inventario','plano','fallas','checklist','repuestos','proveedores','mantenimiento','estadisticas','diagnostico'],
      bomberos: ['dashboard','plano','checklist','diagnostico']
    };

    const els = {
      login: document.getElementById('login'),
      app: document.getElementById('app'),
      loginForm: document.getElementById('loginForm'),
      perfil: document.getElementById('perfil'),
      email: document.getElementById('email'),
      password: document.getElementById('password'),
      bootMsg: document.getElementById('bootMsg'),
      bootErr: document.getElementById('bootErr'),
      userInfo: document.getElementById('userInfo'),
      title: document.getElementById('title'),
      content: document.getElementById('content'),
      flash: document.getElementById('flash'),
      logout: document.getElementById('logout'),
      logoutTop: document.getElementById('logoutTop')
    };

    let sb = null;
    let perfilActual = null;
    let userActual = null;

    function canView(section) {
      return (VIEW_RULES[perfilActual] || []).includes(section);
    }
    function canAdmin() { return perfilActual === 'administrador'; }
    function canEditMoviles() { return perfilActual === 'administrador'; }
    function canEditBomberos() { return perfilActual === 'administrador'; }
    function canEditInventarioMovil() { return perfilActual === 'administrador' || perfilActual === 'materiales'; }
    function canEditFallas() { return perfilActual === 'administrador' || perfilActual === 'automotores'; }
    function canEditChecklist() { return perfilActual === 'administrador' || perfilActual === 'automotores' || perfilActual === 'bomberos'; }
    function canEditRepuestos() { return perfilActual === 'administrador' || perfilActual === 'automotores'; }
    function canEditProveedores() { return perfilActual === 'administrador' || perfilActual === 'automotores'; }
    function canEditMantenimiento() { return perfilActual === 'administrador'; }
    function canBackup() { return perfilActual === 'administrador'; }

    function escapeHtml(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }
    function showBootError(msg) {
      els.bootErr.textContent = msg;
      els.bootErr.classList.remove('hidden');
    }
    function showFlash(message, type = 'ok') {
      els.flash.className = type === 'ok' ? 'ok' : 'err';
      els.flash.textContent = message;
      els.flash.classList.remove('hidden');
      setTimeout(() => els.flash.classList.add('hidden'), 3200);
    }
    function authInputs() {
      const isBomberos = els.perfil.value === 'bomberos';
      els.email.classList.toggle('hidden', isBomberos);
      els.password.classList.toggle('hidden', isBomberos);
    }
    function activateNav(sec) {
      document.querySelectorAll('.nav').forEach(btn => btn.classList.remove('active'));
      const btn = document.querySelector('.nav[data-sec="' + sec + '"]');
      if (btn) btn.classList.add('active');
    }
    function updateNavVisibility() {
      document.querySelectorAll('.nav').forEach(btn => btn.classList.toggle('hidden', !canView(btn.dataset.sec)));
    }
    function card(label, value) {
      return '<div class="card"><div class="small">' + escapeHtml(label) + '</div><div style="font-size:28px;font-weight:800;">' + escapeHtml(value) + '</div></div>';
    }
    function statusPill(status) {
      const s = String(status || '').trim().toLowerCase();
      if (s === 'en servicio') return '<span class="pill pill-ok">En servicio</span>';
      if (s === 'en mantenimiento') return '<span class="pill pill-warn">En mantenimiento</span>';
      if (s === 'fuera de servicio') return '<span class="pill pill-bad">Fuera de servicio</span>';
      return '<span class="pill pill-bad">' + escapeHtml(status || 'Sin estado') + '</span>';
    }
    function severityPill(severity) {
      const s = String(severity || '').trim().toLowerCase();
      if (s === 'leve') return '<span class="pill pill-ok">Leve</span>';
      if (s === 'moderada') return '<span class="pill pill-warn">Moderada</span>';
      return '<span class="pill pill-bad">' + escapeHtml(severity || 'Crítica') + '</span>';
    }

    async function safeSelect(table, orderBy = 'id', ascending = false, limit = null) {
      let q = sb.from(table).select('*').order(orderBy, { ascending });
      if (limit) q = q.limit(limit);
      const { data, error } = await q;
      if (error) throw error;
      return data || [];
    }
    async function upsertRow(table, row) {
      const { error } = await sb.from(table).upsert(row);
      if (error) throw error;
    }
    async function insertRow(table, row) {
      const { error } = await sb.from(table).insert(row);
      if (error) throw error;
    }
    async function deleteRow(table, id) {
      const { error } = await sb.from(table).delete().eq('id', id);
      if (error) throw error;
    }

    async function loginAdmin(email, password, profile) {
      const expected = PROFILE_EMAILS[profile];
      if (!expected) throw new Error('Perfil inválido.');
      if (String(email || '').trim().toLowerCase() !== expected.toLowerCase()) {
        throw new Error('Para el perfil ' + profile + ' debés usar el email ' + expected);
      }
      const { data, error } = await sb.auth.signInWithPassword({ email, password });
      if (error) throw error;
      userActual = data.user;
      const { data: roles, error: roleError } = await sb
        .from('user_profiles')
        .select('*')
        .eq('user_id', data.user.id)
        .eq('profile_name', profile)
        .limit(1);
      if (roleError) throw roleError;
      if (!roles || !roles.length) throw new Error('Ese usuario no tiene asignado el perfil seleccionado.');
    }
    async function loginBomberos() { userActual = null; }
    async function logout() {
      try { if (userActual) await sb.auth.signOut(); } catch (e) {}
      location.reload();
    }

    async function dashboard() {
      els.title.textContent = 'Dashboard';
      const [mov, rev, inv, man, fallas, repuestos, novedades] = await Promise.all([
        safeSelect('moviles'),
        safeSelect('revisiones'),
        safeSelect('inventario'),
        safeSelect('mantenimientos'),
        safeSelect('fallas'),
        safeSelect('repuestos'),
        safeSelect('novedades_materiales')
      ]);
      const repuestosCriticos = repuestos.filter(r => Number(r.stock_actual || 0) <= Number(r.stock_minimo || 0));
      const alertasMateriales = novedades.filter(n => String(n.estado || '').toLowerCase() === 'pendiente');
      els.content.innerHTML = '' +
        '<div class="stat-grid">' +
          card('Móviles', mov.length) +
          card('En servicio', mov.filter(x => x.estado === 'En servicio').length) +
          card('Inventario por móvil', inv.length) +
          card('Fallas reportadas', fallas.length) +
          card('Repuestos críticos', repuestosCriticos.length) +
          card('Alertas de materiales', alertasMateriales.length) +
        '</div>' +
        '<div class="grid" style="grid-template-columns:1.2fr 1fr; margin-top:12px; align-items:start;">' +
          '<div class="card"><strong>Alertas y novedades de materiales</strong><div style="margin-top:8px;">' +
            (alertasMateriales.map(n => '<div class="list-row"><strong>Móvil ' + escapeHtml(n.movil) + '</strong> · ' + escapeHtml(n.compartimiento) + ' · ' + escapeHtml(n.material) + ' · ' + escapeHtml(n.tipo_novedad) + ' · ' + escapeHtml(n.detalle || '') + '</div>').join('') || 'Sin alertas de materiales.') +
          '</div></div>' +
          '<div class="card"><strong>Estado de móviles</strong><div style="margin-top:8px;">' +
            (mov.map(m => '<div class="list-row"><strong>Móvil ' + escapeHtml(m.numero) + '</strong> · ' + statusPill(m.estado) + '</div>').join('') || 'Sin móviles.') +
          '</div></div>' +
        '</div>' +
        '<div class="grid" style="grid-template-columns:1fr 1fr; margin-top:12px; align-items:start;">' +
          '<div class="card"><strong>Últimas revisiones de materiales</strong><div style="margin-top:8px;">' +
            (rev.slice(0,8).map(r => '<div class="list-row">Móvil ' + escapeHtml(r.movil) + ' · ' + escapeHtml(r.bombero) + ' · ' + escapeHtml(r.comentarios || 'Sin novedades') + '</div>').join('') || 'Sin revisiones.') +
          '</div></div>' +
          '<div class="card"><strong>Alertas de repuestos</strong><div style="margin-top:8px;">' +
            (repuestosCriticos.map(r => '<div class="list-row">Repuesto ' + escapeHtml(r.nombre) + ' por debajo del mínimo</div>').join('') || 'Sin alertas de stock.') +
          '</div></div>' +
        '</div>';
    }

    async function moviles() {
      els.title.textContent = 'Móviles';
      const data = await safeSelect('moviles');
      let html = '';
      if (canEditMoviles()) {
        html += '<div class="card" style="margin-bottom:12px;">' +
          '<strong>Alta / edición de móvil</strong>' +
          '<form id="fMovil" class="grid" style="grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); margin-top:12px;">' +
            '<input name="id" type="hidden">' +
            '<input name="numero" placeholder="Número de móvil" required>' +
            '<input name="patente" placeholder="Patente" required>' +
            '<input name="modelo" placeholder="Modelo" required>' +
            '<input name="tipo" placeholder="Tipo" required>' +
            '<input name="agua" type="number" placeholder="Capacidad de agua">' +
            '<select name="estado"><option>En servicio</option><option>En mantenimiento</option><option>Fuera de servicio</option></select>' +
            '<button class="primary" type="submit">Guardar móvil</button>' +
          '</form></div>';
      }
      html += '<div class="card"><table><thead><tr><th>Móvil</th><th>Patente</th><th>Modelo</th><th>Tipo</th><th>Agua</th><th>Estado</th>' + (canEditMoviles() ? '<th>Acciones</th>' : '') + '</tr></thead><tbody>' +
        (data.map(x => '<tr>' +
          '<td><strong>' + escapeHtml(x.numero) + '</strong></td>' +
          '<td>' + escapeHtml(x.patente) + '</td>' +
          '<td>' + escapeHtml(x.modelo) + '</td>' +
          '<td>' + escapeHtml(x.tipo) + '</td>' +
          '<td>' + escapeHtml(x.agua || 0) + ' L</td>' +
          '<td>' + statusPill(x.estado) + '</td>' +
          (canEditMoviles() ? '<td><button class="secondary edit-movil" data-id="' + x.id + '">Editar</button> <button class="danger del-movil" data-id="' + x.id + '">Borrar</button></td>' : '') +
        '</tr>').join('') || '<tr><td colspan="7">Sin móviles cargados.</td></tr>') +
        '</tbody></table></div>';
      els.content.innerHTML = html;

      if (!canEditMoviles()) return;
      const form = document.getElementById('fMovil');
      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const fd = new FormData(form);
        const row = {
          numero: fd.get('numero'),
          patente: fd.get('patente'),
          modelo: fd.get('modelo'),
          tipo: fd.get('tipo'),
          agua: Number(fd.get('agua') || 0),
          estado: fd.get('estado')
        };
        if (fd.get('id')) row.id = Number(fd.get('id'));
        await upsertRow('moviles', row);
        showFlash('Móvil guardado');
        moviles();
      });
      document.querySelectorAll('.edit-movil').forEach(btn => btn.addEventListener('click', () => {
        const item = data.find(x => String(x.id) === btn.dataset.id);
        form.elements.id.value = item.id;
        form.elements.numero.value = item.numero || '';
        form.elements.patente.value = item.patente || '';
        form.elements.modelo.value = item.modelo || '';
        form.elements.tipo.value = item.tipo || '';
        form.elements.agua.value = item.agua || 0;
        form.elements.estado.value = item.estado || 'En servicio';
      }));
      document.querySelectorAll('.del-movil').forEach(btn => btn.addEventListener('click', async () => {
        if (!confirm('¿Eliminar móvil?')) return;
        await deleteRow('moviles', Number(btn.dataset.id));
        showFlash('Móvil eliminado');
        moviles();
      }));
    }

    async function bomberos() {
      els.title.textContent = 'Bomberos';
      const data = await safeSelect('bomberos');
      let html = '';
      if (canEditBomberos()) {
        html += '<div class="card" style="margin-bottom:12px;">' +
          '<strong>Alta / edición de bombero</strong>' +
          '<form id="fBombero" class="grid" style="grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); margin-top:12px;">' +
            '<input name="id" type="hidden">' +
            '<input name="jerarquia" placeholder="Jerarquía" required>' +
            '<input name="nombre" placeholder="Nombre" required>' +
            '<input name="apellido" placeholder="Apellido" required>' +
            '<input name="legajo" placeholder="Legajo" required>' +
            '<button class="primary" type="submit">Guardar bombero</button>' +
          '</form></div>';
      }
      html += '<div class="card"><table><thead><tr><th>Jerarquía</th><th>Apellido y nombre</th><th>Legajo</th>' + (canEditBomberos() ? '<th>Acciones</th>' : '') + '</tr></thead><tbody>' +
        (data.map(x => '<tr>' +
          '<td>' + escapeHtml(x.jerarquia) + '</td>' +
          '<td><strong>' + escapeHtml(x.apellido) + ', ' + escapeHtml(x.nombre) + '</strong></td>' +
          '<td>' + escapeHtml(x.legajo) + '</td>' +
          (canEditBomberos() ? '<td><button class="secondary edit-bombero" data-id="' + x.id + '">Editar</button> <button class="danger del-bombero" data-id="' + x.id + '">Borrar</button></td>' : '') +
        '</tr>').join('') || '<tr><td colspan="4">Sin bomberos cargados.</td></tr>') + '</tbody></table></div>';
      els.content.innerHTML = html;

      if (!canEditBomberos()) return;
      const form = document.getElementById('fBombero');
      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const fd = new FormData(form);
        const row = { jerarquia: fd.get('jerarquia'), nombre: fd.get('nombre'), apellido: fd.get('apellido'), legajo: fd.get('legajo') };
        if (fd.get('id')) row.id = Number(fd.get('id'));
        await upsertRow('bomberos', row);
        showFlash('Bombero guardado');
        bomberos();
      });
      document.querySelectorAll('.edit-bombero').forEach(btn => btn.addEventListener('click', () => {
        const item = data.find(x => String(x.id) === btn.dataset.id);
        form.elements.id.value = item.id;
        form.elements.jerarquia.value = item.jerarquia || '';
        form.elements.nombre.value = item.nombre || '';
        form.elements.apellido.value = item.apellido || '';
        form.elements.legajo.value = item.legajo || '';
      }));
      document.querySelectorAll('.del-bombero').forEach(btn => btn.addEventListener('click', async () => {
        if (!confirm('¿Eliminar bombero?')) return;
        await deleteRow('bomberos', Number(btn.dataset.id));
        showFlash('Bombero eliminado');
        bomberos();
      }));
    }

    async function inventario() {
      els.title.textContent = 'Inventario por móvil';
      const [movs, comps, items] = await Promise.all([
        safeSelect('moviles', 'numero', true),
        safeSelect('compartimientos', 'id', false),
        safeSelect('inventario', 'id', false)
      ]);
      let html = '';
      if (canEditInventarioMovil()) {
        html += '<div class="card" style="margin-bottom:12px;">' +
          '<strong>Alta / edición de material</strong>' +
          '<form id="fInv" class="grid" style="grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); margin-top:12px;">' +
            '<input name="id" type="hidden">' +
            '<select name="movil">' + movs.map(m => '<option value="' + escapeHtml(m.numero) + '">Móvil ' + escapeHtml(m.numero) + '</option>').join('') + '</select>' +
            '<select name="compartimiento" id="compSelect"></select>' +
            '<input name="nuevoCompartimiento" placeholder="Nuevo compartimiento (opcional)">' +
            '<input name="material" placeholder="Material / herramienta" required>' +
            '<input name="cantidad" type="number" placeholder="Cantidad" required>' +
            '<input name="observaciones" placeholder="Observaciones">' +
            '<button class="primary" type="submit">Guardar material</button>' +
          '</form></div>';
      }
      html += '<div class="card"><table><thead><tr><th>Móvil</th><th>Compartimiento</th><th>Material</th><th>Cantidad</th><th>Observaciones</th>' + (canEditInventarioMovil() ? '<th>Acciones</th>' : '') + '</tr></thead><tbody>' +
        (items.map(x => '<tr>' +

            }).join('') + '</select>' +
            '<input name="tipo" placeholder="Tipo de mantenimiento" required>' +
            '<input name="km" type="number" placeholder="Kilometraje">' +
            '<input name="observaciones" placeholder="Observaciones">' +
            '<button class="primary" type="submit">Guardar mantenimiento</button>' +
          '</form></div>';
      }
      html += '<div class="card"><table><thead><tr><th>Fecha</th><th>Móvil</th><th>Responsable</th><th>Tipo</th><th>KM</th><th>Observaciones</th>' + (canEditMantenimiento() ? '<th>Acciones</th>' : '') + '</tr></thead><tbody>' +
        (rows.map(r => '<tr>' +
          '<td>' + escapeHtml(new Date(r.fecha_hora || Date.now()).toLocaleString('es-AR')) + '</td>' +
          '<td>Móvil ' + escapeHtml(r.movil) + '</td>' +
          '<td>' + escapeHtml(r.responsable) + '</td>' +
          '<td>' + escapeHtml(r.tipo) + '</td>' +
          '<td>' + escapeHtml(r.km || '') + '</td>' +
          '<td>' + escapeHtml(r.observaciones || '') + '</td>' +
          (canEditMantenimiento() ? '<td><button class="secondary edit-man" data-id="' + r.id + '">Editar</button> <button class="danger del-man" data-id="' + r.id + '">Borrar</button></td>' : '') +
        '</tr>').join('') || '<tr><td colspan="7">Sin mantenimientos.</td></tr>') + '</tbody></table></div>';
      els.content.innerHTML = html;

      if (!canEditMantenimiento()) return;
      const form = document.getElementById('fMan');
      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const fd = new FormData(form);
        const row = {
          movil: fd.get('movil'),
          responsable: fd.get('responsable'),
          tipo: fd.get('tipo'),
          km: Number(fd.get('km') || 0),
          observaciones: fd.get('observaciones'),
          fecha_hora: new Date().toISOString()
        };
        if (fd.get('id')) row.id = Number(fd.get('id'));
        await upsertRow('mantenimientos', row);
        showFlash('Mantenimiento guardado');
        mantenimiento();
      });
      document.querySelectorAll('.edit-man').forEach(btn => btn.addEventListener('click', () => {
        const item = rows.find(x => String(x.id) === btn.dataset.id);
        form.elements.id.value = item.id;
        form.elements.movil.value = item.movil;
        form.elements.responsable.value = item.responsable;
        form.elements.tipo.value = item.tipo || '';
        form.elements.km.value = item.km || 0;
        form.elements.observaciones.value = item.observaciones || '';
      }));
      document.querySelectorAll('.del-man').forEach(btn => btn.addEventListener('click', async () => {
        if (!confirm('¿Eliminar mantenimiento?')) return;
        await deleteRow('mantenimientos', Number(btn.dataset.id));
        showFlash('Mantenimiento eliminado');
        mantenimiento();
      }));
    }

    async function respaldo() {
      els.title.textContent = 'Importar / exportar';
      els.content.innerHTML = '<div class="card"><div class="toolbar">' +
        '<button id="btnExport" class="secondary" ' + (canBackup() ? '' : 'disabled') + '>Exportar respaldo JSON</button>' +
        '<input id="fileImport" type="file" accept="application/json" ' + (canBackup() ? '' : 'disabled') + '>' +
        '</div><div class="small" style="margin-top:12px;">Solo el perfil Administrador puede importar o exportar respaldos.</div></div>';
      if (!canBackup()) return;
      document.getElementById('btnExport').addEventListener('click', async () => {
        const [moviles, bomberos, compartimientos, inventario, revisiones, mantenimientos, fallas, repuestos, proveedores] = await Promise.all([
          safeSelect('moviles'), safeSelect('bomberos'), safeSelect('compartimientos'), safeSelect('inventario'), safeSelect('revisiones'), safeSelect('mantenimientos'), safeSelect('fallas'), safeSelect('repuestos'), safeSelect('proveedores')
        ]);
        const payload = { moviles, bomberos, compartimientos, inventario, revisiones, mantenimientos, fallas, repuestos, proveedores, exported_at: new Date().toISOString() };
        const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = 'respaldo_cuartel.json'; a.click();
        URL.revokeObjectURL(url);
      });
      document.getElementById('fileImport').addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const data = JSON.parse(await file.text());
        const tables = ['moviles', 'bomberos', 'compartimientos', 'inventario', 'revisiones', 'mantenimientos', 'fallas', 'repuestos', 'proveedores'];
        for (const table of tables) {
          if (Array.isArray(data[table]) && data[table].length) {
            const { error } = await sb.from(table).upsert(data[table]);
            if (error) throw error;
          }
        }
        showFlash('Respaldo importado');
      });
    }

    async function estadisticas() {
      els.title.textContent = 'Estadísticas';
      const [mov, rev, fallas, repuestos] = await Promise.all([safeSelect('moviles'), safeSelect('revisiones'), safeSelect('fallas'), safeSelect('repuestos')]);
      const fallasCriticas = fallas.filter(f => String(f.tipo_falla || '').toLowerCase().includes('crit'));
      const fueraServicio = mov.filter(m => String(m.estado || '').toLowerCase() === 'fuera de servicio');
      const repuestosCriticos = repuestos.filter(r => Number(r.stock_actual || 0) <= Number(r.stock_minimo || 0));
      els.content.innerHTML = '<div class="stat-grid">' +
        card('Total de revisiones', rev.length) +
        card('Fallas críticas', fallasCriticas.length) +
        card('Móviles fuera de servicio', fueraServicio.length) +
        card('Repuestos con alerta', repuestosCriticos.length) +
        '</div>' +
        '<div class="grid" style="grid-template-columns:1fr 1fr; margin-top:12px; align-items:start;">' +
          '<div class="card"><strong>Fallas por severidad</strong><div style="margin-top:8px;">' +
            '<div class="list-row">Leves: ' + fallas.filter(f => String(f.tipo_falla || '').toLowerCase() === 'leve').length + '</div>' +
            '<div class="list-row">Moderadas: ' + fallas.filter(f => String(f.tipo_falla || '').toLowerCase() === 'moderada').length + '</div>' +
            '<div class="list-row">Críticas: ' + fallasCriticas.length + '</div>' +
          '</div></div>' +
          '<div class="card"><strong>Control operativo</strong><div style="margin-top:8px;">' +
            '<div class="list-row">Móviles en servicio: ' + mov.filter(m => m.estado === 'En servicio').length + '</div>' +
            '<div class="list-row">Móviles en mantenimiento: ' + mov.filter(m => m.estado === 'En mantenimiento').length + '</div>' +
            '<div class="list-row">Móviles fuera de servicio: ' + fueraServicio.length + '</div>' +
          '</div></div>' +
        '</div>';
    }

    async function diagnostico() {
      els.title.textContent = 'Diagnóstico';
      const lines = [];
      async function run(label, fn) {
        try {
          const result = await fn();
          lines.push('OK - ' + label + (result ? ': ' + result : ''));
        } catch (err) {
          lines.push('ERROR - ' + label + ': ' + (err && err.message ? err.message : String(err)));
        }
      }
      await run('Auth', async () => {
        const { data, error } = await sb.auth.getSession();
        if (error) throw error;
        return data.session ? 'sesión activa' : 'sin sesión';
      });
      await run('Moviles', async () => String((await safeSelect('moviles', 'id', false, 1)).length));
      await run('Bomberos', async () => String((await safeSelect('bomberos', 'id', false, 1)).length));
      await run('Inventario', async () => String((await safeSelect('inventario', 'id', false, 1)).length));
      await run('Revisiones', async () => String((await safeSelect('revisiones', 'id', false, 1)).length));
      await run('Fallas', async () => String((await safeSelect('fallas', 'id', false, 1)).length));
      await run('Repuestos', async () => String((await safeSelect('repuestos', 'id', false, 1)).length));
      await run('Proveedores', async () => String((await safeSelect('proveedores', 'id', false, 1)).length));
      els.content.innerHTML = '<div class="err" style="background:#0f172a;border-color:#334155;color:#e2e8f0;">' + escapeHtml(lines.join('\n')) + '</div>';
    }

    async function nav(sec) {
      if (!canView(sec)) {
        showFlash('Ese perfil no tiene acceso a esta sección', 'err');
        return;
      }
      activateNav(sec);
      if (sec === 'dashboard') return dashboard();
      if (sec === 'moviles') return moviles();
      if (sec === 'bomberos') return bomberos();
      if (sec === 'inventario') return inventario();
      if (sec === 'plano') return plano();
      if (sec === 'fallas') return fallas();
      if (sec === 'checklist') return checklist();
      if (sec === 'repuestos') return repuestos();
      if (sec === 'proveedores') return proveedores();
      if (sec === 'mantenimiento') return mantenimiento();
      if (sec === 'respaldo') return respaldo();
      if (sec === 'estadisticas') return estadisticas();
      if (sec === 'diagnostico') return diagnostico();
    }

    function init() {
      try {
        if (!window.supabase || typeof window.supabase.createClient !== 'function') {
          throw new Error('No cargó la librería de Supabase.');
        }
        sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        els.bootMsg.textContent = 'Sistema listo.';
        authInputs();
        els.perfil.addEventListener('change', authInputs);
        els.logout.addEventListener('click', logout);
        els.logoutTop.addEventListener('click', logout);
        document.querySelectorAll('.nav').forEach(btn => btn.addEventListener('click', () => nav(btn.dataset.sec)));
        els.loginForm.addEventListener('submit', async (e) => {
          e.preventDefault();
          perfilActual = els.perfil.value;
          try {
            if (perfilActual === 'bomberos') {
              await loginBomberos();
            } else {
              await loginAdmin(els.email.value, els.password.value, perfilActual);
            }
            els.login.classList.add('hidden');
            els.app.classList.remove('hidden');
            els.userInfo.textContent = perfilActual === 'bomberos'
              ? 'Bomberos · dashboard, plano del móvil y checklist'
              : perfilActual + ' · permisos según rol';
            updateNavVisibility();
            nav(perfilActual === 'bomberos' ? 'checklist' : 'dashboard');
          } catch (err) {
            alert(err && err.message ? err.message : 'No se pudo iniciar sesión.');
          }
        });
      } catch (err) {
        els.bootMsg.textContent = 'Error de inicialización.';
        showBootError(err && err.message ? err.message : String(err));
      }
    }

    window.addEventListener('error', (event) => showBootError(event && event.message ? event.message : 'Script error'));
    window.addEventListener('unhandledrejection', (event) => showBootError(event && event.reason && event.reason.message ? event.reason.message : String(event.reason || 'Promise error')));
    init();
  </script>
</body>
</html>
