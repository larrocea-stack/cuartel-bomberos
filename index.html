<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cuartel Online</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: Arial, sans-serif; background: #020617; color: #e2e8f0; margin: 0; }
    .card { background: #0f172a; border: 1px solid #334155; border-radius: 16px; padding: 16px; }
    input, select, textarea { width: 100%; box-sizing: border-box; background: #1e293b; border: 1px solid #334155; color: white; border-radius: 12px; padding: 12px; }
    textarea { min-height: 100px; resize: vertical; }
    button { cursor: pointer; border: none; }
    .primary { background: #b91c1c; color: white; padding: 12px; border-radius: 12px; font-weight: 700; }
    .secondary { background: #1e293b; color: white; padding: 10px 12px; border-radius: 10px; }
    .danger { background: #7f1d1d; color: white; padding: 10px 12px; border-radius: 10px; }
    .nav { background: #111827; color: #e2e8f0; padding: 10px 12px; border-radius: 10px; text-align: left; }
    .nav.active { background: #991b1b; color: white; }
    .hidden { display: none !important; }
    .grid { display: grid; gap: 12px; }
    .small { font-size: 12px; color: #94a3b8; }
    .list-row { padding: 10px 0; border-bottom: 1px solid #334155; }
    .err { background: #450a0a; border: 1px solid #7f1d1d; color: #fecaca; border-radius: 12px; padding: 12px; white-space: pre-wrap; }
    .ok { background: #052e16; border: 1px solid #166534; color: #bbf7d0; border-radius: 12px; padding: 12px; }
    .pill { display:inline-block; font-size:11px; padding:2px 8px; border-radius:999px; }
    .pill-ok { background:#052e16; color:#bbf7d0; }
    .pill-warn { background:#78350f; color:#fde68a; }
    .pill-bad { background:#450a0a; color:#fecaca; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 10px; border-bottom: 1px solid #334155; text-align: left; vertical-align: top; }
    th { color: #94a3b8; font-size: 12px; text-transform: uppercase; }
    .toolbar { display:flex; gap:8px; flex-wrap:wrap; }
    .mobile-map { display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:12px; }
    .comp-box { background:#111827; border:1px solid #334155; border-radius:14px; padding:12px; }
    .stat-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:12px; }
    .hero-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:14px; }
    .hero-card { background:#0b1220; border:1px solid #334155; border-radius:18px; padding:18px; }
    .hero-number { font-size:34px; font-weight:800; line-height:1; margin-top:8px; }
    .hero-label { font-size:12px; color:#94a3b8; text-transform:uppercase; letter-spacing:.06em; }
    .status-big { border-radius:18px; padding:18px; border:1px solid #334155; }
    .status-service { background:#052e16; border-color:#166534; }
    .status-maint { background:#3b2a05; border-color:#92400e; }
    .status-out { background:#450a0a; border-color:#7f1d1d; }
    .guardia-wrap { min-height:100vh; background:#020617; color:#e2e8f0; padding:20px; }
    .guardia-header { display:flex; justify-content:space-between; align-items:center; gap:16px; margin-bottom:18px; }
    .guardia-title { font-size:34px; font-weight:800; letter-spacing:.04em; }
    .guardia-sub { color:#94a3b8; font-size:14px; }
    .guardia-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(240px,1fr)); gap:16px; }
    .guardia-card { border-radius:22px; padding:22px; border:1px solid #334155; background:#0b1220; }
    .guardia-number { font-size:56px; font-weight:900; line-height:1; margin-top:10px; }
    .guardia-label { font-size:13px; color:#94a3b8; text-transform:uppercase; letter-spacing:.08em; }
    .guardia-list { margin-top:18px; display:grid; grid-template-columns:1.1fr .9fr; gap:16px; }
    .guardia-item { padding:12px 0; border-bottom:1px solid #334155; font-size:18px; }
    .guardia-item:last-child { border-bottom:none; }
    .guardia-badge { display:inline-block; padding:4px 10px; border-radius:999px; font-size:12px; font-weight:700; }
    .guardia-danger { background:#7f1d1d; color:#fecaca; }
    .guardia-warn { background:#92400e; color:#fde68a; }
    .guardia-ok { background:#166534; color:#bbf7d0; }
    .guardia-footer { margin-top:16px; color:#94a3b8; font-size:13px; }
    .alert-list .list-row:last-child { border-bottom:none; }
    @media (max-width: 900px) {
      .layout { display: block !important; }
      aside { width: auto !important; border-right: none !important; border-bottom: 1px solid #334155 !important; }
    }
  </style>
</head>
<body>
  <div id="login" style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;">
    <div class="card" style="width:100%;max-width:420px;">
      <h1 style="font-size:32px;font-weight:800;margin:0 0 8px 0;">CUARTEL<span style="color:#ef4444;">ONLINE</span></h1>
      <p class="small" style="margin:0 0 16px 0;">Sistema con perfiles y control operativo</p>
      <div id="bootMsg" class="small" style="margin-bottom:12px;">Cargando sistema…</div>
      <div id="bootErr" class="err hidden" style="margin-bottom:12px;"></div>
      <form id="loginForm" class="grid">
        <select id="perfil">
          <option value="administrador">Administrador</option>
          <option value="materiales">Encargado de materiales</option>
          <option value="automotores">Encargado de automotores</option>
          <option value="jefatura">Jefatura</option>
          <option value="bomberos">Bomberos</option>
        </select>
        <input id="email" type="email" placeholder="Email" />
        <input id="password" type="password" placeholder="Contraseña" />
        <button type="submit" class="primary">Ingresar</button>
      </form>
    </div>
  </div>

  <div id="app" class="hidden">
    <div class="layout" style="display:flex;min-height:100vh;">
      <aside style="width:300px;background:#020617;border-right:1px solid #334155;padding:16px;box-sizing:border-box;">
        <div style="font-weight:800;font-size:22px;margin-bottom:8px;">CUARTEL<span style="color:#ef4444;">ONLINE</span></div>
        <div id="userInfo" class="small" style="margin-bottom:16px;"></div>
        <div class="grid">
          <button class="nav active" data-sec="dashboard" type="button">Dashboard</button>
          <button class="nav" data-sec="moviles" type="button">Móviles</button>
          <button class="nav" data-sec="bomberos" type="button">Bomberos</button>
          <button class="nav" data-sec="inventario" type="button">Inventario por móvil</button>
          <button class="nav" data-sec="plano" type="button">Plano del móvil</button>
          <button class="nav" data-sec="fallas" type="button">Reporte de fallas</button>
          <button class="nav" data-sec="checklist" type="button">Checklist de materiales</button>
          <button class="nav" data-sec="repuestos" type="button">Repuestos</button>
          <button class="nav" data-sec="proveedores" type="button">Proveedores</button>
          <button class="nav" data-sec="mantenimiento" type="button">Bitácora</button>
          <button class="nav" data-sec="respaldo" type="button">Importar / exportar</button>
          <button class="nav" data-sec="estadisticas" type="button">Estadísticas</button>
          <button class="nav" data-sec="novedades" type="button">Novedades de materiales</button>
          <button class="nav" data-sec="diagnostico" type="button">Diagnóstico</button>
          <button class="nav" data-sec="guardia" type="button">Modo guardia</button>
        </div>
        <button id="logout" class="secondary" style="margin-top:20px;width:100%;" type="button">Cerrar sesión</button>
      </aside>
      <main style="flex:1;padding:20px;box-sizing:border-box;">
        <div style="display:flex;justify-content:space-between;align-items:center;gap:12px;">
          <h2 id="title" style="margin:0;">Dashboard</h2>
          <button id="logoutTop" class="secondary" type="button">Salir</button>
        </div>
        <div id="flash" class="hidden" style="margin-top:12px;"></div>
        <div id="content" style="margin-top:16px;"></div>
      </main>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://nksnxiqteqqlngmpzeew.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_f-MtPNfegeikWpLn-Jsz_A_4fj7_Pm5';
    const PROFILE_EMAILS = {
      administrador: 'admin@cuartel.com',
      materiales: 'materiales@cuartel.com',
      automotores: 'automotores@cuartel.com',
      jefatura: 'jefatura@cuartel.com'
    };
    const VIEW_RULES = {
      administrador: ['dashboard','moviles','bomberos','inventario','plano','fallas','checklist','repuestos','proveedores','mantenimiento','respaldo','estadisticas','novedades','diagnostico','guardia'],
      materiales: ['dashboard','inventario','plano','estadisticas','novedades','diagnostico','guardia'],
      automotores: ['dashboard','moviles','plano','fallas','checklist','repuestos','proveedores','estadisticas','diagnostico','guardia'],
      jefatura: ['dashboard','moviles','bomberos','inventario','plano','fallas','checklist','repuestos','proveedores','mantenimiento','estadisticas','novedades','diagnostico','guardia'],
      bomberos: ['dashboard','plano','checklist','diagnostico','guardia']
    };

    const els = {
      login: document.getElementById('login'),
      app: document.getElementById('app'),
      loginForm: document.getElementById('loginForm'),
      perfil: document.getElementById('perfil'),
      email: document.getElementById('email'),
      password: document.getElementById('password'),
      bootMsg: document.getElementById('bootMsg'),
      bootErr: document.getElementById('bootErr'),
      userInfo: document.getElementById('userInfo'),
      title: document.getElementById('title'),
      content: document.getElementById('content'),
      flash: document.getElementById('flash'),
      logout: document.getElementById('logout'),
      logoutTop: document.getElementById('logoutTop')
    };

    let sb = null;
    let perfilActual = null;
    let userActual = null;

    function canView(section) { return (VIEW_RULES[perfilActual] || []).includes(section); }
    function canAdmin() { return perfilActual === 'administrador'; }
    function canBombero() { return perfilActual === 'bomberos'; }
    function canEditMoviles() { return perfilActual === 'administrador'; }
    function canEditBomberos() { return perfilActual === 'administrador'; }
    function canEditInventarioMovil() { return perfilActual === 'administrador' || perfilActual === 'materiales'; }
    function canEditFallas() { return perfilActual === 'administrador' || perfilActual === 'automotores'; }
    function canEditChecklist() { return perfilActual === 'administrador' || perfilActual === 'automotores' || perfilActual === 'bomberos'; }
    function canEditRepuestos() { return perfilActual === 'administrador' || perfilActual === 'automotores'; }
    function canEditProveedores() { return perfilActual === 'administrador' || perfilActual === 'automotores'; }
    function canEditMantenimiento() { return perfilActual === 'administrador'; }
    function canBackup() { return perfilActual === 'administrador'; }
    function canManageNovedades() { return perfilActual === 'administrador' || perfilActual === 'materiales'; }

    function escapeHtml(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }
    function showBootError(msg) {
      els.bootErr.textContent = msg;
      els.bootErr.classList.remove('hidden');
    }
    function showFlash(message, type = 'ok') {
      els.flash.className = type === 'ok' ? 'ok' : 'err';
      els.flash.textContent = message;
      els.flash.classList.remove('hidden');
      setTimeout(() => els.flash.classList.add('hidden'), 3200);
    }
    function authInputs() {
      const isBomberos = els.perfil.value === 'bomberos';
      els.email.classList.toggle('hidden', isBomberos);
      els.password.classList.toggle('hidden', isBomberos);
    }
    function activateNav(sec) {
      document.querySelectorAll('.nav').forEach(btn => btn.classList.remove('active'));
      const btn = document.querySelector('.nav[data-sec="' + sec + '"]');
      if (btn) btn.classList.add('active');
    }
    function updateNavVisibility() {
      document.querySelectorAll('.nav').forEach(btn => btn.classList.toggle('hidden', !canView(btn.dataset.sec)));
    }
    function card(label, value) {
      return '<div class="card"><div class="small">' + escapeHtml(label) + '</div><div style="font-size:28px;font-weight:800;">' + escapeHtml(value) + '</div></div>';
    }
    function statusPill(status) {
      const s = String(status || '').trim().toLowerCase();
      if (s === 'en servicio') return '<span class="pill pill-ok">En servicio</span>';
      if (s === 'en mantenimiento') return '<span class="pill pill-warn">En mantenimiento</span>';
      if (s === 'fuera de servicio') return '<span class="pill pill-bad">Fuera de servicio</span>';
      return '<span class="pill pill-bad">' + escapeHtml(status || 'Sin estado') + '</span>';
    }
    function severityPill(severity) {
      const s = String(severity || '').trim().toLowerCase();
      if (s === 'leve') return '<span class="pill pill-ok">Leve</span>';
      if (s === 'moderada') return '<span class="pill pill-warn">Moderada</span>';
      return '<span class="pill pill-bad">' + escapeHtml(severity || 'Crítica') + '</span>';
    }
    async function safeSelect(table, orderBy = 'id', ascending = false, limit = null) {
      let q = sb.from(table).select('*').order(orderBy, { ascending: ascending });
      if (limit) q = q.limit(limit);
      const res = await q;
      if (res.error) throw res.error;
      return res.data || [];
    }
    async function upsertRow(table, row) {
      const res = await sb.from(table).upsert(row);
      if (res.error) throw res.error;
    }
    async function insertRow(table, row) {
      const res = await sb.from(table).insert(row);
      if (res.error) throw res.error;
    }
    async function deleteRow(table, id) {
      const res = await sb.from(table).delete().eq('id', id);
      if (res.error) throw res.error;
    }
    async function updateRows(table, values, id) {
      const res = await sb.from(table).update(values).eq('id', id);
      if (res.error) throw res.error;
    }

    async function loginAdmin(email, password, profile) {
      const expected = PROFILE_EMAILS[profile];
      if (!expected) throw new Error('Perfil inválido.');
      if (String(email || '').trim().toLowerCase() !== expected.toLowerCase()) {
        throw new Error('Para el perfil ' + profile + ' debés usar el email ' + expected);
      }
      const authRes = await sb.auth.signInWithPassword({ email: email, password: password });
      if (authRes.error) throw authRes.error;
      userActual = authRes.data.user;
      const roleRes = await sb.from('user_profiles').select('*').eq('user_id', userActual.id).eq('profile_name', profile).limit(1);
      if (roleRes.error) throw roleRes.error;
      if (!roleRes.data || !roleRes.data.length) throw new Error('Ese usuario no tiene asignado el perfil seleccionado.');
    }
    async function loginBomberos() { userActual = null; }
    async function logout() {
      try { if (userActual) await sb.auth.signOut(); } catch (e) {}
      location.reload();
    }

    async function dashboard() {
      els.title.textContent = 'Dashboard';
      const res = await Promise.all([
        safeSelect('moviles'), safeSelect('inventario'), safeSelect('fallas'), safeSelect('repuestos'), safeSelect('novedades_materiales'), safeSelect('revisiones')
      ]);
      const mov = res[0], inv = res[1], fallas = res[2], repuestos = res[3], novedades = res[4], revisiones = res[5];
      const enServicio = mov.filter(x => x.estado === 'En servicio').length;
      const enMantenimiento = mov.filter(x => x.estado === 'En mantenimiento').length;
      const fueraServicio = mov.filter(x => x.estado === 'Fuera de servicio').length;
      const fallasCriticas = fallas.filter(f => String(f.tipo_falla || '').toLowerCase().includes('crit'));
      const repuestosCriticos = repuestos.filter(r => Number(r.stock_actual || 0) <= Number(r.stock_minimo || 0));
      const alertasMateriales = novedades.filter(n => String(n.estado || '').toLowerCase() === 'pendiente');
      const checklistPendientes = Math.max(mov.length - revisiones.length, 0);
      els.content.innerHTML =
        '<div class="hero-grid">' +
          '<div class="status-big status-service"><div class="hero-label">Móviles en servicio</div><div class="hero-number">' + enServicio + '</div><div class="small">Operativos para salida</div></div>' +
          '<div class="status-big status-maint"><div class="hero-label">En mantenimiento</div><div class="hero-number">' + enMantenimiento + '</div><div class="small">Requieren intervención</div></div>' +
          '<div class="status-big status-out"><div class="hero-label">Fuera de servicio</div><div class="hero-number">' + fueraServicio + '</div><div class="small">No disponibles</div></div>' +
        '</div>' +
        '<div class="stat-grid" style="margin-top:14px;">' +
          card('Inventario por móvil', inv.length) +
          card('Fallas críticas', fallasCriticas.length) +
          card('Repuestos críticos', repuestosCriticos.length) +
          card('Alertas materiales', alertasMateriales.length) +
          card('Checklist registrados', revisiones.length) +
          card('Checklist pendientes', checklistPendientes) +
        '</div>' +
        '<div class="grid" style="grid-template-columns:1.1fr .9fr; margin-top:14px; align-items:start;">' +
          '<div class="card alert-list"><strong>Centro de alertas</strong><div style="margin-top:10px;">' +
            ((alertasMateriales.slice(0,6).map(n => '<div class="list-row"><strong>Móvil ' + escapeHtml(n.movil) + '</strong> · ' + escapeHtml(n.compartimiento) + ' · ' + escapeHtml(n.material) + ' · <span class="pill pill-bad">' + escapeHtml(n.tipo_novedad) + '</span></div>').join('')) || '<div class="list-row">Sin alertas de materiales.</div>') +
            ((fallasCriticas.slice(0,4).map(f => '<div class="list-row"><strong>Móvil ' + escapeHtml(f.movil) + '</strong> · ' + escapeHtml(f.componente) + ' · <span class="pill pill-bad">Crítica</span></div>').join('')) || '') +
            ((repuestosCriticos.slice(0,4).map(r => '<div class="list-row"><strong>' + escapeHtml(r.nombre) + '</strong> · stock ' + escapeHtml(r.stock_actual) + '/' + escapeHtml(r.stock_minimo) + '</div>').join('')) || '') +
          '</div></div>' +
          '<div class="card"><strong>Resumen operativo</strong><div style="margin-top:10px;">' +
            '<div class="list-row">Total de móviles: <strong>' + mov.length + '</strong></div>' +
            '<div class="list-row">Móviles operativos: <strong>' + enServicio + '</strong></div>' +
            '<div class="list-row">Materiales observados: <strong>' + alertasMateriales.length + '</strong></div>' +
            '<div class="list-row">Fallas registradas: <strong>' + fallas.length + '</strong></div>' +
            '<div class="list-row">Repuestos bajo mínimo: <strong>' + repuestosCriticos.length + '</strong></div>' +
            '<div class="list-row">Último checklist: <strong>' + (revisiones[0] ? escapeHtml(new Date(revisiones[0].fecha_hora || Date.now()).toLocaleString('es-AR')) : 'Sin datos') + '</strong></div>' +
          '</div></div>' +
        '</div>' +
        '<div class="grid" style="grid-template-columns:1fr 1fr; margin-top:14px;">' +
          '<div class="card"><strong>Últimos checklist</strong><div style="margin-top:10px;">' +
            ((revisiones.slice(0,8).map(r => '<div class="list-row">Móvil ' + escapeHtml(r.movil) + ' · ' + escapeHtml(r.bombero) + '</div>').join('')) || 'Sin checklist.') +
          '</div></div>' +
          '<div class="card"><strong>Estado de la flota</strong><div style="margin-top:10px;">' +
            ((mov.map(m => '<div class="list-row"><strong>Móvil ' + escapeHtml(m.numero) + '</strong> · ' + statusPill(m.estado) + '</div>').join('')) || 'Sin móviles cargados.') +
          '</div></div>' +
        '</div>';
    }

    async function moviles() {
      els.title.textContent = 'Móviles';
      const data = await safeSelect('moviles');
      let html = '';
      if (canEditMoviles()) {
        html += '<div class="card" style="margin-bottom:12px;">' +
          '<strong>Alta / edición de móvil</strong>' +
          '<form id="fMovil" class="grid" style="grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); margin-top:12px;">' +
            '<input name="id" type="hidden">' +
            '<input name="numero" placeholder="Número de móvil" required>' +
            '<input name="patente" placeholder="Patente" required>' +
            '<input name="modelo" placeholder="Modelo" required>' +
            '<input name="tipo" placeholder="Tipo" required>' +
            '<input name="agua" type="number" placeholder="Capacidad de agua">' +
            '<select name="estado"><option>En servicio</option><option>En mantenimiento</option><option>Fuera de servicio</option></select>' +
            '<button class="primary" type="submit">Guardar móvil</button>' +
          '</form></div>';
      }
      html += '<div class="card"><table><thead><tr><th>Móvil</th><th>Patente</th><th>Modelo</th><th>Tipo</th><th>Agua</th><th>Estado</th>' + (canEditMoviles() ? '<th>Acciones</th>' : '') + '</tr></thead><tbody>' +
        (data.map(x => '<tr><td><strong>' + escapeHtml(x.numero) + '</strong></td><td>' + escapeHtml(x.patente) + '</td><td>' + escapeHtml(x.modelo) + '</td><td>' + escapeHtml(x.tipo) + '</td><td>' + escapeHtml(x.agua || 0) + ' L</td><td>' + statusPill(x.estado) + '</td>' + (canEditMoviles() ? '<td><button class="secondary edit-movil" data-id="' + x.id + '">Editar</button> <button class="danger del-movil" data-id="' + x.id + '">Borrar</button></td>' : '') + '</tr>').join('') || '<tr><td colspan="7">Sin móviles cargados.</td></tr>') +
        '</tbody></table></div>';
      els.content.innerHTML = html;
      if (!canEditMoviles()) return;
      const form = document.getElementById('fMovil');
      form.addEventListener('submit', async function(e) {
        e.preventDefault();
        const fd = new FormData(form);
        const row = { numero: fd.get('numero'), patente: fd.get('patente'), modelo: fd.get('modelo'), tipo: fd.get('tipo'), agua: Number(fd.get('agua') || 0), estado: fd.get('estado') };
        if (fd.get('id')) row.id = Number(fd.get('id'));
        await upsertRow('moviles', row);
        showFlash('Móvil guardado');
        moviles();
      });
      document.querySelectorAll('.edit-movil').forEach(btn => btn.addEventListener('click', function() {
        const item = data.find(x => String(x.id) === btn.dataset.id);
        form.elements.id.value = item.id;
        form.elements.numero.value = item.numero || '';
        form.elements.patente.value = item.patente || '';
        form.elements.modelo.value = item.modelo || '';
        form.elements.tipo.value = item.tipo || '';
        form.elements.agua.value = item.agua || 0;
        form.elements.estado.value = item.estado || 'En servicio';
      }));
      document.querySelectorAll('.del-movil').forEach(btn => btn.addEventListener('click', async function() {

      html += '<div class="card"><table><thead><tr><th>Proveedor</th><th>Contacto</th><th>Rubro</th><th>Descripción</th>' + (canEditProveedores() ? '<th>Acciones</th>' : '') + '</tr></thead><tbody>' +
        (rows.map(r => '<tr><td><strong>' + escapeHtml(r.nombre) + '</strong></td><td>' + escapeHtml(r.contacto) + '</td><td>' + escapeHtml(r.rubro) + '</td><td>' + escapeHtml(r.descripcion || '') + '</td>' + (canEditProveedores() ? '<td><button class="secondary edit-prov" data-id="' + r.id + '">Editar</button> <button class="danger del-prov" data-id="' + r.id + '">Borrar</button></td>' : '') + '</tr>').join('') || '<tr><td colspan="5">Sin proveedores cargados.</td></tr>') + '</tbody></table></div>';
      els.content.innerHTML = html;
      if (!canEditProveedores()) return;
      const form = document.getElementById('fProv');
      form.addEventListener('submit', async function(e) {
        e.preventDefault();
        const fd = new FormData(form);
        const row = { nombre: fd.get('nombre'), contacto: fd.get('contacto'), rubro: fd.get('rubro'), descripcion: fd.get('descripcion') };
        if (fd.get('id')) row.id = Number(fd.get('id'));
        await upsertRow('proveedores', row);
        showFlash('Proveedor guardado');
        proveedores();
      });
      document.querySelectorAll('.edit-prov').forEach(btn => btn.addEventListener('click', function() {
        const item = rows.find(x => String(x.id) === btn.dataset.id);
        form.elements.id.value = item.id;
        form.elements.nombre.value = item.nombre || '';
        form.elements.contacto.value = item.contacto || '';
        form.elements.rubro.value = item.rubro || '';
        form.elements.descripcion.value = item.descripcion || '';
      }));
      document.querySelectorAll('.del-prov').forEach(btn => btn.addEventListener('click', async function() {
        if (!confirm('¿Eliminar proveedor?')) return;
        await deleteRow('proveedores', Number(btn.dataset.id));
        showFlash('Proveedor eliminado');
        proveedores();
      }));
    }

    async function mantenimiento() {
      els.title.textContent = 'Bitácora';
      const all = await Promise.all([safeSelect('moviles', 'numero', true), safeSelect('bomberos', 'apellido', true), safeSelect('mantenimientos', 'id', false)]);
      const movs = all[0], boms = all[1], rows = all[2];
      let html = '';
      if (canEditMantenimiento()) {
        html += '<div class="card" style="margin-bottom:12px;"><strong>Registrar mantenimiento</strong><form id="fMan" class="grid" style="grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); margin-top:12px;"><input name="id" type="hidden"><select name="movil">' + movs.map(m => '<option value="' + escapeHtml(m.numero) + '">Móvil ' + escapeHtml(m.numero) + '</option>').join('') + '</select><select name="responsable">' + boms.map(b => { const nombre = ((b.jerarquia || '') + ' ' + (b.apellido || '') + ' ' + (b.nombre || '')).trim(); return '<option value="' + escapeHtml(nombre) + '">' + escapeHtml(nombre) + '</option>'; }).join('') + '</select><input name="tipo" placeholder="Tipo de mantenimiento" required><input name="km" type="number" placeholder="Kilometraje"><input name="observaciones" placeholder="Observaciones"><button class="primary" type="submit">Guardar mantenimiento</button></form></div>';
      }
      html += '<div class="card"><table><thead><tr><th>Fecha</th><th>Móvil</th><th>Responsable</th><th>Tipo</th><th>KM</th><th>Observaciones</th>' + (canEditMantenimiento() ? '<th>Acciones</th>' : '') + '</tr></thead><tbody>' +
        (rows.map(r => '<tr><td>' + escapeHtml(new Date(r.fecha_hora || Date.now()).toLocaleString('es-AR')) + '</td><td>Móvil ' + escapeHtml(r.movil) + '</td><td>' + escapeHtml(r.responsable) + '</td><td>' + escapeHtml(r.tipo) + '</td><td>' + escapeHtml(r.km || '') + '</td><td>' + escapeHtml(r.observaciones || '') + '</td>' + (canEditMantenimiento() ? '<td><button class="secondary edit-man" data-id="' + r.id + '">Editar</button> <button class="danger del-man" data-id="' + r.id + '">Borrar</button></td>' : '') + '</tr>').join('') || '<tr><td colspan="7">Sin mantenimientos.</td></tr>') + '</tbody></table></div>';
      els.content.innerHTML = html;
      if (!canEditMantenimiento()) return;
      const form = document.getElementById('fMan');
      form.addEventListener('submit', async function(e) {
        e.preventDefault();
        const fd = new FormData(form);
        const row = { movil: fd.get('movil'), responsable: fd.get('responsable'), tipo: fd.get('tipo'), km: Number(fd.get('km') || 0), observaciones: fd.get('observaciones'), fecha_hora: new Date().toISOString() };
        if (fd.get('id')) row.id = Number(fd.get('id'));
        await upsertRow('mantenimientos', row);
        showFlash('Mantenimiento guardado');
        mantenimiento();
      });
      document.querySelectorAll('.edit-man').forEach(btn => btn.addEventListener('click', function() {
        const item = rows.find(x => String(x.id) === btn.dataset.id);
        form.elements.id.value = item.id;
        form.elements.movil.value = item.movil;
        form.elements.responsable.value = item.responsable;
        form.elements.tipo.value = item.tipo || '';
        form.elements.km.value = item.km || 0;
        form.elements.observaciones.value = item.observaciones || '';
      }));
      document.querySelectorAll('.del-man').forEach(btn => btn.addEventListener('click', async function() {
        if (!confirm('¿Eliminar mantenimiento?')) return;
        await deleteRow('mantenimientos', Number(btn.dataset.id));
        showFlash('Mantenimiento eliminado');
        mantenimiento();
      }));
    }

    async function respaldo() {
      els.title.textContent = 'Importar / exportar';
      els.content.innerHTML = '<div class="card"><div class="toolbar"><button id="btnExport" class="secondary" ' + (canBackup() ? '' : 'disabled') + '>Exportar respaldo JSON</button><input id="fileImport" type="file" accept="application/json" ' + (canBackup() ? '' : 'disabled') + '></div><div class="small" style="margin-top:12px;">Solo el perfil Administrador puede importar o exportar respaldos.</div></div>';
      if (!canBackup()) return;
      document.getElementById('btnExport').addEventListener('click', async function() {
        const all = await Promise.all([safeSelect('moviles'), safeSelect('bomberos'), safeSelect('compartimientos'), safeSelect('inventario'), safeSelect('revisiones'), safeSelect('mantenimientos'), safeSelect('fallas'), safeSelect('repuestos'), safeSelect('proveedores'), safeSelect('novedades_materiales')]);
        const payload = { moviles: all[0], bomberos: all[1], compartimientos: all[2], inventario: all[3], revisiones: all[4], mantenimientos: all[5], fallas: all[6], repuestos: all[7], proveedores: all[8], novedades_materiales: all[9], exported_at: new Date().toISOString() };
        const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = 'respaldo_cuartel.json'; a.click();
        URL.revokeObjectURL(url);
      });
      document.getElementById('fileImport').addEventListener('change', async function(e) {
        const file = e.target.files[0];
        if (!file) return;
        const data = JSON.parse(await file.text());
        const tables = ['moviles','bomberos','compartimientos','inventario','revisiones','mantenimientos','fallas','repuestos','proveedores','novedades_materiales'];
        for (let i = 0; i < tables.length; i++) {
          const table = tables[i];
          if (Array.isArray(data[table]) && data[table].length) {
            const res = await sb.from(table).upsert(data[table]);
            if (res.error) throw res.error;
          }
        }
        showFlash('Respaldo importado');
      });
    }

    async function estadisticas() {
      els.title.textContent = 'Estadísticas';
      const all = await Promise.all([safeSelect('moviles'), safeSelect('revisiones'), safeSelect('fallas'), safeSelect('repuestos'), safeSelect('novedades_materiales')]);
      const mov = all[0], rev = all[1], fallas = all[2], repuestos = all[3], novedades = all[4];
      const fallasCriticas = fallas.filter(f => String(f.tipo_falla || '').toLowerCase().includes('crit'));
      const fueraServicio = mov.filter(m => String(m.estado || '').toLowerCase() === 'fuera de servicio');
      const repuestosCriticos = repuestos.filter(r => Number(r.stock_actual || 0) <= Number(r.stock_minimo || 0));
      const faltantes = novedades.filter(n => String(n.tipo_novedad || '').toLowerCase() === 'faltante');
      const daniados = novedades.filter(n => String(n.tipo_novedad || '').toLowerCase() === 'dañado');
      const pendientes = novedades.filter(n => String(n.estado || '').toLowerCase() === 'pendiente');
      const cerradas = novedades.filter(n => String(n.estado || '').toLowerCase() === 'cerrada');
      els.content.innerHTML = '<div class="stat-grid">' + card('Total de checklist', rev.length) + card('Fallas críticas', fallasCriticas.length) + card('Móviles fuera de servicio', fueraServicio.length) + card('Repuestos con alerta', repuestosCriticos.length) + card('Materiales faltantes', faltantes.length) + card('Materiales dañados', daniados.length) + card('Novedades pendientes', pendientes.length) + card('Novedades cerradas', cerradas.length) + '</div>' + '<div class="grid" style="grid-template-columns:1fr 1fr; margin-top:12px;">' + '<div class="card"><strong>Fallas por severidad</strong><div style="margin-top:8px;"><div class="list-row">Leves: ' + fallas.filter(f => String(f.tipo_falla || '').toLowerCase() === 'leve').length + '</div><div class="list-row">Moderadas: ' + fallas.filter(f => String(f.tipo_falla || '').toLowerCase() === 'moderada').length + '</div><div class="list-row">Críticas: ' + fallasCriticas.length + '</div></div></div>' + '<div class="card"><strong>Novedades de materiales</strong><div style="margin-top:8px;"><div class="list-row">Faltantes: ' + faltantes.length + '</div><div class="list-row">Dañados: ' + daniados.length + '</div><div class="list-row">Pendientes: ' + pendientes.length + '</div><div class="list-row">Cerradas: ' + cerradas.length + '</div></div></div>' + '</div>';
    }

    async function novedades() {
      els.title.textContent = 'Novedades de materiales';
      const rows = await safeSelect('novedades_materiales', 'id', false);
      const abiertas = rows.filter(r => String(r.estado || '').toLowerCase() === 'pendiente');
      const cerradas = rows.filter(r => String(r.estado || '').toLowerCase() === 'cerrada');
      els.content.innerHTML = '<div class="stat-grid">' + card('Pendientes', abiertas.length) + card('Cerradas', cerradas.length) + card('Faltantes', rows.filter(r => String(r.tipo_novedad || '').toLowerCase() === 'faltante').length) + card('Dañados', rows.filter(r => String(r.tipo_novedad || '').toLowerCase() === 'dañado').length) + '</div>' + '<div class="card" style="margin-top:12px;"><strong>Gestión de novedades</strong><table style="margin-top:12px;"><thead><tr><th>Fecha</th><th>Móvil</th><th>Compartimiento</th><th>Material</th><th>Tipo</th><th>Detalle</th><th>Estado</th>' + (canManageNovedades() ? '<th>Acciones</th>' : '') + '</tr></thead><tbody>' + (rows.map(r => '<tr><td>' + escapeHtml(new Date(r.fecha_hora || Date.now()).toLocaleString('es-AR')) + '</td><td>Móvil ' + escapeHtml(r.movil) + '</td><td>' + escapeHtml(r.compartimiento) + '</td><td>' + escapeHtml(r.material) + '</td><td>' + escapeHtml(r.tipo_novedad) + '</td><td>' + escapeHtml(r.detalle || '') + '</td><td>' + (String(r.estado || '').toLowerCase() === 'cerrada' ? '<span class="pill pill-ok">Cerrada</span>' : '<span class="pill pill-bad">Pendiente</span>') + '</td>' + (canManageNovedades() ? '<td>' + (String(r.estado || '').toLowerCase() === 'pendiente' ? '<button class="secondary cerrar-nov-tabla" data-id="' + r.id + '">Cerrar</button>' : '<button class="secondary reabrir-nov-tabla" data-id="' + r.id + '">Reabrir</button>') + (canAdmin() ? ' <button class="danger del-nov-tabla" data-id="' + r.id + '">Borrar</button>' : '') + '</td>' : '') + '</tr>').join('') || '<tr><td colspan="8">Sin novedades registradas.</td></tr>') + '</tbody></table></div>';
      if (!canManageNovedades()) return;
      document.querySelectorAll('.cerrar-nov-tabla').forEach(btn => btn.addEventListener('click', async function() {
        await updateRows('novedades_materiales', { estado: 'cerrada' }, Number(btn.dataset.id));
        showFlash('Novedad cerrada');
        novedades();
      }));
      document.querySelectorAll('.reabrir-nov-tabla').forEach(btn => btn.addEventListener('click', async function() {
        await updateRows('novedades_materiales', { estado: 'pendiente' }, Number(btn.dataset.id));
        showFlash('Novedad reabierta');
        novedades();
      }));
      if (canAdmin()) {
        document.querySelectorAll('.del-nov-tabla').forEach(btn => btn.addEventListener('click', async function() {
          if (!confirm('¿Eliminar novedad?')) return;
          await deleteRow('novedades_materiales', Number(btn.dataset.id));
          showFlash('Novedad eliminada');
          novedades();
        }));
      }
    }

    async function diagnostico() {
      els.title.textContent = 'Diagnóstico';
      const lines = [];
      async function run(label, fn) {
        try {
          const result = await fn();
          lines.push('OK - ' + label + (result ? ': ' + result : ''));
        } catch (err) {
          lines.push('ERROR - ' + label + ': ' + (err && err.message ? err.message : String(err)));
        }
      }
      await run('Auth', async function() {
        const res = await sb.auth.getSession();
        if (res.error) throw res.error;
        return res.data.session ? 'sesión activa' : 'sin sesión';
      });
      await run('Moviles', async function() { return String((await safeSelect('moviles', 'id', false, 1)).length); });
      await run('Bomberos', async function() { return String((await safeSelect('bomberos', 'id', false, 1)).length); });
      await run('Inventario', async function() { return String((await safeSelect('inventario', 'id', false, 1)).length); });
      await run('Revisiones', async function() { return String((await safeSelect('revisiones', 'id', false, 1)).length); });
      await run('Fallas', async function() { return String((await safeSelect('fallas', 'id', false, 1)).length); });
      await run('Repuestos', async function() { return String((await safeSelect('repuestos', 'id', false, 1)).length); });
      await run('Proveedores', async function() { return String((await safeSelect('proveedores', 'id', false, 1)).length); });
      await run('Novedades materiales', async function() { return String((await safeSelect('novedades_materiales', 'id', false, 1)).length); });
      els.content.innerHTML = '<div class="err" style="background:#0f172a;border-color:#334155;color:#e2e8f0;">' + escapeHtml(lines.join('
')) + '</div>';
    }

    async function guardia() {
      els.title.textContent = 'Modo guardia';
      const all = await Promise.all([
        safeSelect('moviles'), safeSelect('fallas'), safeSelect('repuestos'), safeSelect('novedades_materiales'), safeSelect('revisiones')
      ]);
      const mov = all[0], fallas = all[1], repuestos = all[2], novedades = all[3], revisiones = all[4];
      const enServicio = mov.filter(m => m.estado === 'En servicio').length;
      const enMantenimiento = mov.filter(m => m.estado === 'En mantenimiento').length;
      const fueraServicio = mov.filter(m => m.estado === 'Fuera de servicio').length;
      const criticas = fallas.filter(f => String(f.tipo_falla || '').toLowerCase().includes('crit'));
      const repuestosCriticos = repuestos.filter(r => Number(r.stock_actual || 0) <= Number(r.stock_minimo || 0));
      const pendientes = novedades.filter(n => String(n.estado || '').toLowerCase() === 'pendiente');
      const ultimaRevision = revisiones[0] ? new Date(revisiones[0].fecha_hora || Date.now()).toLocaleString('es-AR') : 'Sin registros';
      els.content.innerHTML = '' +
        '<div class="guardia-wrap">' +
          '<div class="guardia-header">' +
            '<div><div class="guardia-title">PANEL DE GUARDIA</div><div class="guardia-sub">Monitoreo operativo del cuartel · actualización manual con F5</div></div>' +
            '<button id="refreshGuardia" class="primary" type="button">Actualizar</button>
            '<button id="autoGuardia" class="secondary" type="button">Auto 60 s: ON</button>' +' +
          '</div>' +
          '<div class="guardia-grid">' +
            '<div class="guardia-card status-service"><div class="guardia-label">Móviles en servicio</div><div class="guardia-number">' + enServicio + '</div></div>' +
            '<div class="guardia-card status-maint"><div class="guardia-label">En mantenimiento</div><div class="guardia-number">' + enMantenimiento + '</div></div>' +
            '<div class="guardia-card status-out"><div class="guardia-label">Fuera de servicio</div><div class="guardia-number">' + fueraServicio + '</div></div>' +
            '<div class="guardia-card"><div class="guardia-label">Alertas activas</div><div class="guardia-number">' + (criticas.length + pendientes.length + repuestosCriticos.length) + '</div></div>' +
          '</div>' +
          '<div class="guardia-list">' +
            '<div class="guardia-card"><div class="guardia-label">Alertas prioritarias</div>' +
              ((criticas.slice(0,6).map(f => '<div class="guardia-item"><strong>Móvil ' + escapeHtml(f.movil) + '</strong> · ' + escapeHtml(f.componente) + ' <span class="guardia-badge guardia-danger">Crítica</span></div>').join('')) || '') +
              ((pendientes.slice(0,6).map(n => '<div class="guardia-item"><strong>Móvil ' + escapeHtml(n.movil) + '</strong> · ' + escapeHtml(n.material) + ' <span class="guardia-badge guardia-danger">' + escapeHtml(n.tipo_novedad) + '</span></div>').join('')) || '') +
              ((repuestosCriticos.slice(0,6).map(r => '<div class="guardia-item"><strong>' + escapeHtml(r.nombre) + '</strong> · stock ' + escapeHtml(r.stock_actual) + '/' + escapeHtml(r.stock_minimo) + ' <span class="guardia-badge guardia-warn">Repuesto</span></div>').join('')) || '') +
              ((criticas.length + pendientes.length + repuestosCriticos.length) === 0 ? '<div class="guardia-item"><span class="guardia-badge guardia-ok">Sin alertas</span></div>' : '') +
            '</div>' +
            '<div class="guardia-card"><div class="guardia-label">Resumen de guardia</div>' +
              '<div class="guardia-item">Total de móviles: <strong>' + mov.length + '</strong></div>' +
              '<div class="guardia-item">Fallas críticas: <strong>' + criticas.length + '</strong></div>' +
              '<div class="guardia-item">Novedades pendientes: <strong>' + pendientes.length + '</strong></div>' +
              '<div class="guardia-item">Repuestos bajo mínimo: <strong>' + repuestosCriticos.length + '</strong></div>' +
              '<div class="guardia-item">Última revisión: <strong>' + escapeHtml(ultimaRevision) + '</strong></div>' +
              '<div class="guardia-footer">Ideal para TV o monitor de guardia. Podés dejar esta vista abierta permanentemente.</div>' +
            '</div>' +
          '</div>' +
        '</div>';
      window.__guardiaAuto = window.__guardiaAuto === undefined ? true : window.__guardiaAuto;
      if (window.__guardiaTimer) {
        clearInterval(window.__guardiaTimer);
        window.__guardiaTimer = null;
      }
      document.getElementById('refreshGuardia').addEventListener('click', function() { guardia(); });
      const autoBtn = document.getElementById('autoGuardia');
      autoBtn.textContent = window.__guardiaAuto ? 'Auto 60 s: ON' : 'Auto 60 s: OFF';
      autoBtn.addEventListener('click', function() {
        window.__guardiaAuto = !window.__guardiaAuto;
        autoBtn.textContent = window.__guardiaAuto ? 'Auto 60 s: ON' : 'Auto 60 s: OFF';
        if (window.__guardiaTimer) {
          clearInterval(window.__guardiaTimer);
          window.__guardiaTimer = null;
        }
        if (window.__guardiaAuto) {
          window.__guardiaTimer = setInterval(function() {
            if (els.title.textContent === 'Modo guardia') guardia();
          }, 60000);
        }
      });
      if (window.__guardiaAuto) {
        window.__guardiaTimer = setInterval(function() {
          if (els.title.textContent === 'Modo guardia') guardia();
        }, 60000);
      }
    }

    async function nav(sec) {
      if (!canView(sec)) {
        showFlash('Ese perfil no tiene acceso a esta sección', 'err');
        return;
      }
      activateNav(sec);
      if (sec === 'dashboard') return dashboard();
      if (sec === 'moviles') return moviles();
      if (sec === 'bomberos') return bomberos();
      if (sec === 'inventario') return inventario();
      if (sec === 'plano') return plano();
      if (sec === 'fallas') return fallas();
      if (sec === 'checklist') return checklist();
      if (sec === 'repuestos') return repuestos();
      if (sec === 'proveedores') return proveedores();
      if (sec === 'mantenimiento') return mantenimiento();
      if (sec === 'respaldo') return respaldo();
      if (sec === 'estadisticas') return estadisticas();
      if (sec === 'novedades') return novedades();
      if (sec === 'diagnostico') return diagnostico();
      if (sec === 'guardia') return guardia();
    }

    function init() {
      try {
        if (!window.supabase || typeof window.supabase.createClient !== 'function') throw new Error('No cargó la librería de Supabase.');
        sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        els.bootMsg.textContent = 'Sistema listo.';
        authInputs();
        els.perfil.addEventListener('change', authInputs);
        els.logout.addEventListener('click', logout);
        els.logoutTop.addEventListener('click', logout);
        document.querySelectorAll('.nav').forEach(btn => btn.addEventListener('click', function() { nav(btn.dataset.sec); }));
        els.loginForm.addEventListener('submit', async function(e) {
          e.preventDefault();
          perfilActual = els.perfil.value;
          try {
            if (perfilActual === 'bomberos') {
              await loginBomberos();
            } else {
              await loginAdmin(els.email.value, els.password.value, perfilActual);
            }
            els.login.classList.add('hidden');
            els.app.classList.remove('hidden');
            els.userInfo.textContent = canBombero() ? 'Bomberos · dashboard, plano del móvil y checklist de materiales' : perfilActual + ' · permisos según rol';
            updateNavVisibility();
            nav(canBombero() ? 'checklist' : 'dashboard');
          } catch (err) {
            alert(err && err.message ? err.message : 'No se pudo iniciar sesión.');
          }
        });
      } catch (err) {
        els.bootMsg.textContent = 'Error de inicialización.';
        showBootError(err && err.message ? err.message : String(err));
      }
    }

    window.addEventListener('error', function(event) { showBootError(event && event.message ? event.message : 'Script error'); });
    window.addEventListener('unhandledrejection', function(event) { showBootError(event && event.reason && event.reason.message ? event.reason.message : String((event && event.reason) || 'Promise error')); });
    init();
  </script>
</body>
