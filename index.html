<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cuartel Online</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root{--bg:#020617;--panel:#0f172a;--soft:#1e293b;--border:#334155;--text:#e2e8f0;--muted:#94a3b8;--red:#b91c1c;--red2:#7f1d1d;--green:#166534;--amber:#92400e}
    *{box-sizing:border-box} body{margin:0;font-family:Arial,sans-serif;background:var(--bg);color:var(--text)}
    .hidden{display:none!important}.layout{display:flex;min-height:100vh}.sidebar{width:300px;background:var(--bg);border-right:1px solid var(--border);padding:16px}.main{flex:1;padding:20px}
    .card{background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:16px}.grid{display:grid;gap:12px}.toolbar{display:flex;gap:8px;flex-wrap:wrap}.small{font-size:12px;color:var(--muted)}
    .nav{background:#111827;color:var(--text);padding:10px 12px;border:none;border-radius:10px;text-align:left;cursor:pointer}.nav.active{background:#991b1b}.nav:disabled{opacity:.5;cursor:not-allowed}
    .primary,.secondary,.danger{border:none;border-radius:10px;padding:10px 12px;color:#fff;cursor:pointer}.primary{background:var(--red)}.secondary{background:var(--soft)}.danger{background:var(--red2)}
    input,select,textarea{width:100%;padding:12px;border-radius:10px;border:1px solid var(--border);background:var(--soft);color:#fff} textarea{min-height:90px;resize:vertical}
    table{width:100%;border-collapse:collapse} th,td{padding:10px;border-bottom:1px solid var(--border);text-align:left;vertical-align:top} th{font-size:12px;color:var(--muted);text-transform:uppercase}
    .list-row{padding:10px 0;border-bottom:1px solid var(--border)} .pill{display:inline-block;padding:2px 8px;border-radius:999px;font-size:11px}
    .pill-ok{background:#052e16;color:#bbf7d0}.pill-warn{background:#78350f;color:#fde68a}.pill-bad{background:#450a0a;color:#fecaca}
    .err,.ok{border-radius:12px;padding:12px;white-space:pre-wrap}.err{background:#450a0a;border:1px solid var(--red2);color:#fecaca}.ok{background:#052e16;border:1px solid var(--green);color:#bbf7d0}
    .hero-grid,.stat-grid,.mobile-map{display:grid;gap:12px}.hero-grid{grid-template-columns:repeat(auto-fit,minmax(220px,1fr))}.stat-grid{grid-template-columns:repeat(auto-fit,minmax(180px,1fr))}.mobile-map{grid-template-columns:repeat(auto-fit,minmax(180px,1fr))}
    .hero-card{border-radius:18px;padding:18px;border:1px solid var(--border)}.service{background:#052e16;border-color:var(--green)}.maint{background:#3b2a05;border-color:var(--amber)}.out{background:#450a0a;border-color:var(--red2)}
    .hero-number{font-size:34px;font-weight:800}.hero-label{font-size:12px;color:var(--muted);text-transform:uppercase}.comp-box{background:#111827;border:1px solid var(--border);border-radius:14px;padding:12px}
    @media (max-width:900px){.layout{display:block}.sidebar{width:auto;border-right:none;border-bottom:1px solid var(--border)}}
  </style>
</head>
<body>
  <div id="login" style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;">
    <div class="card" style="width:100%;max-width:430px;">
      <h1 style="font-size:32px;font-weight:800;margin:0 0 8px 0;">CUARTEL<span style="color:#ef4444;">ONLINE</span></h1>
      <p class="small" style="margin:0 0 16px 0;">Sistema con perfiles y control operativo</p>
      <div id="bootMsg" class="small" style="margin-bottom:12px;">Cargando sistema…</div>
      <div id="bootErr" class="err hidden" style="margin-bottom:12px;"></div>
      <form id="loginForm" class="grid">
        <select id="perfil">
          <option value="administrador">Administrador</option>
          <option value="materiales">Encargado de materiales</option>
          <option value="automotores">Encargado de automotores</option>
          <option value="jefatura">Jefatura</option>
          <option value="bomberos">Bomberos</option>
        </select>
        <input id="email" type="email" placeholder="Email" />
        <input id="password" type="password" placeholder="Contraseña" />
        <button type="submit" class="primary">Ingresar</button>
      </form>
    </div>
  </div>

  <div id="app" class="hidden">
    <div class="layout">
      <aside class="sidebar">
        <div style="font-weight:800;font-size:22px;margin-bottom:8px;">CUARTEL<span style="color:#ef4444;">ONLINE</span></div>
        <div id="userInfo" class="small" style="margin-bottom:16px;"></div>
        <div class="grid">
          <button class="nav active" data-sec="dashboard" type="button">Dashboard</button>
          <button class="nav" data-sec="inventario_general" type="button">Inventario general</button>
          <button class="nav" data-sec="asignaciones" type="button">Asignaciones</button>
          <button class="nav" data-sec="mantenimiento_stock" type="button">Control de mantenimiento</button>
          <button class="nav" data-sec="archivo_bajas" type="button">Archivo / bajas</button>
          <button class="nav" data-sec="inventario_movil" type="button">Inventario por móvil</button>
          <button class="nav" data-sec="reportes_stock" type="button">Reportes de stock</button>
          <button class="nav" data-sec="plano" type="button">Plano del móvil</button>
          <button class="nav" data-sec="diagnostico" type="button">Diagnóstico</button>
        </div>
        <button id="logout" class="secondary" style="margin-top:20px;width:100%;" type="button">Cerrar sesión</button>
      </aside>
      <main class="main">
        <div style="display:flex;justify-content:space-between;align-items:center;gap:12px;">
          <h2 id="title" style="margin:0;">Dashboard</h2>
          <button id="logoutTop" class="secondary" type="button">Salir</button>
        </div>
        <div id="flash" class="hidden" style="margin-top:12px;"></div>
        <div id="content" style="margin-top:16px;"></div>
      </main>
    </div>
  </div>

<script>
const SUPABASE_URL='https://nksnxiqteqqlngmpzeew.supabase.co';
const SUPABASE_KEY='sb_publishable_f-MtPNfegeikWpLn-Jsz_A_4fj7_Pm5';
const PROFILE_EMAILS={administrador:'admin@cuartel.com',materiales:'materiales@cuartel.com',automotores:'automotores@cuartel.com',jefatura:'jefatura@cuartel.com'};
const VIEW_RULES={
  administrador:['dashboard','inventario_general','asignaciones','mantenimiento_stock','archivo_bajas','inventario_movil','reportes_stock','plano','diagnostico'],
  materiales:['dashboard','inventario_general','asignaciones','mantenimiento_stock','archivo_bajas','inventario_movil','reportes_stock','plano','diagnostico'],
  automotores:['dashboard','inventario_general','inventario_movil','reportes_stock','plano','diagnostico'],
  jefatura:['dashboard','inventario_general','asignaciones','mantenimiento_stock','archivo_bajas','inventario_movil','reportes_stock','plano','diagnostico'],
  bomberos:['dashboard','inventario_general','inventario_movil','plano','diagnostico']
};
const els={
  login:document.getElementById('login'),app:document.getElementById('app'),loginForm:document.getElementById('loginForm'),perfil:document.getElementById('perfil'),email:document.getElementById('email'),password:document.getElementById('password'),bootMsg:document.getElementById('bootMsg'),bootErr:document.getElementById('bootErr'),userInfo:document.getElementById('userInfo'),title:document.getElementById('title'),content:document.getElementById('content'),flash:document.getElementById('flash'),logout:document.getElementById('logout'),logoutTop:document.getElementById('logoutTop')
};
let sb=null,perfilActual=null,userActual=null;
function canView(s){return (VIEW_RULES[perfilActual]||[]).includes(s)}
function canEditStockGeneral(){return perfilActual==='administrador'||perfilActual==='materiales'}
function canManageMaintenanceStock(){return perfilActual==='administrador'||perfilActual==='materiales'}
function canManageDecommissions(){return perfilActual==='administrador'||perfilActual==='materiales'}
function canDeleteCompartments(){return perfilActual==='administrador'||perfilActual==='materiales'}
function escapeHtml(v){return String(v??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;')}
function showBootError(msg){els.bootErr.textContent=msg;els.bootErr.classList.remove('hidden')}
function showFlash(msg,type){els.flash.className=type==='ok'?'ok':'err';els.flash.textContent=msg;els.flash.classList.remove('hidden');setTimeout(function(){els.flash.classList.add('hidden');},3200)}
function authInputs(){var bom=els.perfil.value==='bomberos';els.email.classList.toggle('hidden',bom);els.password.classList.toggle('hidden',bom)}
function activateNav(sec){document.querySelectorAll('.nav').forEach(function(btn){btn.classList.remove('active');});var btn=document.querySelector('.nav[data-sec="'+sec+'"]');if(btn)btn.classList.add('active')}
function updateNavVisibility(){document.querySelectorAll('.nav').forEach(function(btn){btn.classList.toggle('hidden',!canView(btn.dataset.sec));})}
function card(label,value){return '<div class="card"><div class="small">'+escapeHtml(label)+'</div><div style="font-size:28px;font-weight:800;">'+escapeHtml(value)+'</div></div>'}
async function safeSelect(table,orderBy,ascending,limit){let q=sb.from(table).select('*');if(orderBy)q=q.order(orderBy,{ascending:!!ascending});if(limit)q=q.limit(limit);const res=await q;if(res.error)throw res.error;return res.data||[]}
async function upsertRow(table,row){const res=await sb.from(table).upsert(row);if(res.error)throw res.error}
async function updateRows(table,values,id){const res=await sb.from(table).update(values).eq('id',id);if(res.error)throw res.error}
async function loginAdmin(email,password,profile){const expected=PROFILE_EMAILS[profile];if(String(email||'').trim().toLowerCase()!==expected.toLowerCase())throw new Error('Para el perfil '+profile+' debés usar el email '+expected);const authRes=await sb.auth.signInWithPassword({email:email,password:password});if(authRes.error)throw authRes.error;userActual=authRes.data.user;const roleRes=await sb.from('user_profiles').select('*').eq('user_id',userActual.id).eq('profile_name',profile).limit(1);if(roleRes.error)throw roleRes.error;if(!roleRes.data||!roleRes.data.length)throw new Error('Ese usuario no tiene asignado el perfil seleccionado.')}
async function loginBomberos(){userActual=null}
async function logout(){try{if(userActual)await sb.auth.signOut();}catch(e){} location.reload()}
function downloadTextFile(filename,content,type){const blob=new Blob([content],{type:type||'text/plain;charset=utf-8'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=filename;a.click();URL.revokeObjectURL(url)}
function toCsv(rows){if(!rows||!rows.length)return '';const headers=Object.keys(rows[0]);const esc=function(v){return '"'+String(v??'').replace(/"/g,'""')+'"';};return [headers.join(','),...rows.map(function(r){return headers.map(function(h){return esc(r[h]);}).join(',');})].join('
')}

async function dashboard(){
  els.title.textContent='Dashboard';
  const all=await Promise.all([
    safeSelect('moviles','numero',true),
    safeSelect('fallas','fecha_hora',false),
    safeSelect('repuestos','nombre',true),
    safeSelect('novedades_materiales','fecha_hora',false),
    safeSelect('v_stock_general','nombre',true)
  ]);
  const mov=all[0],fallas=all[1],repuestos=all[2],novedades=all[3],stock=all[4];
  const enServicio=mov.filter(function(x){return x.estado==='En servicio';}).length;
  const enMantenimiento=mov.filter(function(x){return x.estado==='En mantenimiento';}).length;
  const fueraServicio=mov.filter(function(x){return x.estado==='Fuera de servicio';}).length;
  const fallasCriticas=fallas.filter(function(f){return String(f.tipo_falla||'').toLowerCase().indexOf('crit')>=0;});
  const repuestosCriticos=repuestos.filter(function(r){return Number(r.stock_actual||0)<=Number(r.stock_minimo||0);});
  const alertasMateriales=novedades.filter(function(n){return String(n.estado||'').toLowerCase()==='pendiente';});
  const alertasStockGeneral=stock.filter(function(s){return s.alerta_minimo===true;});
  els.content.innerHTML=
    '<div class="hero-grid">'+
      '<div class="hero-card service"><div class="hero-label">Móviles en servicio</div><div class="hero-number">'+enServicio+'</div></div>'+
      '<div class="hero-card maint"><div class="hero-label">En mantenimiento</div><div class="hero-number">'+enMantenimiento+'</div></div>'+
      '<div class="hero-card out"><div class="hero-label">Fuera de servicio</div><div class="hero-number">'+fueraServicio+'</div></div>'+
    '</div>'+
    '<div class="stat-grid" style="margin-top:14px;">'+
      card('Fallas críticas',fallasCriticas.length)+
      card('Repuestos críticos',repuestosCriticos.length)+
      card('Alertas materiales',alertasMateriales.length)+
      card('Alertas stock general',alertasStockGeneral.length)+
    '</div>'+
    '<div class="card" style="margin-top:14px;"><strong>Alertas de stock general</strong><div style="margin-top:10px;">'+
      ((alertasStockGeneral.map(function(s){return '<div class="list-row"><strong>'+escapeHtml(s.nombre)+'</strong> · disponible '+escapeHtml(s.disponible_real)+' / mínimo '+escapeHtml(s.stock_minimo)+'</div>';}).join(''))||'Sin alertas de stock general.')+
    '</div></div>';
}

async function inventario_general(){
  els.title.textContent='Inventario general';
  const vista=await safeSelect('v_stock_general','nombre',true);
  const maestro=await safeSelect('stock_items','nombre',true);
  let html='';
  if(canEditStockGeneral()){
    html+='<div class="card" style="margin-bottom:12px;"><strong>Alta / edición de stock maestro</strong><form id="fStockMaster" class="grid" style="grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); margin-top:12px;"><input name="id" type="hidden"><input name="codigo_interno" placeholder="Código interno"><input name="nombre" placeholder="Nombre" required><input name="categoria" placeholder="Categoría"><input name="marca" placeholder="Marca"><input name="modelo" placeholder="Modelo"><input name="numero_serie" placeholder="N° serie"><input name="cantidad_total" type="number" min="0" placeholder="Cantidad total" required><input name="stock_minimo" type="number" min="0" placeholder="Stock mínimo" required><input name="observaciones" placeholder="Observaciones"><button class="primary" type="submit">Guardar ítem</button></form></div>';
  }
  html+='<div class="card"><table><thead><tr><th>Código</th><th>Ítem</th><th>Total</th><th>Asignado</th><th>Stock central</th><th>Reparación</th><th>Baja</th><th>Mínimo</th><th>Alerta</th>'+(canEditStockGeneral()?'<th>Acciones</th>':'')+'</tr></thead><tbody>'+
    (vista.map(function(r){
      return '<tr>'+
        '<td>'+escapeHtml(r.codigo_interno||'')+'</td>'+
        '<td><strong>'+escapeHtml(r.nombre)+'</strong><div class="small">'+escapeHtml([r.categoria,r.marca,r.modelo].filter(Boolean).join(' · '))+'</div></td>'+
        '<td>'+escapeHtml(r.cantidad_total)+'</td>'+
        '<td>'+escapeHtml(r.asignado_moviles)+'</td>'+
        '<td><strong>'+escapeHtml(r.disponible_real)+'</strong></td>'+
        '<td>'+escapeHtml(r.en_reparacion)+'</td>'+
        '<td>'+escapeHtml(r.en_baja)+'</td>'+
        '<td>'+escapeHtml(r.stock_minimo)+'</td>'+
        '<td>'+(r.alerta_minimo?'<span class="pill pill-bad">Bajo mínimo</span>':'<span class="pill pill-ok">OK</span>')+'</td>'+
        (canEditStockGeneral()?'<td><button class="secondary edit-stock" data-id="'+r.id+'">Editar</button> <button class="secondary maint-stock" data-id="'+r.id+'">Reparación</button> <button class="danger baja-stock" data-id="'+r.id+'">Baja</button></td>':'')+
      '</tr>';
    }).join('')||'<tr><td colspan="10">Sin stock cargado.</td></tr>')+
    '</tbody></table></div>';
  els.content.innerHTML=html;
  if(!canEditStockGeneral())return;
  const form=document.getElementById('fStockMaster');
  form.addEventListener('submit',async function(e){
    e.preventDefault();
    const fd=new FormData(form);
    const row={codigo_interno:fd.get('codigo_interno'),nombre:fd.get('nombre'),categoria:fd.get('categoria'),marca:fd.get('marca'),modelo:fd.get('modelo'),numero_serie:fd.get('numero_serie'),cantidad_total:Number(fd.get('cantidad_total')||0),stock_minimo:Number(fd.get('stock_minimo')||0),observaciones:fd.get('observaciones')};
    if(fd.get('id'))row.id=Number(fd.get('id'));
    await upsertRow('stock_items',row);
    showFlash('Stock maestro guardado','ok');
    inventario_general();
  });
  document.querySelectorAll('.edit-stock').forEach(function(btn){
    btn.addEventListener('click',function(){
      const item=maestro.find(function(x){return String(x.id)===btn.dataset.id;});
      if(!item)return;
      form.elements.id.value=item.id;
      form.elements.codigo_interno.value=item.codigo_interno||'';
      form.elements.nombre.value=item.nombre||'';
      form.elements.categoria.value=item.categoria||'';
      form.elements.marca.value=item.marca||'';
      form.elements.modelo.value=item.modelo||'';
      form.elements.numero_serie.value=item.numero_serie||'';
      form.elements.cantidad_total.value=item.cantidad_total||0;
      form.elements.stock_minimo.value=item.stock_minimo||0;
      form.elements.observaciones.value=item.observaciones||'';
    });
  });
  document.querySelectorAll('.maint-stock').forEach(function(btn){
    btn.addEventListener('click',async function(){
      const motivo=prompt('Motivo de reparación / mantenimiento:');
      if(!motivo)return;
      const cantidad=Number(prompt('Cantidad a enviar a reparación:','1')||0);
      if(cantidad<1)return;
      const res=await sb.rpc('send_item_to_maintenance',{p_stock_item_id:Number(btn.dataset.id),p_cantidad:cantidad,p_motivo:motivo,p_usuario:perfilActual,p_movil:null});
      if(res.error){alert(res.error.message);return;}
      showFlash('Ítem enviado a reparación','ok');
      inventario_general();
    });
  });
  document.querySelectorAll('.baja-stock').forEach(function(btn){
    btn.addEventListener('click',async function(){
      const motivo=prompt('Motivo de baja:');
      if(!motivo)return;
      const cantidad=Number(prompt('Cantidad a dar de baja:','1')||0);
      if(cantidad<1)return;
      const res=await sb.rpc('decommission_item',{p_stock_item_id:Number(btn.dataset.id),p_cantidad:cantidad,p_motivo:motivo,p_usuario:perfilActual});
      if(res.error){alert(res.error.message);return;}
      showFlash('Ítem dado de baja','ok');
      inventario_general();
    });
  });
}

async function asignaciones(){
  els.title.textContent='Asignaciones';
  const all=await Promise.all([
    safeSelect('v_stock_general','nombre',true),
    safeSelect('v_stock_assignments_detail','fecha_hora',false),
    safeSelect('moviles','numero',true),
    safeSelect('stock_compartments','movil',true)
  ]);
  const stock=all[0],assigns=all[1],movs=all[2],comps=all[3];
  let html='';
  if(canEditStockGeneral()){
    html+='<div class="card" style="margin-bottom:12px;"><strong>Asignar stock</strong><form id="fAssign" class="grid" style="grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); margin-top:12px;"><select name="stock_item_id">'+stock.map(function(s){return '<option value="'+s.id+'">'+escapeHtml(s.nombre)+' · disponible '+escapeHtml(s.disponible_real)+'</option>';}).join('')+'</select><select name="movil" id="assignMovil">'+movs.map(function(m){return '<option value="'+escapeHtml(m.numero)+'">Móvil '+escapeHtml(m.numero)+'</option>';}).join('')+'</select><select name="compartimiento" id="assignComp"></select><input name="nuevoCompartimiento" placeholder="Nuevo compartimiento (opcional)"><input name="cantidad" type="number" min="1" placeholder="Cantidad" required><button class="primary" type="submit">Asignar</button></form></div>';
  }
  html+='<div class="card"><table><thead><tr><th>Fecha</th><th>Móvil</th><th>Compartimiento</th><th>Ítem</th><th>Cantidad</th><th>Estado</th>'+(canEditStockGeneral()?'<th>Acciones</th>':'')+'</tr></thead><tbody>'+
    (assigns.map(function(a){
      return '<tr><td>'+escapeHtml(new Date(a.fecha_hora||Date.now()).toLocaleString('es-AR'))+'</td><td>Móvil '+escapeHtml(a.movil)+'</td><td>'+escapeHtml(a.compartimiento||'')+'</td><td><strong>'+escapeHtml(a.nombre)+'</strong><div class="small">'+escapeHtml(a.codigo_interno||'')+'</div></td><td>'+escapeHtml(a.cantidad)+'</td><td>'+escapeHtml(a.estado_asignacion)+'</td>'+(canEditStockGeneral()?'<td><button class="secondary devolver-assign" data-id="'+a.id+'">Devolver</button></td>':'')+'</tr>';
    }).join('')||'<tr><td colspan="7">Sin asignaciones.</td></tr>')+
    '</tbody></table></div>';
  els.content.innerHTML=html;
  if(!canEditStockGeneral())return;
  const form=document.getElementById('fAssign');
  const assignMovil=document.getElementById('assignMovil');
  const assignComp=document.getElementById('assignComp');
  function fillAssignComp(movil){const list=comps.filter(function(c){return String(c.movil)===String(movil)&&c.activo!==false;});assignComp.innerHTML=list.map(function(c){return '<option value="'+escapeHtml(c.nombre)+'">'+escapeHtml(c.nombre)+'</option>';}).join('');}
  fillAssignComp(assignMovil.value);
  assignMovil.addEventListener('change',function(){fillAssignComp(assignMovil.value);});
  form.addEventListener('submit',async function(e){
    e.preventDefault();
    const fd=new FormData(form);
    let comp=fd.get('compartimiento');
    const nuevo=String(fd.get('nuevoCompartimiento')||'').trim();
    if(nuevo){
      comp=nuevo;
      const exists=comps.find(function(c){return String(c.movil)===String(fd.get('movil'))&&String(c.nombre).toLowerCase()===nuevo.toLowerCase();});
      if(!exists&&canDeleteCompartments()){
        const r=await sb.from('stock_compartments').insert({movil:fd.get('movil'),nombre:nuevo,activo:true});
        if(r.error){alert(r.error.message);return;}
      }
    }
    const res=await sb.rpc('assign_item_to_mobile',{p_stock_item_id:Number(fd.get('stock_item_id')),p_movil:fd.get('movil'),p_compartimiento:comp||'',p_cantidad:Number(fd.get('cantidad')||0),p_usuario:perfilActual});
    if(res.error){alert(res.error.message);return;}
    showFlash('Asignación realizada','ok');
    asignaciones();
  });
  document.querySelectorAll('.devolver-assign').forEach(function(btn){
    btn.addEventListener('click',async function(){
      const id=Number(btn.dataset.id);
      const item=assigns.find(function(a){return a.id===id;});
      if(!item)return;
      await updateRows('stock_assignments',{estado_asignacion:'DEVUELTA'},id);
      const r2=await sb.from('stock_movements').insert({stock_item_id:item.stock_item_id,tipo_movimiento:'devolucion',cantidad:item.cantidad,origen:'MOVIL',destino:'STOCK_CENTRAL',movil_origen:item.movil,usuario:perfilActual});
      if(r2.error){alert(r2.error.message);return;}
      showFlash('Ítem devuelto a stock central','ok');
      asignaciones();
    });
  });
}

async function mantenimiento_stock(){
  els.title.textContent='Control de mantenimiento';
  const rows=await safeSelect('v_maintenance_control_detail','fecha_ingreso',false);
  const items=await safeSelect('stock_items','nombre',true);
  let html='';
  if(canManageMaintenanceStock()){
    html+='<div class="card" style="margin-bottom:12px;"><strong>Ingreso manual a mantenimiento</strong><form id="fMaintStock" class="grid" style="grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); margin-top:12px;"><select name="stock_item_id">'+items.map(function(i){return '<option value="'+i.id+'">'+escapeHtml(i.nombre)+'</option>';}).join('')+'</select><input name="cantidad" type="number" min="1" placeholder="Cantidad" required><input name="motivo" placeholder="Motivo" required><input name="observaciones" placeholder="Observaciones"><button class="primary" type="submit">Enviar a mantenimiento</button></form></div>';
  }
  html+='<div class="card"><table><thead><tr><th>Fecha ingreso</th><th>Ítem</th><th>Cantidad</th><th>Motivo</th><th>Estado</th><th>Observaciones</th>'+(canManageMaintenanceStock()?'<th>Acciones</th>':'')+'</tr></thead><tbody>'+
    (rows.map(function(r){
      return '<tr><td>'+escapeHtml(new Date(r.fecha_ingreso||Date.now()).toLocaleString('es-AR'))+'</td><td><strong>'+escapeHtml(r.nombre)+'</strong><div class="small">'+escapeHtml(r.codigo_interno||'')+'</div></td><td>'+escapeHtml(r.cantidad)+'</td><td>'+escapeHtml(r.motivo||'')+'</td><td>'+(String(r.estado||'').toUpperCase()==='DISPONIBLE'?'<span class="pill pill-ok">Disponible</span>':'<span class="pill pill-warn">'+escapeHtml(r.estado||'REPARACION')+'</span>')+'</td><td>'+escapeHtml(r.observaciones||'')+'</td>'+(canManageMaintenanceStock()?'<td>'+(String(r.estado||'').toUpperCase()!=='DISPONIBLE'?'<button class="secondary return-maint" data-id="'+r.id+'">Retornar a stock</button>':'')+'</td>':'')+'</tr>';
    }).join('')||'<tr><td colspan="7">Sin registros de mantenimiento.</td></tr>')+
    '</tbody></table></div>';
  els.content.innerHTML=html;
  if(!canManageMaintenanceStock())return;
  const form=document.getElementById('fMaintStock');
  form.addEventListener('submit',async function(e){
    e.preventDefault();
    const fd=new FormData(form);
    const res=await sb.from('maintenance_control').insert({stock_item_id:Number(fd.get('stock_item_id')),cantidad:Number(fd.get('cantidad')||0),motivo:fd.get('motivo'),estado:'REPARACION',observaciones:fd.get('observaciones')});
    if(res.error){alert(res.error.message);return;}
    const mv=await sb.from('stock_movements').insert({stock_item_id:Number(fd.get('stock_item_id')),tipo_movimiento:'reparacion',cantidad:Number(fd.get('cantidad')||0),origen:'STOCK_CENTRAL',destino:'MANTENIMIENTO',motivo:fd.get('motivo'),usuario:perfilActual});
    if(mv.error){alert(mv.error.message);return;}
    showFlash('Ítem enviado a mantenimiento','ok');
    mantenimiento_stock();
  });
  document.querySelectorAll('.return-maint').forEach(function(btn){
    btn.addEventListener('click',async function(){
      const res=await sb.rpc('return_item_from_maintenance',{p_maintenance_id:Number(btn.dataset.id),p_usuario:perfilActual});
      if(res.error){alert(res.error.message);return;}
      showFlash('Ítem retornado a stock central','ok');
      mantenimiento_stock();
    });
  });
}

async function archivo_bajas(){
  els.title.textContent='Archivo / bajas';
  const rows=await safeSelect('v_stock_decommissions_detail','fecha_baja',false);
  let html='<div class="card"><table><thead><tr><th>Fecha</th><th>Ítem</th><th>Cantidad</th><th>Motivo</th><th>Usuario</th><th>Observaciones</th><th>Revertible</th>'+(canManageDecommissions()?'<th>Acciones</th>':'')+'</tr></thead><tbody>'+
    (rows.map(function(r){
      return '<tr><td>'+escapeHtml(new Date(r.fecha_baja||Date.now()).toLocaleString('es-AR'))+'</td><td><strong>'+escapeHtml(r.nombre)+'</strong><div class="small">'+escapeHtml(r.codigo_interno||'')+'</div></td><td>'+escapeHtml(r.cantidad)+'</td><td>'+escapeHtml(r.motivo||'')+'</td><td>'+escapeHtml(r.usuario||'')+'</td><td>'+escapeHtml(r.observaciones||'')+'</td><td>'+(r.revertible?'<span class="pill pill-ok">Sí</span>':'<span class="pill pill-bad">No</span>')+'</td>'+(canManageDecommissions()?'<td>'+(r.revertible?'<button class="secondary revert-baja" data-id="'+r.id+'">Revertir</button>':'')+'</td>':'')+'</tr>';
    }).join('')||'<tr><td colspan="8">Sin bajas registradas.</td></tr>')+
    '</tbody></table></div>';
  els.content.innerHTML=html;
  if(!canManageDecommissions())return;
  document.querySelectorAll('.revert-baja').forEach(function(btn){
    btn.addEventListener('click',async function(){
      const id=Number(btn.dataset.id);
      const item=rows.find(function(x){return x.id===id;});
      if(!item)return;
      const del=await sb.from('stock_decommissions').delete().eq('id',id);
      if(del.error){alert(del.error.message);return;}
      const mv=await sb.from('stock_movements').insert({stock_item_id:item.stock_item_id,tipo_movimiento:'reversa_baja',cantidad:item.cantidad,origen:'ARCHIVO_BAJAS',destino:'STOCK_CENTRAL',motivo:'Reversión de baja',usuario:perfilActual});
      if(mv.error){alert(mv.error.message);return;}
      showFlash('Baja revertida, vuelve a stock central','ok');
      archivo_bajas();
    });
  });
}

async function reportes_stock(){
  els.title.textContent='Reportes de stock';
  const all=await Promise.all([
    safeSelect('v_stock_general','nombre',true),
    safeSelect('v_stock_assignments_detail','movil',true),
    safeSelect('v_maintenance_control_detail','fecha_ingreso',false),
    safeSelect('v_stock_decommissions_detail','fecha_baja',false)
  ]);
  const stock=all[0],assignments=all[1],maint=all[2],bajas=all[3];
  els.content.innerHTML='<div class="card"><strong>Exportación de reportes</strong><div class="small" style="margin-top:8px;">Descargá reportes del stock maestro, stock asignado a móviles, mantenimiento y bajas.</div><div class="grid" style="grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); margin-top:16px;">'+
    '<button id="expStockCsv" class="primary" type="button">Exportar stock general CSV</button>'+
    '<button id="expStockJson" class="secondary" type="button">Exportar stock general JSON</button>'+
    '<button id="expAsignCsv" class="primary" type="button">Exportar stock por móvil CSV</button>'+
    '<button id="expAsignJson" class="secondary" type="button">Exportar stock por móvil JSON</button>'+
    '<button id="expMaintCsv" class="primary" type="button">Exportar mantenimiento CSV</button>'+
    '<button id="expBajasCsv" class="secondary" type="button">Exportar bajas CSV</button>'+
    '</div></div>';
  const stockRows=stock.map(function(r){return {codigo_interno:r.codigo_interno||'',nombre:r.nombre,categoria:r.categoria||'',marca:r.marca||'',modelo:r.modelo||'',numero_serie:r.numero_serie||'',cantidad_total:r.cantidad_total,asignado_moviles:r.asignado_moviles,en_reparacion:r.en_reparacion,en_baja:r.en_baja,disponible_real:r.disponible_real,stock_minimo:r.stock_minimo,alerta_minimo:r.alerta_minimo};});
  const assignRows=assignments.map(function(a){return {fecha_hora:a.fecha_hora,movil:a.movil,compartimiento:a.compartimiento||'',codigo_interno:a.codigo_interno||'',nombre:a.nombre||'',cantidad:a.cantidad,estado_asignacion:a.estado_asignacion};});
  const maintRows=maint.map(function(m){return {fecha_ingreso:m.fecha_ingreso,codigo_interno:m.codigo_interno||'',nombre:m.nombre||'',cantidad:m.cantidad,motivo:m.motivo||'',estado:m.estado||'',fecha_retorno:m.fecha_retorno||'',observaciones:m.observaciones||''};});
  const bajaRows=bajas.map(function(b){return {fecha_baja:b.fecha_baja,codigo_interno:b.codigo_interno||'',nombre:b.nombre||'',cantidad:b.cantidad,motivo:b.motivo||'',usuario:b.usuario||'',observaciones:b.observaciones||'',revertible:b.revertible};});
  document.getElementById('expStockCsv').addEventListener('click',function(){downloadTextFile('stock_general.csv',toCsv(stockRows),'text/csv;charset=utf-8');});
  document.getElementById('expStockJson').addEventListener('click',function(){downloadTextFile('stock_general.json',JSON.stringify(stockRows,null,2),'application/json');});
  document.getElementById('expAsignCsv').addEventListener('click',function(){downloadTextFile('stock_por_movil.csv',toCsv(assignRows),'text/csv;charset=utf-8');});
  document.getElementById('expAsignJson').addEventListener('click',function(){downloadTextFile('stock_por_movil.json',JSON.stringify(assignRows,null,2),'application/json');});
  document.getElementById('expMaintCsv').addEventListener('click',function(){downloadTextFile('control_mantenimiento.csv',toCsv(maintRows),'text/csv;charset=utf-8');});
  document.getElementById('expBajasCsv').addEventListener('click',function(){downloadTextFile('archivo_bajas.csv',toCsv(bajaRows),'text/csv;charset=utf-8');});
}

async function plano(){
  els.title.textContent='Plano del móvil';
  const all=await Promise.all([
    safeSelect('moviles','numero',true),
    safeSelect('v_stock_assignments_detail','movil',true),
    safeSelect('novedades_materiales','fecha_hora',false)
  ]);
  const movs=all[0],items=all[1],novedades=all[2];
  els.content.innerHTML='<div class="card"><label class="small">Seleccionar móvil</label><select id="mapMovil" style="margin-top:8px; max-width:240px;">'+movs.map(function(m){return '<option value="'+escapeHtml(m.numero)+'">Móvil '+escapeHtml(m.numero)+'</option>';}).join('')+'</select></div><div id="mapWrap" class="mobile-map" style="margin-top:12px;"></div>';
  const sel=document.getElementById('mapMovil');
  function renderMap(movil){
    const byComp={};
    items.filter(function(i){return String(i.movil)===String(movil)&&i.estado_asignacion==='ACTIVA';}).forEach(function(i){if(!byComp[i.compartimiento||'Sin compartimiento'])byComp[i.compartimiento||'Sin compartimiento']=[];byComp[i.compartimiento||'Sin compartimiento'].push(i);});
    const keys=Object.keys(byComp);
    document.getElementById('mapWrap').innerHTML=keys.map(function(c){return '<div class="comp-box"><strong>'+escapeHtml(c)+'</strong><div style="margin-top:8px;">'+byComp[c].map(function(i){const alerta=novedades.find(function(n){return String(n.estado||'').toLowerCase()==='pendiente'&&String(n.movil)===String(movil)&&String(n.material)===String(i.nombre);});return '<div class="list-row">'+escapeHtml(i.nombre)+' · Cantidad '+escapeHtml(i.cantidad)+(alerta?' <span class="pill pill-bad">ALERTA</span>':'')+'</div>';}).join('')+'</div></div>';}).join('')||'<div class="card">Ese móvil no tiene materiales asignados.</div>';
  }
  sel.addEventListener('change',function(){renderMap(sel.value);});
  if(sel.value)renderMap(sel.value);
}

async function diagnostico(){
  els.title.textContent='Diagnóstico';
  const lines=[];
  async function run(label,fn){try{const result=await fn();lines.push('OK - '+label+(result?': '+result:''));}catch(err){lines.push('ERROR - '+label+': '+(err&&err.message?err.message:String(err)));}}
  await run('Auth',async function(){const res=await sb.auth.getSession();if(res.error)throw res.error;return res.data.session?'sesión activa':'sin sesión';});
  await run('v_stock_general',async function(){return String((await safeSelect('v_stock_general','id',false,1)).length);});
  await run('v_stock_assignments_detail',async function(){return String((await safeSelect('v_stock_assignments_detail','id',false,1)).length);});
  await run('v_maintenance_control_detail',async function(){return String((await safeSelect('v_maintenance_control_detail','id',false,1)).length);});
  await run('v_stock_decommissions_detail',async function(){return String((await safeSelect('v_stock_decommissions_detail','id',false,1)).length);});
  els.content.innerHTML='<div class="err" style="background:#0f172a;border-color:#334155;color:#e2e8f0;">'+escapeHtml(lines.join('
'))+'</div>';
}

async function nav(sec){
  if(!canView(sec)){showFlash('Ese perfil no tiene acceso a esta sección','err');return;}
  activateNav(sec);
  if(sec==='dashboard')return dashboard();
  if(sec==='inventario_general')return inventario_general();
  if(sec==='asignaciones')return asignaciones();
  if(sec==='mantenimiento_stock')return mantenimiento_stock();
  if(sec==='archivo_bajas')return archivo_bajas();
  if(sec==='inventario_movil')return inventario_movil();
  if(sec==='reportes_stock')return reportes_stock();
  if(sec==='plano')return plano();
  if(sec==='diagnostico')return diagnostico();
}

async function init(){
  try{
    if(!window.supabase||typeof window.supabase.createClient!=='function')throw new Error('No cargó la librería de Supabase.');
    sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
    els.bootMsg.textContent='Sistema listo.';
    authInputs();
    els.perfil.addEventListener('change',authInputs);
    els.logout.addEventListener('click',logout);
    els.logoutTop.addEventListener('click',logout);
    document.querySelectorAll('.nav').forEach(function(btn){btn.addEventListener('click',function(){nav(btn.dataset.sec);});});
    els.loginForm.addEventListener('submit',async function(e){
      e.preventDefault();
      perfilActual=els.perfil.value;
      try{
        if(perfilActual==='bomberos') await loginBomberos(); else await loginAdmin(els.email.value,els.password.value,perfilActual);
        els.login.classList.add('hidden');
        els.app.classList.remove('hidden');
        els.userInfo.textContent=perfilActual+' · permisos según rol';
        updateNavVisibility();
        nav('dashboard');
      }catch(err){alert(err&&err.message?err.message:'No se pudo iniciar sesión.');}
    });
  }catch(err){
    els.bootMsg.textContent='Error de inicialización.';
    showBootError(err&&err.message?err.message:String(err));
  }
}
window.addEventListener('error',function(event){showBootError(event&&event.message?event.message:'Script error');});
window.addEventListener('unhandledrejection',function(event){showBootError(event&&event.reason&&event.reason.message?event.reason.message:String((event&&event.reason)||'Promise error'));});
init();
</script>
